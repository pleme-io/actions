name: 'pleme-io · caixa-publish-to-git'
description: 'Tag the current commit with the caixa.lisp :version field — turns the repo into a git-as-package-repo that downstream caixas can :depends-on by tag.'
branding: { icon: 'tag', color: 'green' }

inputs:
  caixa-path:
    description: "Path to the .caixa.lisp source (default: auto-detect)"
    required: false
    default: ""
  tag-prefix:
    description: "Prefix for the tag (default: 'v')"
    required: false
    default: "v"
  push-tag:
    required: false
    default: "true"

outputs:
  tag:
    value: ${{ steps.run.outputs.tag }}
  published:
    value: ${{ steps.run.outputs.published }}

runs:
  using: composite
  steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.BOT_PAT || github.token }}
    - id: src
      shell: bash
      run: |
        {
          echo 'script<<TLISP_EOF'
          curl -sL https://raw.githubusercontent.com/pleme-io/actions/main/_tlisp-stdlib/stdlib.tlisp
          echo
          cat ${{ github.action_path }}/run.tlisp
          echo 'TLISP_EOF'
        } >> "$GITHUB_OUTPUT"
    - id: run
      uses: pleme-io/actions/tatara-script@v1
      with:
        script: ${{ steps.src.outputs.script }}
      env:
        CAIXA_PATH: ${{ inputs.caixa-path }}
        TAG_PREFIX: ${{ inputs.tag-prefix }}
        PUSH_TAG: ${{ inputs.push-tag }}

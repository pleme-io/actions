name: 'pleme-io · license-finder'
description: 'Scan dependencies for license compatibility via license_finder.'
branding: { icon: 'file-text', color: 'green' }

inputs:
  permitted-licenses:
    required: false
    default: "MIT,Apache-2.0,BSD-3-Clause"
  fail-on-violation:
    required: false
    default: "true"

outputs:
  violations:
    value: ${{ steps.run.outputs.violations }}

runs:
  using: composite
  steps:
    - uses: actions/setup-ruby@v1
      with: { ruby-version: "3.2" }
    - id: src
      shell: bash
      run: |
        {
          echo 'script<<TLISP_EOF'
          curl -sL https://raw.githubusercontent.com/pleme-io/actions/main/_tlisp-stdlib/stdlib.tlisp
          echo
          cat ${{ github.action_path }}/run.tlisp
          echo 'TLISP_EOF'
        } >> "$GITHUB_OUTPUT"
    - id: run
      uses: pleme-io/actions/tatara-script@v1
      with:
        script: ${{ steps.src.outputs.script }}
      env:
        PERMITTED_LICENSES: ${{ inputs.permitted-licenses }}
        FAIL_ON_VIOLATION: ${{ inputs.fail-on-violation }}

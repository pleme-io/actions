name: 'pleme-io · changelog-fragments-merge'
description: 'Merge .changelog/ fragments into CHANGELOG.md (Keep a Changelog).'
branding: { icon: 'file-text', color: 'gray-dark' }

inputs:
  fragments-dir:
    required: false
    default: ".changelog/"
  changelog-file:
    required: false
    default: "CHANGELOG.md"

outputs:
  merged-count:
    value: ${{ steps.run.outputs.merged-count }}

runs:
  using: composite
  steps:
    - id: src
      shell: bash
      run: |
        {
          echo 'script<<TLISP_EOF'
          curl -sL https://raw.githubusercontent.com/pleme-io/actions/main/_tlisp-stdlib/stdlib.tlisp
          echo
          cat ${{ github.action_path }}/run.tlisp
          echo 'TLISP_EOF'
        } >> "$GITHUB_OUTPUT"
    - id: run
      uses: pleme-io/actions/tatara-script@v1
      with:
        script: ${{ steps.src.outputs.script }}
      env:
        FRAGMENTS_DIR: ${{ inputs.fragments-dir }}
        CHANGELOG_FILE: ${{ inputs.changelog-file }}

name: 'pleme-io · terraform-plan'
description: 'Run terraform init + plan + emit plan file. Pairs with terraform-apply for the GitOps split-flow.'
branding: { icon: 'cloud', color: 'orange' }

inputs:
  workdir:
    required: false
    default: "."
  backend-config:
    description: "Path to a -backend-config file (optional)"
    required: false
    default: ""
  var-file:
    required: false
    default: ""
  terraform-version:
    required: false
    default: "latest"

outputs:
  plan-path:
    value: ${{ steps.run.outputs.plan-path }}
  has-changes:
    value: ${{ steps.run.outputs.has-changes }}

runs:
  using: composite
  steps:
    - uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: latest
    - id: src
      shell: bash
      run: |
        {
          echo 'script<<TLISP_EOF'
          curl -sL https://raw.githubusercontent.com/pleme-io/actions/main/_tlisp-stdlib/stdlib.tlisp
          echo
          cat ${{ github.action_path }}/run.tlisp
          echo 'TLISP_EOF'
        } >> "$GITHUB_OUTPUT"
    - id: run
      uses: pleme-io/actions/tatara-script@v1
      with:
        script: ${{ steps.src.outputs.script }}
      env:
        WORKDIR: ${{ inputs.workdir }}
        BACKEND_CONFIG: ${{ inputs.backend-config }}
        VAR_FILE: ${{ inputs.var-file }}

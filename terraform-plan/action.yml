name: 'pleme-io · terraform-plan'
description: 'Run terraform init + plan + emit plan file. Pairs with terraform-apply for the GitOps split-flow.'
branding: { icon: 'cloud', color: 'orange' }

inputs:
  workdir:
    required: false
    default: "."
  backend-config:
    description: "Path to a -backend-config file (optional)"
    required: false
    default: ""
  var-file:
    required: false
    default: ""
  terraform-version:
    required: false
    default: "latest"

outputs:
  plan-path:
    value: ${{ steps.p.outputs.plan-path }}
  has-changes:
    value: ${{ steps.p.outputs.has-changes }}

runs:
  using: composite
  steps:
    - uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ inputs.terraform-version }}
    - id: p
      shell: bash
      working-directory: ${{ inputs.workdir }}
      run: |
        init_args=()
        [ -n "${{ inputs.backend-config }}" ] && init_args+=( "-backend-config=${{ inputs.backend-config }}" )
        terraform init "${init_args[@]}"
        plan_args=( "-out=tfplan" "-detailed-exitcode" )
        [ -n "${{ inputs.var-file }}" ] && plan_args+=( "-var-file=${{ inputs.var-file }}" )
        set +e
        terraform plan "${plan_args[@]}"
        code=$?
        set -e
        if [ "$code" = "1" ]; then exit 1; fi
        echo "plan-path=${{ inputs.workdir }}/tfplan" >> "$GITHUB_OUTPUT"
        [ "$code" = "2" ] && echo "has-changes=true" >> "$GITHUB_OUTPUT" \
                          || echo "has-changes=false" >> "$GITHUB_OUTPUT"

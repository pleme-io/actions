name: 'pleme-io · semgrep-scan'
description: 'Semgrep SAST scan with configurable rule set.'
branding: { icon: 'shield', color: 'red' }

inputs:
  config:
    required: false
    default: "auto"
  fail-on-finding:
    required: false
    default: "true"

outputs:
  findings-count:
    value: ${{ steps.run.outputs.findings-count }}

runs:
  using: composite
  steps:
    - uses: actions/setup-python@v5
      with: { python-version: "3.x" }
    - id: src
      shell: bash
      run: |
        {
          echo 'script<<TLISP_EOF'
          curl -sL https://raw.githubusercontent.com/pleme-io/actions/main/_tlisp-stdlib/stdlib.tlisp
          echo
          cat ${{ github.action_path }}/run.tlisp
          echo 'TLISP_EOF'
        } >> "$GITHUB_OUTPUT"
    - id: run
      uses: pleme-io/actions/tatara-script@v1
      with:
        script: ${{ steps.src.outputs.script }}
      env:
        CONFIG: ${{ inputs.config }}
        FAIL_ON_FINDING: ${{ inputs.fail-on-finding }}

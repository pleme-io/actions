name: 'pleme-io · airtable-record-create'
description: 'Create a record in an Airtable base.'
branding: { icon: 'database', color: 'green' }

inputs:
  api-key:
    required: true
  base-id:
    required: true
  table:
    required: true
  fields-json:
    required: true

outputs:
  record-id:
    value: ${{ steps.run.outputs.record-id }}

runs:
  using: composite
  steps:
    - id: src
      shell: bash
      run: |
        {
          echo 'script<<TLISP_EOF'
          curl -sL https://raw.githubusercontent.com/pleme-io/actions/main/_tlisp-stdlib/stdlib.tlisp
          echo
          cat ${{ github.action_path }}/run.tlisp
          echo 'TLISP_EOF'
        } >> "$GITHUB_OUTPUT"
    - id: run
      uses: pleme-io/actions/tatara-script@v1
      with:
        script: ${{ steps.src.outputs.script }}
      env:
        API_KEY: ${{ inputs.api-key }}
        BASE_ID: ${{ inputs.base-id }}
        TABLE: ${{ inputs.table }}
        FIELDS_JSON: ${{ inputs.fields-json }}

name: 'pleme-io · npm-bump'
description: 'Bump an npm package.json version via `npm version --no-git-tag-version <type>`, refresh package-lock.json. Sibling of cargo-bump for the npm ecosystem.'
branding:
  icon: 'arrow-up-circle'
  color: 'green'

inputs:
  bump-type:
    description: "patch | minor | major"
    required: false
    default: patch
  skip-when-no-source-changes:
    description: "Skip the bump when no source path changed since the previous tag"
    required: false
    default: "true"
  source-paths:
    description: "Space-separated globs the skip-detector inspects"
    required: false
    default: "src package.json package-lock.json"

outputs:
  bumped:
    description: "true if a bump happened, false if skipped"
    value: ${{ steps.bump.outputs.bumped }}
  new-version:
    description: "New version after bump (empty when skipped)"
    value: ${{ steps.bump.outputs.new-version }}
  old-version:
    description: "Previous version (always populated)"
    value: ${{ steps.bump.outputs.old-version }}

runs:
  using: composite
  steps:
    - uses: actions/setup-node@v4
      with:
        node-version: "20"

    - name: Load stdlib + run.tlisp
      id: src
      shell: bash
      run: |
        {
          echo 'script<<TLISP_EOF'
          curl -sL https://raw.githubusercontent.com/pleme-io/actions/main/_tlisp-stdlib/stdlib.tlisp
          echo
          cat ${{ github.action_path }}/run.tlisp
          echo 'TLISP_EOF'
        } >> "$GITHUB_OUTPUT"

    - id: bump
      uses: pleme-io/actions/tatara-script@v1
      with:
        script: ${{ steps.src.outputs.script }}
      env:
        BUMP_TYPE: ${{ inputs.bump-type }}
        SKIP_WHEN_NO_SOURCE_CHANGES: ${{ inputs.skip-when-no-source-changes }}
        SOURCE_PATHS: ${{ inputs.source-paths }}

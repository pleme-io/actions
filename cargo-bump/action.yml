name: 'pleme-io · cargo-bump'
description: 'Bump a single-crate Rust repo via cargo set-version --bump <type>, regenerate Cargo.nix, refresh Cargo.lock. Sibling of rust-workspace-bump for non-workspace Rust repos.'
branding:
  icon: 'arrow-up-circle'
  color: 'green'

inputs:
  bump-type:
    description: "patch | minor | major"
    required: false
    default: patch
  skip-when-no-source-changes:
    description: "Skip the bump when no source path changed since the previous tag"
    required: false
    default: "true"
  source-paths:
    description: "Space-separated globs the skip-detector inspects for changes since the last tag"
    required: false
    default: "src Cargo.toml Cargo.lock"
  regenerate-cargo-nix:
    description: "Regenerate Cargo.nix via crate2nix after the version bump. Set to 'false' for repos with path deps to sibling repos (CI doesn't check them out, so crate2nix would fail)."
    required: false
    default: "true"

outputs:
  bumped:
    description: "true if a bump happened, false if skipped/no-op"
    value: ${{ steps.bump.outputs.bumped }}
  new-version:
    description: "New package.version after bump (empty when bumped=false)"
    value: ${{ steps.bump.outputs.new-version }}
  old-version:
    description: "Previous package.version (always populated)"
    value: ${{ steps.bump.outputs.old-version }}

runs:
  using: composite
  steps:
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Install cargo-edit
      shell: bash
      # Pin to 0.13.6 — 0.13.10 has a manifest-parse regression on
      # several caixa mirrors (caixa-jpeg-decoder + downstream).
      # Bump only after confirming a green run across the auto-release
      # cohort.
      run: cargo install --locked --version 0.13.6 cargo-edit

    - name: Install Nix (for crate2nix regenerate)
      uses: DeterminateSystems/nix-installer-action@main

    # Concatenate the shared _tlisp-stdlib helpers in FRONT of the
    # action's run.tlisp so the action's body can use every
    # primitive defined in stdlib.tlisp without restating them.
    - name: Load stdlib + run.tlisp
      id: src
      shell: bash
      run: |
        {
          echo 'script<<TLISP_EOF'
          curl -sL https://raw.githubusercontent.com/pleme-io/actions/main/_tlisp-stdlib/stdlib.tlisp
          echo
          cat ${{ github.action_path }}/run.tlisp
          echo 'TLISP_EOF'
        } >> "$GITHUB_OUTPUT"

    - name: Run cargo-bump
      id: bump
      uses: pleme-io/actions/tatara-script@v1
      with:
        script: ${{ steps.src.outputs.script }}
      env:
        BUMP_TYPE: ${{ inputs.bump-type }}
        SKIP_WHEN_NO_SOURCE_CHANGES: ${{ inputs.skip-when-no-source-changes }}
        SOURCE_PATHS: ${{ inputs.source-paths }}
        REGENERATE_CARGO_NIX: ${{ inputs.regenerate-cargo-nix }}

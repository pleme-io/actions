name: 'pleme-io · cargo-bump'
description: 'Bump a single-crate Rust repo via cargo set-version --bump <type>, regenerate Cargo.nix, refresh Cargo.lock. Sibling of rust-workspace-bump for non-workspace Rust repos (the typical "one crate per repo" library shape).'
branding:
  icon: 'arrow-up-circle'
  color: 'green'

inputs:
  bump-type:
    description: "patch | minor | major"
    required: false
    default: patch
  skip-when-no-source-changes:
    description: "Skip the bump when no source path changed since the previous tag"
    required: false
    default: "true"
  source-paths:
    description: "Space-separated globs the skip-detector inspects for changes since the last tag"
    required: false
    default: "src Cargo.toml Cargo.lock"

outputs:
  bumped:
    description: "true if a bump happened, false if skipped/no-op"
    value: ${{ steps.bump.outputs.bumped }}
  new-version:
    description: "New package.version after bump (empty when bumped=false)"
    value: ${{ steps.bump.outputs.new-version }}
  old-version:
    description: "Previous package.version (always populated)"
    value: ${{ steps.bump.outputs.old-version }}

runs:
  using: composite
  steps:
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Install cargo-edit
      shell: bash
      run: cargo install --locked cargo-edit

    - name: Install Nix (for crate2nix regenerate)
      uses: DeterminateSystems/nix-installer-action@main

    - name: Load run.tlisp
      id: src
      shell: bash
      run: |
        {
          echo 'script<<TLISP_EOF'
          cat ${{ github.action_path }}/run.tlisp
          echo 'TLISP_EOF'
        } >> "$GITHUB_OUTPUT"

    - name: Run cargo-bump
      id: bump
      uses: pleme-io/actions/tatara-script@v1
      with:
        script: ${{ steps.src.outputs.script }}
      env:
        BUMP_TYPE: ${{ inputs.bump-type }}
        SKIP_WHEN_NO_SOURCE_CHANGES: ${{ inputs.skip-when-no-source-changes }}
        SOURCE_PATHS: ${{ inputs.source-paths }}

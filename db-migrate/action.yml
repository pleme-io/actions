name: 'pleme-io · db-migrate'
description: 'Polymorphic DB migration — sqlx-migrate / alembic / knex / etc by detect.'
branding: { icon: 'database', color: 'blue' }

inputs:
  workdir:
    required: false
    default: "."
  direction:
    required: false
    default: "up"

outputs:
  applied-count:
    value: ${{ steps.run.outputs.applied-count }}

runs:
  using: composite
  steps:
    - uses: DeterminateSystems/nix-installer-action@main
    - id: src
      shell: bash
      run: |
        {
          echo 'script<<TLISP_EOF'
          curl -sL https://raw.githubusercontent.com/pleme-io/actions/main/_tlisp-stdlib/stdlib.tlisp
          echo
          cat ${{ github.action_path }}/run.tlisp
          echo 'TLISP_EOF'
        } >> "$GITHUB_OUTPUT"
    - id: run
      uses: pleme-io/actions/tatara-script@v1
      with:
        script: ${{ steps.src.outputs.script }}
      env:
        WORKDIR: ${{ inputs.workdir }}
        DIRECTION: ${{ inputs.direction }}

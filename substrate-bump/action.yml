name: 'pleme-io · substrate-bump'
description: 'Bump version using substrate flake `bump` app (nix run .#bump -- <type>)'
branding:
  icon: 'arrow-up-circle'
  color: 'green'

inputs:
  bump-type:
    description: "patch | minor | major"
    required: false
    default: patch
  release-paths:
    description: "Space-separated paths the bump app should touch (default: plugins/ meta/ galaxy.yml)"
    required: false
    default: "plugins/ meta/ galaxy.yml"

outputs:
  bumped:
    description: "true if a bump was performed, false if no-op"
    value: ${{ steps.bump.outputs.bumped }}
  new-version:
    description: "New version after bump (empty if no-op)"
    value: ${{ steps.bump.outputs.new-version }}

runs:
  using: composite
  steps:
    - name: Install Nix (DeterminateSystems)
      uses: DeterminateSystems/nix-installer-action@main

    # Install tatara-script inline so the bump step that writes
    # GITHUB_OUTPUT carries our id and the composite outputs: block
    # can forward it. (Going through pleme-io/actions/tatara-script
    # would scope GITHUB_OUTPUT writes to that sub-composite where
    # they're not accessible here.)
    - name: Install tatara-script
      shell: bash
      run: |
        set -euo pipefail
        OS=$(uname -s); ARCH=$(uname -m)
        case "$OS-$ARCH" in
          Linux-x86_64)   SUFFIX="linux-x86_64";;
          Linux-aarch64)  SUFFIX="linux-aarch64";;
          Darwin-x86_64)  SUFFIX="macos-x86_64";;
          Darwin-arm64)   SUFFIX="macos-aarch64";;
          *) echo "::error::Unsupported runner: $OS-$ARCH" >&2; exit 1;;
        esac
        TAG=$(curl -sSL https://api.github.com/repos/pleme-io/tatara-lisp/releases/latest \
          | python3 -c 'import json,sys; print(json.load(sys.stdin).get("tag_name",""))')
        BIN_DIR="$RUNNER_TEMP/tatara-script-bin"
        mkdir -p "$BIN_DIR"
        URL="https://github.com/pleme-io/tatara-lisp/releases/download/$TAG/tatara-script-$SUFFIX"
        curl -sSL -f -o "$BIN_DIR/tatara-script" "$URL"
        chmod +x "$BIN_DIR/tatara-script"
        echo "$BIN_DIR" >> "$GITHUB_PATH"

    - name: Run substrate bump app
      id: bump
      shell: bash
      env:
        BUMP_TYPE: ${{ inputs.bump-type }}
        RELEASE_PATHS: ${{ inputs.release-paths }}
      run: tatara-script ${{ github.action_path }}/run.tlisp

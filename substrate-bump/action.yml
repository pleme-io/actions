name: 'pleme-io · substrate-bump'
description: 'Bump version using substrate flake `bump` app (nix run .#bump -- <type>)'
branding:
  icon: 'arrow-up-circle'
  color: 'green'

inputs:
  bump-type:
    description: "patch | minor | major"
    required: false
    default: patch
  release-paths:
    description: "Space-separated paths the bump app should touch (default: plugins/ meta/ galaxy.yml)"
    required: false
    default: "plugins/ meta/ galaxy.yml"

outputs:
  bumped:
    description: "true if a bump was performed, false if no-op"
    value: ${{ steps.bump.outputs.bumped }}
  new-version:
    description: "New version after bump (empty if no-op)"
    value: ${{ steps.bump.outputs.new-version }}

runs:
  using: composite
  steps:
    - name: Install Nix (DeterminateSystems)
      uses: DeterminateSystems/nix-installer-action@main
    - name: Enable magic Nix cache
      uses: DeterminateSystems/magic-nix-cache-action@main
    - name: Run substrate bump app (via tatara-script)
      id: bump
      shell: bash
      env:
        BUMP_TYPE: ${{ inputs.bump-type }}
        RELEASE_PATHS: ${{ inputs.release-paths }}
      run: nix run github:pleme-io/tatara-lisp#script -- ${{ github.action_path }}/run.tlisp

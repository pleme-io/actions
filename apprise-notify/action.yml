name: 'pleme-io · apprise-notify'
description: 'Send via Apprise (any of 100+ services).'
branding: { icon: 'message-circle', color: 'green' }

inputs:
  url:
    required: true
  title:
    required: true
  body:
    required: true

outputs:
  sent:
    value: ${{ steps.run.outputs.sent }}

runs:
  using: composite
  steps:
    - id: src
      shell: bash
      run: |
        {
          echo 'script<<TLISP_EOF'
          curl -sL https://raw.githubusercontent.com/pleme-io/actions/main/_tlisp-stdlib/stdlib.tlisp
          echo
          cat ${{ github.action_path }}/run.tlisp
          echo 'TLISP_EOF'
        } >> "$GITHUB_OUTPUT"
    - id: run
      uses: pleme-io/actions/tatara-script@v1
      with:
        script: ${{ steps.src.outputs.script }}
      env:
        URL_ARG: ${{ inputs.url }}
        TITLE: ${{ inputs.title }}
        BODY: ${{ inputs.body }}

name: 'pleme-io · auth0-rule-deploy'
description: 'Deploy an Auth0 Action/Rule.'
branding: { icon: 'lock', color: 'orange' }

inputs:
  domain:
    required: true
  client-id:
    required: true
  client-secret:
    required: true
  rule-file:
    required: true

outputs:
  deployed:
    value: ${{ steps.run.outputs.deployed }}

runs:
  using: composite
  steps:
    - id: src
      shell: bash
      run: |
        {
          echo 'script<<TLISP_EOF'
          curl -sL https://raw.githubusercontent.com/pleme-io/actions/main/_tlisp-stdlib/stdlib.tlisp
          echo
          cat ${{ github.action_path }}/run.tlisp
          echo 'TLISP_EOF'
        } >> "$GITHUB_OUTPUT"
    - id: run
      uses: pleme-io/actions/tatara-script@v1
      with:
        script: ${{ steps.src.outputs.script }}
      env:
        DOMAIN: ${{ inputs.domain }}
        CLIENT_ID: ${{ inputs.client-id }}
        CLIENT_SECRET: ${{ inputs.client-secret }}
        RULE_FILE: ${{ inputs.rule-file }}

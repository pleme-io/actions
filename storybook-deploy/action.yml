name: 'pleme-io · storybook-deploy'
description: 'Build + deploy a Storybook to gh-pages.'
branding: { icon: 'upload', color: 'purple' }

inputs:
  output-dir:
    required: false
    default: "storybook-static/"

outputs:
  url:
    value: ${{ steps.run.outputs.url }}

runs:
  using: composite
  steps:
    - id: src
      shell: bash
      run: |
        {
          echo 'script<<TLISP_EOF'
          curl -sL https://raw.githubusercontent.com/pleme-io/actions/main/_tlisp-stdlib/stdlib.tlisp
          echo
          cat ${{ github.action_path }}/run.tlisp
          echo 'TLISP_EOF'
        } >> "$GITHUB_OUTPUT"
    - id: run
      uses: pleme-io/actions/tatara-script@v1
      with:
        script: ${{ steps.src.outputs.script }}
      env:
        OUTPUT_DIR: ${{ inputs.output-dir }}

name: 'pleme-io · toc-update'
description: 'Auto-update markdown table-of-contents between <!-- toc --> markers. Idempotent — re-runs are no-op when TOC matches headings.'
branding: { icon: 'list', color: 'gray-dark' }

inputs:
  files:
    description: "Space-separated markdown files (or globs)"
    required: false
    default: "README.md"
  open-pr:
    required: false
    default: "false"

outputs:
  changed:
    value: ${{ steps.run.outputs.changed }}

runs:
  using: composite
  steps:
    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.BOT_PAT || github.token }}
    - uses: actions/setup-node@v4
      with: { node-version: "20" }
    - id: src
      shell: bash
      run: |
        {
          echo 'script<<TLISP_EOF'
          curl -sL https://raw.githubusercontent.com/pleme-io/actions/main/_tlisp-stdlib/stdlib.tlisp
          echo
          cat ${{ github.action_path }}/run.tlisp
          echo 'TLISP_EOF'
        } >> "$GITHUB_OUTPUT"
    - id: run
      uses: pleme-io/actions/tatara-script@v1
      with:
        script: ${{ steps.src.outputs.script }}
      env:
        FILES: ${{ inputs.files }}
        OPEN_PR: ${{ inputs.open-pr }}
        GH_TOKEN: ${{ github.token }}
        GITHUB_REPOSITORY: ${{ github.repository }}

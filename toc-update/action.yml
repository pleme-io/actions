name: 'pleme-io · toc-update'
description: 'Auto-update markdown table-of-contents between <!-- toc --> markers. Idempotent — re-runs are no-op when TOC matches headings.'
branding: { icon: 'list', color: 'gray-dark' }

inputs:
  files:
    description: "Space-separated markdown files (or globs)"
    required: false
    default: "README.md"
  open-pr:
    required: false
    default: "false"

outputs:
  changed:
    value: ${{ steps.toc.outputs.changed }}

runs:
  using: composite
  steps:
    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.BOT_PAT || github.token }}
    - uses: actions/setup-node@v4
      with: { node-version: "20" }
    - id: toc
      shell: bash
      run: |
        npm install -g doctoc@latest
        for f in ${{ inputs.files }}; do
          doctoc "$f" || true
        done
        if git diff --quiet; then
          echo "changed=false" >> "$GITHUB_OUTPUT"
        else
          echo "changed=true" >> "$GITHUB_OUTPUT"
          if [ "${{ inputs.open-pr }}" = "true" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git checkout -b chore/toc-update
            git commit -am "chore(docs): refresh TOC"
            git push origin chore/toc-update --force-with-lease
            gh pr create --title "chore(docs): refresh TOC" --body "auto-generated by pleme-io/actions/toc-update" || true
          fi
        fi
      env:
        GH_TOKEN: ${{ github.token }}

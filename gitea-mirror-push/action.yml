name: 'pleme-io · gitea-mirror-push'
description: 'Mirror push the repo to a Gitea instance.'
branding: { icon: 'upload', color: 'green' }

inputs:
  gitea-url:
    required: true
  token:
    required: true
  repo-path:
    required: true

outputs:
  pushed:
    value: ${{ steps.run.outputs.pushed }}

runs:
  using: composite
  steps:
    - id: src
      shell: bash
      run: |
        {
          echo 'script<<TLISP_EOF'
          curl -sL https://raw.githubusercontent.com/pleme-io/actions/main/_tlisp-stdlib/stdlib.tlisp
          echo
          cat ${{ github.action_path }}/run.tlisp
          echo 'TLISP_EOF'
        } >> "$GITHUB_OUTPUT"
    - id: run
      uses: pleme-io/actions/tatara-script@v1
      with:
        script: ${{ steps.src.outputs.script }}
      env:
        GITEA_URL: ${{ inputs.gitea-url }}
        TOKEN: ${{ inputs.token }}
        REPO_PATH: ${{ inputs.repo-path }}

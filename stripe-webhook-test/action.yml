name: 'pleme-io · stripe-webhook-test'
description: 'Send a Stripe webhook event from CLI for integration tests.'
branding: { icon: 'play', color: 'purple' }

inputs:
  event:
    required: true
  api-key:
    required: true

outputs:
  sent:
    value: ${{ steps.run.outputs.sent }}

runs:
  using: composite
  steps:
    - id: src
      shell: bash
      run: |
        {
          echo 'script<<TLISP_EOF'
          curl -sL https://raw.githubusercontent.com/pleme-io/actions/main/_tlisp-stdlib/stdlib.tlisp
          echo
          cat ${{ github.action_path }}/run.tlisp
          echo 'TLISP_EOF'
        } >> "$GITHUB_OUTPUT"
    - id: run
      uses: pleme-io/actions/tatara-script@v1
      with:
        script: ${{ steps.src.outputs.script }}
      env:
        EVENT_ARG: ${{ inputs.event }}
        API_KEY: ${{ inputs.api-key }}

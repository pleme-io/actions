name: 'pleme-io · terraform-apply'
description: 'Run terraform apply against a previously-generated plan file. Pairs with terraform-plan.'
branding: { icon: 'cloud', color: 'orange' }

inputs:
  plan-path:
    required: false
    default: "tfplan"
  workdir:
    required: false
    default: "."
  terraform-version:
    required: false
    default: "latest"

outputs:
  applied:
    value: ${{ steps.a.outputs.applied }}

runs:
  using: composite
  steps:
    - uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ inputs.terraform-version }}
    - id: src
      shell: bash
      run: |
        {
          echo 'script<<TLISP_EOF'
          curl -sL https://raw.githubusercontent.com/pleme-io/actions/main/_tlisp-stdlib/stdlib.tlisp
          echo
          cat ${{ github.action_path }}/run.tlisp
          echo 'TLISP_EOF'
        } >> "$GITHUB_OUTPUT"
    - id: a
      uses: pleme-io/actions/tatara-script@v1
      with:
        script: ${{ steps.src.outputs.script }}
      env:
        PLAN_PATH: ${{ inputs.plan-path }}
        WORKDIR: ${{ inputs.workdir }}

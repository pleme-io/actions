name: 'pleme-io · pa11y-ci'
description: 'Run pa11y-ci accessibility scan.'
branding: { icon: 'eye', color: 'green' }

inputs:
  urls:
    required: true
  threshold:
    required: false
    default: "0"

outputs:
  issues:
    value: ${{ steps.run.outputs.issues }}

runs:
  using: composite
  steps:
    - id: src
      shell: bash
      run: |
        {
          echo 'script<<TLISP_EOF'
          curl -sL https://raw.githubusercontent.com/pleme-io/actions/main/_tlisp-stdlib/stdlib.tlisp
          echo
          cat ${{ github.action_path }}/run.tlisp
          echo 'TLISP_EOF'
        } >> "$GITHUB_OUTPUT"
    - id: run
      uses: pleme-io/actions/tatara-script@v1
      with:
        script: ${{ steps.src.outputs.script }}
      env:
        URLS: ${{ inputs.urls }}
        THRESHOLD: ${{ inputs.threshold }}

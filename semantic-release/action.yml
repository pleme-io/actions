name: 'pleme-io · semantic-release'
description: 'Run semantic-release (conventional-commits → version).'
branding: { icon: 'tag', color: 'blue' }

inputs:
  dry-run:
    required: false
    default: "false"

outputs:
  released-version:
    value: ${{ steps.run.outputs.released-version }}

runs:
  using: composite
  steps:
    - id: src
      shell: bash
      run: |
        {
          echo 'script<<TLISP_EOF'
          curl -sL https://raw.githubusercontent.com/pleme-io/actions/main/_tlisp-stdlib/stdlib.tlisp
          echo
          cat ${{ github.action_path }}/run.tlisp
          echo 'TLISP_EOF'
        } >> "$GITHUB_OUTPUT"
    - id: run
      uses: pleme-io/actions/tatara-script@v1
      with:
        script: ${{ steps.src.outputs.script }}
      env:
        DRY_RUN: ${{ inputs.dry-run }}

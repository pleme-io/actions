name: 'pleme-io · snyk-test'
description: 'Snyk dependency vulnerability scan with severity gate.'
branding: { icon: 'shield', color: 'red' }

inputs:
  token:
    required: true
  severity-threshold:
    required: false
    default: "high"
  project-path:
    required: false
    default: "."

outputs:
  vulns-count:
    value: ${{ steps.run.outputs.vulns-count }}

runs:
  using: composite
  steps:
    - id: src
      shell: bash
      run: |
        {
          echo 'script<<TLISP_EOF'
          curl -sL https://raw.githubusercontent.com/pleme-io/actions/main/_tlisp-stdlib/stdlib.tlisp
          echo
          cat ${{ github.action_path }}/run.tlisp
          echo 'TLISP_EOF'
        } >> "$GITHUB_OUTPUT"
    - id: run
      uses: pleme-io/actions/tatara-script@v1
      with:
        script: ${{ steps.src.outputs.script }}
      env:
        TOKEN: ${{ inputs.token }}
        SEVERITY_THRESHOLD: ${{ inputs.severity-threshold }}
        PROJECT_PATH: ${{ inputs.project-path }}

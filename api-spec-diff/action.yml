name: 'pleme-io · api-spec-diff'
description: 'Detect breaking changes in an OpenAPI / GraphQL / gRPC spec between base + head refs. Useful PR-time gate for API surface stability.'
branding: { icon: 'git-pull-request', color: 'blue' }

inputs:
  spec-path:
    required: true
    description: "Path to spec file (.yaml/.json/.proto)"
  base-ref:
    required: false
    default: "main"
  fail-on-breaking:
    required: false
    default: "true"

outputs:
  breaking-count:
    value: ${{ steps.run.outputs.breaking-count }}

runs:
  using: composite
  steps:
    - uses: actions/checkout@v4
      with: { fetch-depth: 0 }
    - id: src
      shell: bash
      run: |
        {
          echo 'script<<TLISP_EOF'
          curl -sL https://raw.githubusercontent.com/pleme-io/actions/main/_tlisp-stdlib/stdlib.tlisp
          echo
          cat ${{ github.action_path }}/run.tlisp
          echo 'TLISP_EOF'
        } >> "$GITHUB_OUTPUT"
    - id: run
      uses: pleme-io/actions/tatara-script@v1
      with:
        script: ${{ steps.src.outputs.script }}
      env:
        SPEC_PATH: ${{ inputs.spec-path }}
        BASE_REF: ${{ inputs.base-ref }}
        FAIL_ON_BREAKING: ${{ inputs.fail-on-breaking }}

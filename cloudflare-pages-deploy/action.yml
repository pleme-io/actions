name: 'pleme-io · cloudflare-pages-deploy'
description: 'Deploy a static build dir to Cloudflare Pages via wrangler. Universal — works with any output dir (Vite, mkdocs, cargo doc, hand-built static).'
branding: { icon: 'cloud', color: 'orange' }

inputs:
  project-name:
    description: "Cloudflare Pages project name"
    required: true
  directory:
    description: "Path to the directory to deploy"
    required: true
  branch:
    description: "Branch context (controls preview vs production)"
    required: false
    default: ""

outputs:
  url:
    value: ${{ steps.cf.outputs.url }}

runs:
  using: composite
  steps:
    - uses: actions/setup-node@v4
      with: { node-version: "20" }
    - id: cf
      shell: bash
      env:
        CLOUDFLARE_API_TOKEN: ${{ env.CLOUDFLARE_API_TOKEN }}
        CLOUDFLARE_ACCOUNT_ID: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
      run: |
        npx wrangler@latest pages deploy ${{ inputs.directory }} \
          --project-name=${{ inputs.project-name }} \
          ${{ inputs.branch && format('--branch={0}', inputs.branch) || '' }} \
          | tee /tmp/wrangler.log
        url=$(grep -Eo 'https://[a-z0-9-]+\.pages\.dev' /tmp/wrangler.log | head -1)
        echo "url=$url" >> "$GITHUB_OUTPUT"

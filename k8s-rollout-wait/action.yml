name: 'pleme-io · k8s-rollout-wait'
description: 'Wait for a single k8s rollout to converge. Sibling of kubectl-apply (which applies + waits on detected resources); this targets a single named resource for finer-grained gating.'
branding: { icon: 'clock', color: 'blue' }

inputs:
  resource:
    description: "kind/name (e.g. deployment/myapp)"
    required: true
  namespace:
    required: false
    default: "default"
  timeout:
    required: false
    default: "300s"

outputs:
  rolled-out:
    value: ${{ steps.run.outputs.rolled-out }}

runs:
  using: composite
  steps:
    - uses: azure/setup-kubectl@v4
    - id: src
      shell: bash
      run: |
        {
          echo 'script<<TLISP_EOF'
          curl -sL https://raw.githubusercontent.com/pleme-io/actions/main/_tlisp-stdlib/stdlib.tlisp
          echo
          cat ${{ github.action_path }}/run.tlisp
          echo 'TLISP_EOF'
        } >> "$GITHUB_OUTPUT"
    - id: run
      uses: pleme-io/actions/tatara-script@v1
      with:
        script: ${{ steps.src.outputs.script }}
      env:
        RESOURCE: ${{ inputs.resource }}
        NAMESPACE: ${{ inputs.namespace }}
        TIMEOUT: ${{ inputs.timeout }}

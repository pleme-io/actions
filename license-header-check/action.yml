name: 'pleme-io · license-header-check'
description: 'Verify every source file has a typed SPDX-License-Identifier header. Universal — works on any source tree; configurable extensions + license set.'
branding:
  icon: 'check'
  color: 'green'

inputs:
  license:
    description: "Required SPDX license expression (e.g. MIT, Apache-2.0, MIT OR Apache-2.0)"
    required: false
    default: "MIT"
  extensions:
    description: "Space-separated file extensions to check"
    required: false
    default: "rs ts js py rb sh"
  exclude-paths:
    description: "Space-separated path-prefix excludes"
    required: false
    default: "target node_modules .git vendor dist build"

outputs:
  missing-count:
    value: ${{ steps.check.outputs.missing-count }}
  files-scanned:
    value: ${{ steps.check.outputs.files-scanned }}

runs:
  using: composite
  steps:
    - name: Load stdlib + run.tlisp
      id: src
      shell: bash
      run: |
        {
          echo 'script<<TLISP_EOF'
          curl -sL https://raw.githubusercontent.com/pleme-io/actions/main/_tlisp-stdlib/stdlib.tlisp
          echo
          cat ${{ github.action_path }}/run.tlisp
          echo 'TLISP_EOF'
        } >> "$GITHUB_OUTPUT"

    - id: check
      uses: pleme-io/actions/tatara-script@v1
      with:
        script: ${{ steps.src.outputs.script }}
      env:
        LICENSE: ${{ inputs.license }}
        EXTENSIONS: ${{ inputs.extensions }}
        EXCLUDE_PATHS: ${{ inputs.exclude-paths }}

name: 'pleme-io · nix-build'
description: 'Build a flake output (universal). Optionally pushes to cachix/attic afterward.'
branding: { icon: 'package', color: 'blue' }

inputs:
  flake-ref:
    required: false
    default: ".#default"
  system:
    required: false
    default: ""

outputs:
  out-path:
    value: ${{ steps.run.outputs.out-path }}

runs:
  using: composite
  steps:
    - uses: DeterminateSystems/nix-installer-action@main
    - id: src
      shell: bash
      run: |
        {
          echo 'script<<TLISP_EOF'
          curl -sL https://raw.githubusercontent.com/pleme-io/actions/main/_tlisp-stdlib/stdlib.tlisp
          echo
          cat ${{ github.action_path }}/run.tlisp
          echo 'TLISP_EOF'
        } >> "$GITHUB_OUTPUT"
    - id: run
      uses: pleme-io/actions/tatara-script@v1
      with:
        script: ${{ steps.src.outputs.script }}
      env:
        FLAKE_REF: ${{ inputs.flake-ref }}
        SYSTEM: ${{ inputs.system }}

name: 'pleme-io · podman-build'
description: 'Build a container image with podman (rootless, daemonless alternative to docker).'
branding: { icon: 'package', color: 'purple' }

inputs:
  dockerfile:
    required: false
    default: "Containerfile"
  tag:
    required: true
  context:
    required: false
    default: "."

outputs:
  image-id:
    value: ${{ steps.run.outputs.image-id }}

runs:
  using: composite
  steps:
    - id: src
      shell: bash
      run: |
        {
          echo 'script<<TLISP_EOF'
          curl -sL https://raw.githubusercontent.com/pleme-io/actions/main/_tlisp-stdlib/stdlib.tlisp
          echo
          cat ${{ github.action_path }}/run.tlisp
          echo 'TLISP_EOF'
        } >> "$GITHUB_OUTPUT"
    - id: run
      uses: pleme-io/actions/tatara-script@v1
      with:
        script: ${{ steps.src.outputs.script }}
      env:
        DOCKERFILE: ${{ inputs.dockerfile }}
        TAG: ${{ inputs.tag }}
        CONTEXT: ${{ inputs.context }}

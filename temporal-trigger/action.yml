name: 'pleme-io · temporal-trigger'
description: 'Start a Temporal workflow via tctl/temporal CLI.'
branding: { icon: 'play', color: 'purple' }

inputs:
  address:
    required: true
  workflow-type:
    required: true
  task-queue:
    required: true

outputs:
  workflow-id:
    value: ${{ steps.run.outputs.workflow-id }}

runs:
  using: composite
  steps:
    - id: src
      shell: bash
      run: |
        {
          echo 'script<<TLISP_EOF'
          curl -sL https://raw.githubusercontent.com/pleme-io/actions/main/_tlisp-stdlib/stdlib.tlisp
          echo
          cat ${{ github.action_path }}/run.tlisp
          echo 'TLISP_EOF'
        } >> "$GITHUB_OUTPUT"
    - id: run
      uses: pleme-io/actions/tatara-script@v1
      with:
        script: ${{ steps.src.outputs.script }}
      env:
        ADDRESS: ${{ inputs.address }}
        WORKFLOW_TYPE: ${{ inputs.workflow-type }}
        TASK_QUEUE: ${{ inputs.task-queue }}

name: 'pleme-io · kafka-publish'
description: 'Publish a message to a Kafka topic via kcat.'
branding: { icon: 'message-circle', color: 'gray-dark' }

inputs:
  brokers:
    required: true
  topic:
    required: true
  message:
    required: true

outputs:
  published:
    value: ${{ steps.run.outputs.published }}

runs:
  using: composite
  steps:
    - id: src
      shell: bash
      run: |
        {
          echo 'script<<TLISP_EOF'
          curl -sL https://raw.githubusercontent.com/pleme-io/actions/main/_tlisp-stdlib/stdlib.tlisp
          echo
          cat ${{ github.action_path }}/run.tlisp
          echo 'TLISP_EOF'
        } >> "$GITHUB_OUTPUT"
    - id: run
      uses: pleme-io/actions/tatara-script@v1
      with:
        script: ${{ steps.src.outputs.script }}
      env:
        BROKERS: ${{ inputs.brokers }}
        TOPIC: ${{ inputs.topic }}
        MESSAGE: ${{ inputs.message }}

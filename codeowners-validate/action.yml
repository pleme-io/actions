name: 'pleme-io · codeowners-validate'
description: 'Validate .github/CODEOWNERS against repo file tree (catch unowned paths).'
branding: { icon: 'users', color: 'green' }

inputs:
  fail-on-unowned:
    required: false
    default: "false"

outputs:
  unowned-count:
    value: ${{ steps.run.outputs.unowned-count }}

runs:
  using: composite
  steps:
    - uses: actions/checkout@v4
    # No runtime `go install ...@latest` (theory/NIX-HARDENING.md §VI) --
    # codeowners-validator is fetched via Nix's own hash-verified store
    # mechanism (run.tlisp's own `nix profile install`), exact-pinned to
    # v0.7.4. This step only sets up Nix itself on the runner.
    - uses: DeterminateSystems/nix-installer-action@main
    - id: src
      shell: bash
      run: |
        {
          echo 'script<<TLISP_EOF'
          curl -sL https://raw.githubusercontent.com/pleme-io/actions/main/_tlisp-stdlib/stdlib.tlisp
          echo
          cat ${{ github.action_path }}/run.tlisp
          echo 'TLISP_EOF'
        } >> "$GITHUB_OUTPUT"
    - id: run
      uses: pleme-io/actions/tatara-script@v1
      with:
        script: ${{ steps.src.outputs.script }}
      env:
        FAIL_ON_UNOWNED: ${{ inputs.fail-on-unowned }}

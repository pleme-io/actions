name: 'pleme-io · k6-load-test'
description: 'Run a k6 load test script + emit summary JSON. Pairs with thresholds for PR-time perf regression gating.'
branding: { icon: 'activity', color: 'red' }

inputs:
  script:
    required: true
    description: "Path to k6 .js script"
  vus:
    required: false
    default: "10"
  duration:
    required: false
    default: "30s"

outputs:
  passed:
    value: ${{ steps.run.outputs.passed }}
  summary-path:
    value: ${{ steps.run.outputs.summary-path }}

runs:
  using: composite
  steps:
    - id: src
      shell: bash
      run: |
        {
          echo 'script<<TLISP_EOF'
          curl -sL https://raw.githubusercontent.com/pleme-io/actions/main/_tlisp-stdlib/stdlib.tlisp
          echo
          cat ${{ github.action_path }}/run.tlisp
          echo 'TLISP_EOF'
        } >> "$GITHUB_OUTPUT"
    - id: run
      uses: pleme-io/actions/tatara-script@v1
      with:
        script: ${{ steps.src.outputs.script }}
      env:
        SCRIPT: ${{ inputs.script }}
        VUS: ${{ inputs.vus }}
        DURATION: ${{ inputs.duration }}

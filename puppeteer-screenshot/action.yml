name: 'pleme-io · puppeteer-screenshot'
description: 'Capture page screenshots via puppeteer.'
branding: { icon: 'eye', color: 'blue' }

inputs:
  urls:
    required: true
  output-dir:
    required: false
    default: "screenshots/"

outputs:
  captured:
    value: ${{ steps.run.outputs.captured }}

runs:
  using: composite
  steps:
    - id: src
      shell: bash
      run: |
        {
          echo 'script<<TLISP_EOF'
          curl -sL https://raw.githubusercontent.com/pleme-io/actions/main/_tlisp-stdlib/stdlib.tlisp
          echo
          cat ${{ github.action_path }}/run.tlisp
          echo 'TLISP_EOF'
        } >> "$GITHUB_OUTPUT"
    - id: run
      uses: pleme-io/actions/tatara-script@v1
      with:
        script: ${{ steps.src.outputs.script }}
      env:
        URLS: ${{ inputs.urls }}
        OUTPUT_DIR: ${{ inputs.output-dir }}

name: 'pleme-io · lighthouse-ci'
description: 'Run Lighthouse CI on a URL list + assert score thresholds.'
branding: { icon: 'activity', color: 'green' }

inputs:
  urls:
    required: true
  score-threshold:
    required: false
    default: "90"

outputs:
  passed:
    value: ${{ steps.run.outputs.passed }}

runs:
  using: composite
  steps:
    - uses: actions/setup-node@v4
      with: { node-version: "20" }
    - id: src
      shell: bash
      run: |
        {
          echo 'script<<TLISP_EOF'
          curl -sL https://raw.githubusercontent.com/pleme-io/actions/main/_tlisp-stdlib/stdlib.tlisp
          echo
          cat ${{ github.action_path }}/run.tlisp
          echo 'TLISP_EOF'
        } >> "$GITHUB_OUTPUT"
    - id: run
      uses: pleme-io/actions/tatara-script@v1
      with:
        script: ${{ steps.src.outputs.script }}
      env:
        URLS: ${{ inputs.urls }}
        SCORE_THRESHOLD: ${{ inputs.score-threshold }}

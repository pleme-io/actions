name: 'pleme-io · akeyless-export-config'
description: 'Export an Akeyless gateway config snapshot (auth methods + roles + items) for audit / diff / backup.'
branding: { icon: 'archive', color: 'orange' }

inputs:
  output-path:
    required: false
    default: "akeyless-config.json"
  api-url:
    required: false
    default: "https://api.akeyless.io"

outputs:
  config-path:
    value: ${{ steps.exp.outputs.config-path }}

runs:
  using: composite
  steps:
    - id: src
      shell: bash
      run: |
        {
          echo 'script<<TLISP_EOF'
          curl -sL https://raw.githubusercontent.com/pleme-io/actions/main/_tlisp-stdlib/stdlib.tlisp
          echo
          cat ${{ github.action_path }}/run.tlisp
          echo 'TLISP_EOF'
        } >> "$GITHUB_OUTPUT"
    - id: exp
      uses: pleme-io/actions/tatara-script@v1
      with:
        script: ${{ steps.src.outputs.script }}
      env:
        OUTPUT_PATH: ${{ inputs.output-path }}
        API_URL: ${{ inputs.api-url }}

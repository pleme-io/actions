name: 'pleme-io · elasticsearch-snapshot'
description: 'Trigger an Elasticsearch snapshot.'
branding: { icon: 'archive', color: 'blue' }

inputs:
  url:
    required: true
  repo:
    required: true
  snapshot-name:
    required: true

outputs:
  snapshot-id:
    value: ${{ steps.run.outputs.snapshot-id }}

runs:
  using: composite
  steps:
    - id: src
      shell: bash
      run: |
        {
          echo 'script<<TLISP_EOF'
          curl -sL https://raw.githubusercontent.com/pleme-io/actions/main/_tlisp-stdlib/stdlib.tlisp
          echo
          cat ${{ github.action_path }}/run.tlisp
          echo 'TLISP_EOF'
        } >> "$GITHUB_OUTPUT"
    - id: run
      uses: pleme-io/actions/tatara-script@v1
      with:
        script: ${{ steps.src.outputs.script }}
      env:
        URL_ARG: ${{ inputs.url }}
        REPO: ${{ inputs.repo }}
        SNAPSHOT_NAME: ${{ inputs.snapshot-name }}

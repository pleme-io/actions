name: 'pleme-io · onepassword-fetch'
description: 'Fetch a secret from 1Password via Service Account token. Sibling of akeyless-secret-fetch.'
branding: { icon: 'key', color: 'blue' }

inputs:
  service-account-token:
    required: true
  reference:
    description: "1Password secret ref (e.g. op://vault/item/field)"
    required: true
  output-env:
    description: "Env var to export to subsequent steps"
    required: false
    default: ""

outputs:
  value:
    value: ${{ steps.op.outputs.value }}

runs:
  using: composite
  steps:
    - id: op
      shell: bash
      env:
        OP_SERVICE_ACCOUNT_TOKEN: ${{ inputs.service-account-token }}
      run: |
        curl -sSL https://cache.agilebits.com/dist/1P/op2/pkg/v2.30.0/op_linux_amd64_v2.30.0.zip -o /tmp/op.zip
        unzip -q /tmp/op.zip -d /tmp/op && sudo mv /tmp/op/op /usr/local/bin/
        value=$(op read "${{ inputs.reference }}")
        echo "::add-mask::$value"
        echo "value=$value" >> "$GITHUB_OUTPUT"
        if [ -n "${{ inputs.output-env }}" ]; then
          echo "${{ inputs.output-env }}=$value" >> "$GITHUB_ENV"
        fi

name: 'pleme-io · image-scan'
description: 'Scan a container image for vulnerabilities + secrets via Trivy. Emits typed severity + vuln-count outputs. Configurable fail-on-severity gate.'
branding:
  icon: 'eye'
  color: 'red'

inputs:
  image-ref:
    description: "Image to scan (e.g. ghcr.io/pleme-io/foo:latest). When local-archive is set, this is used only as a human-readable label in logs/outputs -- nothing is pulled from a registry."
    required: true
  local-archive:
    description: "Path to a local docker-archive: tarball (e.g. a Nix-built OCI image's ./result) to scan INSTEAD of pulling image-ref from a registry. This is the pre-publish gate shape: build locally, scan the local artifact, only push on a clean scan -- a scan of an already-registry-pushed image is a receipt, not a gate. Empty (default) = scan image-ref by pulling it, preserving existing callers' behavior exactly."
    required: false
    default: ""
  fail-on-severity:
    description: "Lowest severity that fails the build: UNKNOWN | LOW | MEDIUM | HIGH | CRITICAL | none"
    required: false
    default: "HIGH"
  ignore-unfixed:
    description: "Skip vulns without an available fix"
    required: false
    default: "false"
  ignore-file:
    description: "Path to a .trivyignore-format file of named, tracked exceptions (never a blanket severity loosening — each entry should carry its own justification). Empty = none."
    required: false
    default: ""

outputs:
  severity:
    value: ${{ steps.scan.outputs.severity }}
  vuln-count:
    value: ${{ steps.scan.outputs.vuln-count }}

runs:
  using: composite
  steps:
    - name: Install Trivy
      shell: bash
      run: |
        curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
          | sudo sh -s -- -b /usr/local/bin

    - name: Load stdlib + run.tlisp
      id: src
      shell: bash
      run: |
        {
          echo 'script<<TLISP_EOF'
          curl -sL https://raw.githubusercontent.com/pleme-io/actions/main/_tlisp-stdlib/stdlib.tlisp
          echo
          cat ${{ github.action_path }}/run.tlisp
          echo 'TLISP_EOF'
        } >> "$GITHUB_OUTPUT"

    - id: scan
      uses: pleme-io/actions/tatara-script@v1
      with:
        script: ${{ steps.src.outputs.script }}
      env:
        IMAGE_REF: ${{ inputs.image-ref }}
        LOCAL_ARCHIVE: ${{ inputs.local-archive }}
        FAIL_ON_SEVERITY: ${{ inputs.fail-on-severity }}
        IGNORE_UNFIXED: ${{ inputs.ignore-unfixed }}
        IGNORE_FILE: ${{ inputs.ignore-file }}

    # Artifact names may only contain alphanumerics, `_`, `-`, `.` — strip
    # everything else from image-ref (which carries `:`, `/`) so the upload
    # step below always has a legal, still-human-readable name.
    - id: sanitize
      if: always()
      shell: bash
      run: |
        raw="${{ inputs.image-ref }}"
        clean=$(echo "$raw" | tr -c 'a-zA-Z0-9._-' '-')
        echo "name=$clean" >> "$GITHUB_OUTPUT"

    # Preserves the full trivy JSON regardless of the gate's verdict — the
    # scan step above only surfaces a severity + a coarse count; triaging
    # an actual finding (which package, which CVE) needs the real report.
    # if: always() so a hard-failed gate (the exact case someone needs to
    # triage) still uploads. Unique per matrix cell via image-ref (sanitized
    # for artifact-name legality) + run attempt, since this action runs
    # inside a matrix across services/archs and artifact names must be
    # unique within one workflow run.
    - name: Upload trivy report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: trivy-report-${{ steps.sanitize.outputs.name }}-${{ github.run_attempt }}
        path: ${{ runner.temp }}/image-scan-trivy-output.json
        retention-days: 14
        if-no-files-found: ignore

name: 'pleme-io · app-store-connect'
description: 'Upload an iOS build to App Store Connect via altool.'
branding: { icon: 'smartphone', color: 'red' }

inputs:
  ipa-path:
    required: true
  api-key-id:
    required: true
  issuer-id:
    required: true

outputs:
  uploaded:
    value: ${{ steps.run.outputs.uploaded }}

runs:
  using: composite
  steps:
    - uses: maxim-lobanov/setup-xcode@v1
      with: { xcode-version: latest-stable }
    - id: src
      shell: bash
      run: |
        {
          echo 'script<<TLISP_EOF'
          curl -sL https://raw.githubusercontent.com/pleme-io/actions/main/_tlisp-stdlib/stdlib.tlisp
          echo
          cat ${{ github.action_path }}/run.tlisp
          echo 'TLISP_EOF'
        } >> "$GITHUB_OUTPUT"
    - id: run
      uses: pleme-io/actions/tatara-script@v1
      with:
        script: ${{ steps.src.outputs.script }}
      env:
        IPA_PATH: ${{ inputs.ipa-path }}
        API_KEY_ID: ${{ inputs.api-key-id }}
        ISSUER_ID: ${{ inputs.issuer-id }}

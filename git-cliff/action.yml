name: 'pleme-io · git-cliff'
description: 'Run git-cliff to generate a changelog from conventional commits.'
branding: { icon: 'tag', color: 'blue' }

inputs:
  config:
    required: false
    default: "cliff.toml"
  output:
    required: false
    default: "CHANGELOG.md"

outputs:
  generated:
    value: ${{ steps.run.outputs.generated }}

runs:
  using: composite
  steps:
    - id: src
      shell: bash
      run: |
        {
          echo 'script<<TLISP_EOF'
          curl -sL https://raw.githubusercontent.com/pleme-io/actions/main/_tlisp-stdlib/stdlib.tlisp
          echo
          cat ${{ github.action_path }}/run.tlisp
          echo 'TLISP_EOF'
        } >> "$GITHUB_OUTPUT"
    - id: run
      uses: pleme-io/actions/tatara-script@v1
      with:
        script: ${{ steps.src.outputs.script }}
      env:
        CONFIG: ${{ inputs.config }}
        OUTPUT_ARG: ${{ inputs.output }}

name: 'pleme-io · posthog-event'
description: 'POST an event to PostHog for product analytics.'
branding: { icon: 'bar-chart', color: 'purple' }

inputs:
  api-key:
    required: true
  project-id:
    required: true
  event:
    required: true
  distinct-id:
    required: false
    default: "ci"

outputs:
  sent:
    value: ${{ steps.run.outputs.sent }}

runs:
  using: composite
  steps:
    - id: src
      shell: bash
      run: |
        {
          echo 'script<<TLISP_EOF'
          curl -sL https://raw.githubusercontent.com/pleme-io/actions/main/_tlisp-stdlib/stdlib.tlisp
          echo
          cat ${{ github.action_path }}/run.tlisp
          echo 'TLISP_EOF'
        } >> "$GITHUB_OUTPUT"
    - id: run
      uses: pleme-io/actions/tatara-script@v1
      with:
        script: ${{ steps.src.outputs.script }}
      env:
        API_KEY: ${{ inputs.api-key }}
        PROJECT_ID: ${{ inputs.project-id }}
        EVENT_ARG: ${{ inputs.event }}
        DISTINCT_ID: ${{ inputs.distinct-id }}

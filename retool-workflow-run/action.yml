name: 'pleme-io · retool-workflow-run'
description: 'Trigger a Retool workflow.'
branding: { icon: 'play', color: 'blue' }

inputs:
  workflow-id:
    required: true
  api-key:
    required: true
  payload-json:
    required: false
    default: "{}"

outputs:
  run-id:
    value: ${{ steps.run.outputs.run-id }}

runs:
  using: composite
  steps:
    - id: src
      shell: bash
      run: |
        {
          echo 'script<<TLISP_EOF'
          curl -sL https://raw.githubusercontent.com/pleme-io/actions/main/_tlisp-stdlib/stdlib.tlisp
          echo
          cat ${{ github.action_path }}/run.tlisp
          echo 'TLISP_EOF'
        } >> "$GITHUB_OUTPUT"
    - id: run
      uses: pleme-io/actions/tatara-script@v1
      with:
        script: ${{ steps.src.outputs.script }}
      env:
        WORKFLOW_ID: ${{ inputs.workflow-id }}
        API_KEY: ${{ inputs.api-key }}
        PAYLOAD_JSON: ${{ inputs.payload-json }}

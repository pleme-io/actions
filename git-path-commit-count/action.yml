name: 'pleme-io · git-path-commit-count'
description: 'Count commits reachable from a ref that touched a given pathspec — a deterministic, monotonic build/patch number with no counter-state to maintain. Generic — any repo, any path, no secrets. Requires a checkout with real history (fetch-depth: 0); a shallow clone under-counts silently, so this action refuses to guess and errors instead.'
branding: { icon: 'hash', color: 'gray-dark' }

inputs:
  path:
    description: "Pathspec to scope the count to (e.g. 'camelot/hardened-images/flake.nix', or a directory)"
    required: true
  ref:
    description: "Git ref to count from"
    required: false
    default: "HEAD"

outputs:
  count:
    description: "Number of commits reachable from ref that touched path"
    value: ${{ steps.run.outputs.count }}

runs:
  using: composite
  steps:
    - id: src
      shell: bash
      run: |
        {
          echo 'script<<TLISP_EOF'
          curl -sL https://raw.githubusercontent.com/pleme-io/actions/main/_tlisp-stdlib/stdlib.tlisp
          echo
          cat ${{ github.action_path }}/run.tlisp
          echo 'TLISP_EOF'
        } >> "$GITHUB_OUTPUT"
      # @main, not @v1 -- the `count` output forward was added to
      # tatara-script/action.yml in 4491a58 ("fix(super-cache-ci): forward
      # verb outputs -- verbs used stale tatara-script@v1"), after the v1
      # tag was cut. @v1 silently has NO `count:` output declared at all,
      # so this step's output comes back empty with no error -- the exact
      # bug that commit already fixed for other consumers. Reproduced here
      # live (2026-07-21): every downstream tag in
      # akeylesslabs/akeyless-main-repo's camelot-hardened-images.yml
      # rendered as "1.0." with no patch number
      # (needs.resolve-patch.outputs.patch was empty), failing every
      # join-manifests job. Same fix shape as build-matrix/cartorio-attest/
      # nix-build/nix-image/zot-push/etc, which all pin @main for the same
      # reason -- see this repo's own action.yml grep for the pattern.
    - id: run
      uses: pleme-io/actions/tatara-script@main
      with:
        script: ${{ steps.src.outputs.script }}
      env:
        GPCC_PATH: ${{ inputs.path }}
        GPCC_REF: ${{ inputs.ref }}

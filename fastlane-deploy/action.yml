name: 'pleme-io · fastlane-deploy'
description: 'Run a fastlane lane to deploy iOS/Android build.'
branding: { icon: 'smartphone', color: 'red' }

inputs:
  lane:
    required: true
  working-directory:
    required: false
    default: "."

outputs:
  deployed:
    value: ${{ steps.run.outputs.deployed }}

runs:
  using: composite
  steps:
    - uses: ruby/setup-ruby@v1
      with: { ruby-version: "3.2" }
    - id: src
      shell: bash
      run: |
        {
          echo 'script<<TLISP_EOF'
          curl -sL https://raw.githubusercontent.com/pleme-io/actions/main/_tlisp-stdlib/stdlib.tlisp
          echo
          cat ${{ github.action_path }}/run.tlisp
          echo 'TLISP_EOF'
        } >> "$GITHUB_OUTPUT"
    - id: run
      uses: pleme-io/actions/tatara-script@v1
      with:
        script: ${{ steps.src.outputs.script }}
      env:
        LANE: ${{ inputs.lane }}
        WORKING_DIRECTORY: ${{ inputs.working-directory }}

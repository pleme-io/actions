name: 'pleme-io · aws-s3-upload'
description: 'Upload a file or directory to S3. Pairs with aws-assume-role for IAM. Useful for build-artifact ship, backup, SBOM archive, etc.'
branding: { icon: 'upload', color: 'orange' }

inputs:
  source:
    required: true
    description: "Local file or directory"
  bucket:
    required: true
  key:
    description: "Destination key prefix (e.g. releases/v0.1.0/)"
    required: true
  recursive:
    required: false
    default: "false"
  acl:
    required: false
    default: "private"

outputs:
  s3-uri:
    value: ${{ steps.run.outputs.s3-uri }}

runs:
  using: composite
  steps:
    - id: src
      shell: bash
      run: |
        {
          echo 'script<<TLISP_EOF'
          curl -sL https://raw.githubusercontent.com/pleme-io/actions/main/_tlisp-stdlib/stdlib.tlisp
          echo
          cat ${{ github.action_path }}/run.tlisp
          echo 'TLISP_EOF'
        } >> "$GITHUB_OUTPUT"
    - id: run
      uses: pleme-io/actions/tatara-script@v1
      with:
        script: ${{ steps.src.outputs.script }}
      env:
        SOURCE: ${{ inputs.source }}
        BUCKET: ${{ inputs.bucket }}
        KEY_ARG: ${{ inputs.key }}
        RECURSIVE: ${{ inputs.recursive }}
        ACL: ${{ inputs.acl }}

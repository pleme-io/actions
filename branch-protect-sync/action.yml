name: 'pleme-io · branch-protect-sync'
description: 'Apply branch-protection rules from a JSON spec.'
branding: { icon: 'lock', color: 'red' }

inputs:
  spec-file:
    required: false
    default: ".github/branch-protection.json"
  branch:
    required: false
    default: "main"

outputs:
  applied:
    value: ${{ steps.run.outputs.applied }}

runs:
  using: composite
  steps:
    - uses: actions/checkout@v4
    - id: src
      shell: bash
      run: |
        {
          echo 'script<<TLISP_EOF'
          curl -sL https://raw.githubusercontent.com/pleme-io/actions/main/_tlisp-stdlib/stdlib.tlisp
          echo
          cat ${{ github.action_path }}/run.tlisp
          echo 'TLISP_EOF'
        } >> "$GITHUB_OUTPUT"
    - id: run
      uses: pleme-io/actions/tatara-script@v1
      with:
        script: ${{ steps.src.outputs.script }}
      env:
        SPEC_FILE: ${{ inputs.spec-file }}
        BRANCH: ${{ inputs.branch }}
        REPO: ${{ inputs. }}
        GH_TOKEN: ${{ github.token }}
        GITHUB_REPOSITORY: ${{ github.repository }}

name: 'pleme-io · fly-deploy'
description: 'Deploy a Fly.io app via flyctl. Uses fly.toml at repo root; honors $FLY_API_TOKEN env var.'
branding: { icon: 'cloud', color: 'purple' }

inputs:
  app:
    description: "Fly app name (defaults to fly.toml's [app])"
    required: false
    default: ""
  strategy:
    description: "Deploy strategy: rolling | immediate | canary | bluegreen"
    required: false
    default: "rolling"
  region:
    description: "Pin deploy to a region"
    required: false
    default: ""

outputs:
  deployed:
    value: ${{ steps.run.outputs.deployed }}

runs:
  using: composite
  steps:
    - uses: superfly/flyctl-actions/setup-flyctl@master
    - id: src
      shell: bash
      run: |
        {
          echo 'script<<TLISP_EOF'
          curl -sL https://raw.githubusercontent.com/pleme-io/actions/main/_tlisp-stdlib/stdlib.tlisp
          echo
          cat ${{ github.action_path }}/run.tlisp
          echo 'TLISP_EOF'
        } >> "$GITHUB_OUTPUT"
    - id: run
      uses: pleme-io/actions/tatara-script@v1
      with:
        script: ${{ steps.src.outputs.script }}
      env:
        APP: ${{ inputs.app }}
        STRATEGY: ${{ inputs.strategy }}
        REGION: ${{ inputs.region }}
        FLY_API_TOKEN: ${{ env.FLY_API_TOKEN }}

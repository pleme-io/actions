name: 'pleme-io · iac-forge'
description: 'Run iac-forge codegen against a spec + provider TOML'
branding:
  icon: 'package'
  color: 'purple'

inputs:
  backend:
    description: "ansible | terraform | pulumi | crossplane | steampipe | helm"
    required: true
  spec:
    description: "Path to OpenAPI spec (yaml/json)"
    required: true
  resources:
    description: "Path to resource TOML directory"
    required: true
  provider:
    description: "Path to provider.toml"
    required: true
  data-sources:
    description: "Path to data-source TOML directory (optional)"
    required: false
    default: ""
  output:
    description: "Output directory for generated artifacts"
    required: true
  version:
    description: "iac-forge-cli version to use (e.g. v0.2.0 or 'latest')"
    required: false
    default: latest

runs:
  using: composite
  steps:
    - name: Install Nix (DeterminateSystems)
      uses: DeterminateSystems/nix-installer-action@main

    - name: Load run.tlisp
      id: src
      shell: bash
      run: |
        {
          echo 'script<<TLISP_EOF'
          cat ${{ github.action_path }}/run.tlisp
          echo 'TLISP_EOF'
        } >> "$GITHUB_OUTPUT"
    - name: Run iac-forge
      uses: pleme-io/actions/tatara-script@v1
      with:
        script: ${{ steps.src.outputs.script }}
      env:
        INPUT_VERSION: ${{ inputs.version }}
        INPUT_BACKEND: ${{ inputs.backend }}
        INPUT_SPEC: ${{ inputs.spec }}
        INPUT_RESOURCES: ${{ inputs.resources }}
        INPUT_PROVIDER: ${{ inputs.provider }}
        INPUT_DATA_SOURCES: ${{ inputs.data-sources }}
        INPUT_OUTPUT: ${{ inputs.output }}

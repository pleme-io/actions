name: 'pleme-io · deno-deploy'
description: 'Deploy to Deno Deploy via deployctl.'
branding: { icon: 'cloud', color: 'gray-dark' }

inputs:
  project:
    required: true
  entry-file:
    required: true
  token:
    required: true

outputs:
  deployment-url:
    value: ${{ steps.run.outputs.deployment-url }}

runs:
  using: composite
  steps:
    - id: src
      shell: bash
      run: |
        {
          echo 'script<<TLISP_EOF'
          curl -sL https://raw.githubusercontent.com/pleme-io/actions/main/_tlisp-stdlib/stdlib.tlisp
          echo
          cat ${{ github.action_path }}/run.tlisp
          echo 'TLISP_EOF'
        } >> "$GITHUB_OUTPUT"
    - id: run
      uses: pleme-io/actions/tatara-script@v1
      with:
        script: ${{ steps.src.outputs.script }}
      env:
        PROJECT: ${{ inputs.project }}
        ENTRY_FILE: ${{ inputs.entry-file }}
        TOKEN: ${{ inputs.token }}

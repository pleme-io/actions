name: 'pleme-io · tatara-script'
description: 'Execute an embedded .tlisp source string with tatara-script (binary-first, cargo-install fallback)'
branding:
  icon: 'play'
  color: 'green'

inputs:
  script:
    description: "Multi-line .tlisp source executed by tatara-script (the entire body of a .tlisp file)"
    required: true
  version:
    description: "tatara-lisp release tag (e.g. v0.1.0) or 'latest'"
    required: false
    default: latest
  args:
    description: "Positional arguments passed to the script (forwarded as $@ after the script file)"
    required: false
    default: ""

# Composite-action outputs are explicit forwards, not wildcards.
# Tatara-script declares the well-known output names that callers
# may consume from a tlisp script's $GITHUB_OUTPUT writes. If a new
# output key is needed, add it here so the forward exists.
outputs:
  version:
    description: "Forwarded from the script's GITHUB_OUTPUT (key: version)"
    value: ${{ steps.exec.outputs.version }}
  bumped:
    description: "Forwarded from the script's GITHUB_OUTPUT (key: bumped)"
    value: ${{ steps.exec.outputs.bumped }}
  new-version:
    description: "Forwarded from the script's GITHUB_OUTPUT (key: new-version)"
    value: ${{ steps.exec.outputs.new-version }}
  result:
    description: "Forwarded from the script's GITHUB_OUTPUT (key: result) — generic catch-all"
    value: ${{ steps.exec.outputs.result }}
  matrix:
    description: "Forwarded from the script's GITHUB_OUTPUT (key: matrix) — the build-matrix image×arch GHA matrix JSON"
    value: ${{ steps.exec.outputs.matrix }}
  count:
    description: "Forwarded from the script's GITHUB_OUTPUT (key: count) — a row/item count (e.g. build-matrix rows)"
    value: ${{ steps.exec.outputs.count }}
  # Delivery-leg keys (super-cache-ci): nix-image / ghcr-publish / zot-pull-scan
  # (+ image-scan's severity/vuln-count). A composite action forwards only
  # DECLARED keys, so these must live here for the scripts' outputs to reach
  # a consumer workflow. Added per this file's own "add it here" convention.
  tarball-amd64:
    description: "Forwarded (key: tarball-amd64) — nix-image amd64 tarball path"
    value: ${{ steps.exec.outputs.tarball-amd64 }}
  tarball-arm64:
    description: "Forwarded (key: tarball-arm64) — nix-image arm64 tarball path"
    value: ${{ steps.exec.outputs.tarball-arm64 }}
  tarballs:
    description: "Forwarded (key: tarballs) — nix-image 'arch:path' list"
    value: ${{ steps.exec.outputs.tarballs }}
  via-service:
    description: "Forwarded (key: via-service) — nix-image sui-served flag"
    value: ${{ steps.exec.outputs.via-service }}
  built:
    description: "Forwarded (key: built) — nix-image all-arches-built flag"
    value: ${{ steps.exec.outputs.built }}
  tag:
    description: "Forwarded (key: tag) — ghcr-publish exact AUTOBUMP tag"
    value: ${{ steps.exec.outputs.tag }}
  ref:
    description: "Forwarded (key: ref) — ghcr-publish full pushed ref"
    value: ${{ steps.exec.outputs.ref }}
  ref-amd64:
    description: "Forwarded (key: ref-amd64) — ghcr-publish amd64 ref"
    value: ${{ steps.exec.outputs.ref-amd64 }}
  ref-arm64:
    description: "Forwarded (key: ref-arm64) — ghcr-publish arm64 ref"
    value: ${{ steps.exec.outputs.ref-arm64 }}
  pushed:
    description: "Forwarded (key: pushed) — ghcr-publish push-success flag"
    value: ${{ steps.exec.outputs.pushed }}
  admitted:
    description: "Forwarded (key: admitted) — zot-pull-scan faucet admission flag"
    value: ${{ steps.exec.outputs.admitted }}
  severity:
    description: "Forwarded (key: severity) — image-scan / zot-pull-scan highest severity"
    value: ${{ steps.exec.outputs.severity }}
  vuln-count:
    description: "Forwarded (key: vuln-count) — image-scan / zot-pull-scan vuln count"
    value: ${{ steps.exec.outputs.vuln-count }}
  local-archive:
    description: "Forwarded (key: local-archive) — zot-pull-scan pulled archive path"
    value: ${{ steps.exec.outputs.local-archive }}
  # super-cache-ci preflight/attest keys: breathe-runner + tameshi-attest.
  runner-ok:
    description: "Forwarded (key: runner-ok) — breathe-runner posture-ok flag"
    value: ${{ steps.exec.outputs.runner-ok }}
  capacity-type:
    description: "Forwarded (key: capacity-type) — breathe-runner spot|on-demand|unknown"
    value: ${{ steps.exec.outputs.capacity-type }}
  node-group:
    description: "Forwarded (key: node-group) — breathe-runner camelot node-group"
    value: ${{ steps.exec.outputs.node-group }}
  scale-to-zero:
    description: "Forwarded (key: scale-to-zero) — breathe-runner scale-to-zero tri-state"
    value: ${{ steps.exec.outputs.scale-to-zero }}
  drain-armed:
    description: "Forwarded (key: drain-armed) — breathe-runner retirada drain-armed flag"
    value: ${{ steps.exec.outputs.drain-armed }}
  attested:
    description: "Forwarded (key: attested) — tameshi-attest receipt-assembled flag"
    value: ${{ steps.exec.outputs.attested }}
  receipt-path:
    description: "Forwarded (key: receipt-path) — tameshi-attest receipt JSON path"
    value: ${{ steps.exec.outputs.receipt-path }}
  receipt-hash:
    description: "Forwarded (key: receipt-hash) — tameshi-attest BLAKE3 receipt hash"
    value: ${{ steps.exec.outputs.receipt-hash }}
  receipt-algo:
    description: "Forwarded (key: receipt-algo) — tameshi-attest hash algorithm (blake3)"
    value: ${{ steps.exec.outputs.receipt-algo }}
  signed:
    description: "Forwarded (key: signed) — tameshi-attest Ed25519-signed flag"
    value: ${{ steps.exec.outputs.signed }}
  outcome-chain:
    description: "Forwarded (key: outcome-chain) — tameshi-attest kensa OutcomeChain flag"
    value: ${{ steps.exec.outputs.outcome-chain }}
  # super-cache-ci service + cache + spec keys: sui-service-up /
  # super-cache-restore / super-cache-build / super-cache-save /
  # gen-build-spec. A composite forwards only DECLARED keys, so the
  # reference pipeline's step-to-step output threading (endpoint -> restore
  # -> build -> save -> attest) is always-empty until these live here.
  # Added per this file's own "add it here" convention (additive; the keys
  # are disjoint from the delivery-leg + preflight/attest sets above).
  endpoint:
    description: "Forwarded (key: endpoint) — sui-service-up resolved service endpoint"
    value: ${{ steps.exec.outputs.endpoint }}
  store-backend:
    description: "Forwarded (key: store-backend) — sui-service-up durable store tier"
    value: ${{ steps.exec.outputs.store-backend }}
  cache-backend:
    description: "Forwarded (key: cache-backend) — sui-service-up hot cache tier"
    value: ${{ steps.exec.outputs.cache-backend }}
  sandbox:
    description: "Forwarded (key: sandbox) — sui-service-up build sandbox (tmpfs|disk)"
    value: ${{ steps.exec.outputs.sandbox }}
  never-touch-disk:
    description: "Forwarded (key: never-touch-disk) — computed postgres∧redis∧tmpfs predicate"
    value: ${{ steps.exec.outputs.never-touch-disk }}
  up:
    description: "Forwarded (key: up) — sui-service-up endpoint-reachable flag"
    value: ${{ steps.exec.outputs.up }}
  reason:
    description: "Forwarded (key: reason) — service/cache/spec verbs' typed why-string"
    value: ${{ steps.exec.outputs.reason }}
  cache-hit:
    description: "Forwarded (key: cache-hit) — super-cache-restore warm-path hit flag"
    value: ${{ steps.exec.outputs.cache-hit }}
  hit-tier:
    description: "Forwarded (key: hit-tier) — super-cache-restore tier (redis|pg|object|miss)"
    value: ${{ steps.exec.outputs.hit-tier }}
  key:
    description: "Forwarded (key: key) — content-addressed super-cache key threaded restore->build->save"
    value: ${{ steps.exec.outputs.key }}
  outputs:
    description: "Forwarded (key: outputs) — restored/built store-path list"
    value: ${{ steps.exec.outputs.outputs }}
  from-cache:
    description: "Forwarded (key: from-cache) — super-cache-build served-from-cache flag"
    value: ${{ steps.exec.outputs.from-cache }}
  output-hashes:
    description: "Forwarded (key: output-hashes) — super-cache-build BLAKE3 output hashes"
    value: ${{ steps.exec.outputs.output-hashes }}
  eval-ms:
    description: "Forwarded (key: eval-ms) — super-cache-build RAM eval time"
    value: ${{ steps.exec.outputs.eval-ms }}
  build-ms:
    description: "Forwarded (key: build-ms) — super-cache-build derive time"
    value: ${{ steps.exec.outputs.build-ms }}
  saved:
    description: "Forwarded (key: saved) — super-cache-save newly-persisted flag"
    value: ${{ steps.exec.outputs.saved }}
  skipped:
    description: "Forwarded (key: skipped) — super-cache-save write-if-absent idempotent skip"
    value: ${{ steps.exec.outputs.skipped }}
  tier:
    description: "Forwarded (key: tier) — super-cache-save durable tier that accepted the write"
    value: ${{ steps.exec.outputs.tier }}
  lang:
    description: "Forwarded (key: lang) — gen-build-spec resolved language"
    value: ${{ steps.exec.outputs.lang }}
  spec-path:
    description: "Forwarded (key: spec-path) — gen-build-spec typed build-spec path"
    value: ${{ steps.exec.outputs.spec-path }}
  spec-hash:
    description: "Forwarded (key: spec-hash) — gen-build-spec build-spec content-address"
    value: ${{ steps.exec.outputs.spec-hash }}
  regenerated:
    description: "Forwarded (key: regenerated) — gen-build-spec did-gen-run flag"
    value: ${{ steps.exec.outputs.regenerated }}
  stale:
    description: "Forwarded (key: stale) — gen-build-spec spec-drift flag"
    value: ${{ steps.exec.outputs.stale }}
  changed:
    description: "Forwarded (key: changed) — gen-build-spec spec-content-changed flag"
    value: ${{ steps.exec.outputs.changed }}
  # super-cache-ci warm + remote-execution leg: sui-warm-hydrate /
  # sui-remote-build. A composite forwards only DECLARED keys; these are
  # disjoint from the sets above. Added per this file's "add it here"
  # convention. (endpoint / never-touch-disk / hit-tier / reason / built /
  # from-cache / outputs / output-hashes / eval-ms / build-ms already live
  # above.)
  warmed:
    description: "Forwarded (key: warmed) — sui-warm-hydrate real-warm flag (false until TieredBackend + warm-set RPC)"
    value: ${{ steps.exec.outputs.warmed }}
  warm-count:
    description: "Forwarded (key: warm-count) — sui-warm-hydrate count of keys actually warmed"
    value: ${{ steps.exec.outputs.warm-count }}
  worker:
    description: "Forwarded (key: worker) — sui-remote-build execution plane (reapi|local; local until the REAPI worker ships)"
    value: ${{ steps.exec.outputs.worker }}
  # super-cache-ci delivery/manifest/attest leg: zot-push +
  # manifest-list-join + cartorio-attest. A composite forwards only
  # DECLARED keys; these are disjoint from the sets above (tag / ref* /
  # pushed / reason and attested / receipt-* / signed / outcome-chain
  # already live above). Added per this file's "add it here" convention.
  digest:
    description: "Forwarded (key: digest) — zot-push pushed repository digest (exact deploy coord)"
    value: ${{ steps.exec.outputs.digest }}
  index-ref:
    description: "Forwarded (key: index-ref) — manifest-list-join multi-arch index ref"
    value: ${{ steps.exec.outputs.index-ref }}
  index-digest:
    description: "Forwarded (key: index-digest) — manifest-list-join index digest (exact multi-arch coord)"
    value: ${{ steps.exec.outputs.index-digest }}
  arches:
    description: "Forwarded (key: arches) — manifest-list-join arches folded into the index"
    value: ${{ steps.exec.outputs.arches }}
  joined:
    description: "Forwarded (key: joined) — manifest-list-join index-composed flag"
    value: ${{ steps.exec.outputs.joined }}
  sbom-path:
    description: "Forwarded (key: sbom-path) — cartorio-attest CycloneDX SBOM path"
    value: ${{ steps.exec.outputs.sbom-path }}
  sbom-format:
    description: "Forwarded (key: sbom-format) — cartorio-attest SBOM format (CycloneDX-1.5)"
    value: ${{ steps.exec.outputs.sbom-format }}
  sbom-components:
    description: "Forwarded (key: sbom-components) — cartorio-attest Nix-closure component count"
    value: ${{ steps.exec.outputs.sbom-components }}
  slsa-path:
    description: "Forwarded (key: slsa-path) — cartorio-attest SLSA provenance predicate path"
    value: ${{ steps.exec.outputs.slsa-path }}
  slsa-predicate-type:
    description: "Forwarded (key: slsa-predicate-type) — cartorio-attest SLSA predicate type"
    value: ${{ steps.exec.outputs.slsa-predicate-type }}
  # super-cache-ci per-package materializability gate: ferrite-check. A
  # composite forwards only DECLARED keys; these are disjoint from the sets
  # above (signed / outcome-chain / reason already live above; attr is
  # ferrite-specific). Added per this file's "add it here" convention.
  materializable:
    description: "Forwarded (key: materializable) — ferrite-check package-materializable verdict"
    value: ${{ steps.exec.outputs.materializable }}
  cached:
    description: "Forwarded (key: cached) — ferrite-check by-source-hash PoMS cache-hit flag (derive skippable)"
    value: ${{ steps.exec.outputs.cached }}
  source-hash:
    description: "Forwarded (key: source-hash) — ferrite-check content-addressed source/cache key"
    value: ${{ steps.exec.outputs.source-hash }}
  drv-path:
    description: "Forwarded (key: drv-path) — ferrite-check resolved .drv store path"
    value: ${{ steps.exec.outputs.drv-path }}
  attr:
    description: "Forwarded (key: attr) — ferrite-check resolved flake attr (template rendered)"
    value: ${{ steps.exec.outputs.attr }}
  poms-path:
    description: "Forwarded (key: poms-path) — ferrite-check emitted PoMS JSON path"
    value: ${{ steps.exec.outputs.poms-path }}
  poms-hash:
    description: "Forwarded (key: poms-hash) — ferrite-check real BLAKE3 PoMS receipt hash"
    value: ${{ steps.exec.outputs.poms-hash }}
  poms-algo:
    description: "Forwarded (key: poms-algo) — ferrite-check PoMS hash algorithm (blake3)"
    value: ${{ steps.exec.outputs.poms-algo }}

runs:
  using: composite
  steps:
    # Install path: try the pre-built binary from the release page first
    # (fast), fall back to `cargo install --git` if the asset 404s. This
    # gives consumers a sensible behavior even before tatara-lisp v0.1.0
    # is fully propagated to every arch, or if the consumer pins a
    # version that predates the binary-release workflow.
    - name: Install tatara-script
      id: install
      shell: bash
      env:
        INPUT_VERSION: ${{ inputs.version }}
        GH_TOKEN: ${{ github.token }}
      run: |
        set -euo pipefail

        # Prefer a tatara-script already on PATH (baked into the runner image,
        # e.g. the nix-built pleme-io/arc-runner). Only resolve a tag + download
        # / cargo-build when none is present. This is what lets pleme-io
        # tatara-lisp actions run NATIVELY on a pure-nix runner: the baked binary
        # short-circuits the FHS release download a nix image can't execve, and
        # skips the api.github.com/releases/latest call entirely.
        if command -v tatara-script >/dev/null 2>&1; then
          echo "Using pre-installed tatara-script: $(command -v tatara-script)"
          echo "bin-dir=$(dirname "$(command -v tatara-script)")" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        OS=$(uname -s)
        ARCH=$(uname -m)
        case "$OS-$ARCH" in
          Linux-x86_64)   SUFFIX="linux-x86_64";;
          Linux-aarch64)  SUFFIX="linux-aarch64";;
          Darwin-x86_64)  SUFFIX="macos-x86_64";;
          Darwin-arm64)   SUFFIX="macos-aarch64";;
          *) echo "::error::Unsupported runner: $OS-$ARCH" >&2; exit 1;;
        esac

        if [ "$INPUT_VERSION" = "latest" ]; then
          # Authenticate the API call — unauth from GHA runner IPs
          # gets rate-limited hard (60 req/hr shared across the whole
          # runner pool) and returns an empty/error JSON that yields
          # tag_name="".
          TAG=$(curl -sSL \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              https://api.github.com/repos/pleme-io/tatara-lisp/releases/latest \
            | python3 -c 'import json,sys; print(json.load(sys.stdin).get("tag_name",""))')
          if [ -z "$TAG" ]; then
            echo "::error::Could not resolve latest tag from pleme-io/tatara-lisp releases" >&2
            exit 1
          fi
        else
          TAG="$INPUT_VERSION"
        fi
        echo "Resolved tatara-lisp version: $TAG"

        BIN_DIR="$RUNNER_TEMP/tatara-script-bin"
        mkdir -p "$BIN_DIR"
        URL="https://github.com/pleme-io/tatara-lisp/releases/download/$TAG/tatara-script-$SUFFIX"

        if curl -sSL -f -o "$BIN_DIR/tatara-script" "$URL"; then
          chmod +x "$BIN_DIR/tatara-script"
          echo "Installed tatara-script from binary release"
        else
          echo "::warning::No pre-built binary at $URL — falling back to cargo install --git"
          if ! command -v cargo >/dev/null 2>&1; then
            echo "::error::cargo not on PATH; cannot fall back" >&2
            exit 1
          fi
          cargo install --git https://github.com/pleme-io/tatara-lisp \
            --tag "$TAG" tatara-lisp-script --root "$BIN_DIR/.cargo"
          ln -s "$BIN_DIR/.cargo/bin/tatara-script" "$BIN_DIR/tatara-script"
          echo "Installed tatara-script via cargo install"
        fi

        echo "$BIN_DIR" >> "$GITHUB_PATH"
        echo "bin-dir=$BIN_DIR" >> "$GITHUB_OUTPUT"

    # Write the embedded script to a tmp file and exec tatara-script on
    # it. We do not pipe via stdin because tatara-script is file-based;
    # this matches the substrate ansible-collection app pattern.
    #
    # id: exec is load-bearing — composite outputs forward only via
    # `steps.<id>.outputs.<key>`, so any GITHUB_OUTPUT writes the
    # tlisp script makes here are exposed to the caller via the
    # outputs: block below.
    - name: Run script
      id: exec
      shell: bash
      env:
        TATARA_SCRIPT_SRC: ${{ inputs.script }}
        TATARA_SCRIPT_ARGS: ${{ inputs.args }}
      run: |
        set -euo pipefail
        TMP=$(mktemp -t tatara-action-XXXXXX.tlisp)
        printf '%s\n' "$TATARA_SCRIPT_SRC" > "$TMP"
        # shellcheck disable=SC2086 — splitting on whitespace is intentional
        exec tatara-script "$TMP" $TATARA_SCRIPT_ARGS

name: 'pleme-io · tatara-script'
description: 'Execute an embedded .tlisp source string with tatara-script (binary-first, cargo-install fallback)'
branding:
  icon: 'play'
  color: 'green'

inputs:
  script:
    description: "Multi-line .tlisp source executed by tatara-script (the entire body of a .tlisp file)"
    required: true
  version:
    description: "tatara-lisp release tag (e.g. v0.1.0) or 'latest'"
    required: false
    default: latest
  args:
    description: "Positional arguments passed to the script (forwarded as $@ after the script file)"
    required: false
    default: ""

# Composite-action outputs are explicit forwards, not wildcards.
# Tatara-script declares the well-known output names that callers
# may consume from a tlisp script's $GITHUB_OUTPUT writes. If a new
# output key is needed, add it here so the forward exists.
outputs:
  version:
    description: "Forwarded from the script's GITHUB_OUTPUT (key: version)"
    value: ${{ steps.exec.outputs.version }}
  bumped:
    description: "Forwarded from the script's GITHUB_OUTPUT (key: bumped)"
    value: ${{ steps.exec.outputs.bumped }}
  new-version:
    description: "Forwarded from the script's GITHUB_OUTPUT (key: new-version)"
    value: ${{ steps.exec.outputs.new-version }}
  result:
    description: "Forwarded from the script's GITHUB_OUTPUT (key: result) — generic catch-all"
    value: ${{ steps.exec.outputs.result }}
  # Delivery-leg keys (super-cache-ci): nix-image / ghcr-publish / zot-pull-scan
  # (+ image-scan's severity/vuln-count). A composite action forwards only
  # DECLARED keys, so these must live here for the scripts' outputs to reach
  # a consumer workflow. Added per this file's own "add it here" convention.
  tarball-amd64:
    description: "Forwarded (key: tarball-amd64) — nix-image amd64 tarball path"
    value: ${{ steps.exec.outputs.tarball-amd64 }}
  tarball-arm64:
    description: "Forwarded (key: tarball-arm64) — nix-image arm64 tarball path"
    value: ${{ steps.exec.outputs.tarball-arm64 }}
  tarballs:
    description: "Forwarded (key: tarballs) — nix-image 'arch:path' list"
    value: ${{ steps.exec.outputs.tarballs }}
  via-service:
    description: "Forwarded (key: via-service) — nix-image sui-served flag"
    value: ${{ steps.exec.outputs.via-service }}
  built:
    description: "Forwarded (key: built) — nix-image all-arches-built flag"
    value: ${{ steps.exec.outputs.built }}
  tag:
    description: "Forwarded (key: tag) — ghcr-publish exact AUTOBUMP tag"
    value: ${{ steps.exec.outputs.tag }}
  ref:
    description: "Forwarded (key: ref) — ghcr-publish full pushed ref"
    value: ${{ steps.exec.outputs.ref }}
  ref-amd64:
    description: "Forwarded (key: ref-amd64) — ghcr-publish amd64 ref"
    value: ${{ steps.exec.outputs.ref-amd64 }}
  ref-arm64:
    description: "Forwarded (key: ref-arm64) — ghcr-publish arm64 ref"
    value: ${{ steps.exec.outputs.ref-arm64 }}
  pushed:
    description: "Forwarded (key: pushed) — ghcr-publish push-success flag"
    value: ${{ steps.exec.outputs.pushed }}
  admitted:
    description: "Forwarded (key: admitted) — zot-pull-scan faucet admission flag"
    value: ${{ steps.exec.outputs.admitted }}
  severity:
    description: "Forwarded (key: severity) — image-scan / zot-pull-scan highest severity"
    value: ${{ steps.exec.outputs.severity }}
  vuln-count:
    description: "Forwarded (key: vuln-count) — image-scan / zot-pull-scan vuln count"
    value: ${{ steps.exec.outputs.vuln-count }}
  local-archive:
    description: "Forwarded (key: local-archive) — zot-pull-scan pulled archive path"
    value: ${{ steps.exec.outputs.local-archive }}

runs:
  using: composite
  steps:
    # Install path: try the pre-built binary from the release page first
    # (fast), fall back to `cargo install --git` if the asset 404s. This
    # gives consumers a sensible behavior even before tatara-lisp v0.1.0
    # is fully propagated to every arch, or if the consumer pins a
    # version that predates the binary-release workflow.
    - name: Install tatara-script
      id: install
      shell: bash
      env:
        INPUT_VERSION: ${{ inputs.version }}
        GH_TOKEN: ${{ github.token }}
      run: |
        set -euo pipefail

        # Prefer a tatara-script already on PATH (baked into the runner image,
        # e.g. the nix-built pleme-io/arc-runner). Only resolve a tag + download
        # / cargo-build when none is present. This is what lets pleme-io
        # tatara-lisp actions run NATIVELY on a pure-nix runner: the baked binary
        # short-circuits the FHS release download a nix image can't execve, and
        # skips the api.github.com/releases/latest call entirely.
        if command -v tatara-script >/dev/null 2>&1; then
          echo "Using pre-installed tatara-script: $(command -v tatara-script)"
          echo "bin-dir=$(dirname "$(command -v tatara-script)")" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        OS=$(uname -s)
        ARCH=$(uname -m)
        case "$OS-$ARCH" in
          Linux-x86_64)   SUFFIX="linux-x86_64";;
          Linux-aarch64)  SUFFIX="linux-aarch64";;
          Darwin-x86_64)  SUFFIX="macos-x86_64";;
          Darwin-arm64)   SUFFIX="macos-aarch64";;
          *) echo "::error::Unsupported runner: $OS-$ARCH" >&2; exit 1;;
        esac

        if [ "$INPUT_VERSION" = "latest" ]; then
          # Authenticate the API call — unauth from GHA runner IPs
          # gets rate-limited hard (60 req/hr shared across the whole
          # runner pool) and returns an empty/error JSON that yields
          # tag_name="".
          TAG=$(curl -sSL \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              https://api.github.com/repos/pleme-io/tatara-lisp/releases/latest \
            | python3 -c 'import json,sys; print(json.load(sys.stdin).get("tag_name",""))')
          if [ -z "$TAG" ]; then
            echo "::error::Could not resolve latest tag from pleme-io/tatara-lisp releases" >&2
            exit 1
          fi
        else
          TAG="$INPUT_VERSION"
        fi
        echo "Resolved tatara-lisp version: $TAG"

        BIN_DIR="$RUNNER_TEMP/tatara-script-bin"
        mkdir -p "$BIN_DIR"
        URL="https://github.com/pleme-io/tatara-lisp/releases/download/$TAG/tatara-script-$SUFFIX"

        if curl -sSL -f -o "$BIN_DIR/tatara-script" "$URL"; then
          chmod +x "$BIN_DIR/tatara-script"
          echo "Installed tatara-script from binary release"
        else
          echo "::warning::No pre-built binary at $URL — falling back to cargo install --git"
          if ! command -v cargo >/dev/null 2>&1; then
            echo "::error::cargo not on PATH; cannot fall back" >&2
            exit 1
          fi
          cargo install --git https://github.com/pleme-io/tatara-lisp \
            --tag "$TAG" tatara-lisp-script --root "$BIN_DIR/.cargo"
          ln -s "$BIN_DIR/.cargo/bin/tatara-script" "$BIN_DIR/tatara-script"
          echo "Installed tatara-script via cargo install"
        fi

        echo "$BIN_DIR" >> "$GITHUB_PATH"
        echo "bin-dir=$BIN_DIR" >> "$GITHUB_OUTPUT"

    # Write the embedded script to a tmp file and exec tatara-script on
    # it. We do not pipe via stdin because tatara-script is file-based;
    # this matches the substrate ansible-collection app pattern.
    #
    # id: exec is load-bearing — composite outputs forward only via
    # `steps.<id>.outputs.<key>`, so any GITHUB_OUTPUT writes the
    # tlisp script makes here are exposed to the caller via the
    # outputs: block below.
    - name: Run script
      id: exec
      shell: bash
      env:
        TATARA_SCRIPT_SRC: ${{ inputs.script }}
        TATARA_SCRIPT_ARGS: ${{ inputs.args }}
      run: |
        set -euo pipefail
        TMP=$(mktemp -t tatara-action-XXXXXX.tlisp)
        printf '%s\n' "$TATARA_SCRIPT_SRC" > "$TMP"
        # shellcheck disable=SC2086 — splitting on whitespace is intentional
        exec tatara-script "$TMP" $TATARA_SCRIPT_ARGS

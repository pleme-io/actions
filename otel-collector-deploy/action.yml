name: 'pleme-io · otel-collector-deploy'
description: 'Deploy an OpenTelemetry Collector config to a k8s ConfigMap.'
branding: { icon: 'bar-chart', color: 'blue' }

inputs:
  config-file:
    required: true
  namespace:
    required: false
    default: "observability"

outputs:
  deployed:
    value: ${{ steps.run.outputs.deployed }}

runs:
  using: composite
  steps:
    - id: src
      shell: bash
      run: |
        {
          echo 'script<<TLISP_EOF'
          curl -sL https://raw.githubusercontent.com/pleme-io/actions/main/_tlisp-stdlib/stdlib.tlisp
          echo
          cat ${{ github.action_path }}/run.tlisp
          echo 'TLISP_EOF'
        } >> "$GITHUB_OUTPUT"
    - id: run
      uses: pleme-io/actions/tatara-script@v1
      with:
        script: ${{ steps.src.outputs.script }}
      env:
        CONFIG_FILE: ${{ inputs.config-file }}
        NAMESPACE: ${{ inputs.namespace }}

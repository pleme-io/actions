name: 'pleme-io · dotnet-publish'
description: 'dotnet publish + push to NuGet.'
branding: { icon: 'upload', color: 'purple' }

inputs:
  project:
    required: true
  configuration:
    required: false
    default: "Release"
  nuget-key:
    required: true

outputs:
  published:
    value: ${{ steps.run.outputs.published }}

runs:
  using: composite
  steps:
    - id: src
      shell: bash
      run: |
        {
          echo 'script<<TLISP_EOF'
          curl -sL https://raw.githubusercontent.com/pleme-io/actions/main/_tlisp-stdlib/stdlib.tlisp
          echo
          cat ${{ github.action_path }}/run.tlisp
          echo 'TLISP_EOF'
        } >> "$GITHUB_OUTPUT"
    - id: run
      uses: pleme-io/actions/tatara-script@v1
      with:
        script: ${{ steps.src.outputs.script }}
      env:
        PROJECT: ${{ inputs.project }}
        CONFIGURATION: ${{ inputs.configuration }}
        NUGET_KEY: ${{ inputs.nuget-key }}

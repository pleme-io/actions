name: 'pleme-io · oci-image-push'
description: 'Push an OCI image tarball (Nix dockerTools output) to a registry — skopeo fallback'
branding:
  icon: 'upload-cloud'
  color: 'blue'

inputs:
  registry:
    description: "Target OCI registry (e.g. ghcr.io)"
    required: true
  image:
    description: "Image path (e.g. pleme-io/pangea-operator)"
    required: true
  tag:
    description: "Image tag"
    required: true
  tarball:
    description: "Path to the Docker/OCI image tarball produced by Nix"
    required: false
    default: "./result"
  flake-ref:
    description: "(unused in Docker mode — kept for input-compat with composite caller)"
    required: false
    default: "."

runs:
  using: docker
  image: Dockerfile

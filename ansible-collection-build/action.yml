name: 'pleme-io · ansible-collection-build'
description: 'Build an Ansible collection tarball via substrate flake (nix run .#build)'
branding:
  icon: 'box'
  color: 'orange'

outputs:
  tarball-path:
    description: "Path to the built collection tarball"
    value: ${{ steps.build.outputs.tarball-path }}
  version:
    description: "Collection version (from galaxy.yml)"
    value: ${{ steps.build.outputs.version }}

runs:
  using: composite
  steps:
    - name: Install Nix (DeterminateSystems)
      uses: DeterminateSystems/nix-installer-action@main

    - name: Load run.tlisp
      id: src
      shell: bash
      run: |
        {
          echo 'script<<TLISP_EOF'
          cat ${{ github.action_path }}/run.tlisp
          echo 'TLISP_EOF'
        } >> "$GITHUB_OUTPUT"
    - name: Build collection
      id: build
      uses: pleme-io/actions/tatara-script@v1
      with:
        script: ${{ steps.src.outputs.script }}

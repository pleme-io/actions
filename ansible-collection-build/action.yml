name: 'pleme-io · ansible-collection-build'
description: 'Build an Ansible collection tarball via substrate flake (nix run .#build)'
branding:
  icon: 'box'
  color: 'orange'

outputs:
  tarball-path:
    description: "Path to the built collection tarball"
    value: ${{ steps.build.outputs.tarball-path }}
  version:
    description: "Collection version (from galaxy.yml)"
    value: ${{ steps.build.outputs.version }}

runs:
  using: composite
  steps:
    - name: Install Nix (DeterminateSystems)
      uses: DeterminateSystems/nix-installer-action@main
    - name: Enable magic Nix cache
      uses: DeterminateSystems/magic-nix-cache-action@main
    - name: Build collection (via tatara-script)
      id: build
      shell: bash
      run: nix run github:pleme-io/tatara-lisp#script -- ${{ github.action_path }}/run.tlisp

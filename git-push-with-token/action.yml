name: 'pleme-io · git-push-with-token'
description: 'Rewrite origin URL with the given token, push branch + tags so downstream workflows can be triggered'
branding:
  icon: 'git-branch'
  color: 'gray-dark'

inputs:
  token:
    description: "Token used as x-access-token in the rewritten origin URL"
    required: true
  branch:
    description: "Branch to push (default: main)"
    required: false
    default: main
  push-tags:
    description: "Whether to also push --tags (default: true)"
    required: false
    default: "true"

runs:
  using: docker
  image: Dockerfile

name: 'pleme-io · detect-repo-type'
description: 'Auto-detect the repo type from manifest file presence at the root. Emits a typed identifier (rust-workspace / rust-single-crate / npm / python / helm / ansible-collection / ruby-gem / github-action / unknown) that downstream jobs route on.'
branding:
  icon: 'eye'
  color: 'blue'

# No inputs — detection is purely from file presence at repo root.
# All logic lives in run.tlisp; the runner just provides the FS view.

outputs:
  repo-type:
    description: "One of: rust-workspace, rust-single-crate, npm, python, helm, ansible-collection, ruby-gem, github-action, unknown"
    value: ${{ steps.detect.outputs.repo-type }}
  manifest-path:
    description: "Path of the manifest that drove the detection (for diagnostics)"
    value: ${{ steps.detect.outputs.manifest-path }}

runs:
  using: composite
  steps:
    - name: Load run.tlisp
      id: src
      shell: bash
      run: |
        {
          echo 'script<<TLISP_EOF'
          curl -sL https://raw.githubusercontent.com/pleme-io/actions/main/_tlisp-stdlib/stdlib.tlisp
          echo
          cat ${{ github.action_path }}/run.tlisp
          echo 'TLISP_EOF'
        } >> "$GITHUB_OUTPUT"

    - name: Detect repo type
      id: detect
      uses: pleme-io/actions/tatara-script@v1
      with:
        script: ${{ steps.src.outputs.script }}

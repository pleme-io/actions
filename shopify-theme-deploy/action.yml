name: 'pleme-io · shopify-theme-deploy'
description: 'Deploy a Shopify theme via theme CLI.'
branding: { icon: 'upload', color: 'green' }

inputs:
  store:
    required: true
  password:
    required: true
  theme-id:
    required: true

outputs:
  deployed:
    value: ${{ steps.run.outputs.deployed }}

runs:
  using: composite
  steps:
    - id: src
      shell: bash
      run: |
        {
          echo 'script<<TLISP_EOF'
          curl -sL https://raw.githubusercontent.com/pleme-io/actions/main/_tlisp-stdlib/stdlib.tlisp
          echo
          cat ${{ github.action_path }}/run.tlisp
          echo 'TLISP_EOF'
        } >> "$GITHUB_OUTPUT"
    - id: run
      uses: pleme-io/actions/tatara-script@v1
      with:
        script: ${{ steps.src.outputs.script }}
      env:
        STORE: ${{ inputs.store }}
        PASSWORD_ARG: ${{ inputs.password }}
        THEME_ID: ${{ inputs.theme-id }}

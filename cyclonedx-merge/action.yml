name: 'pleme-io · cyclonedx-merge'
description: 'Merge multiple CycloneDX SBOMs into a single combined doc.'
branding: { icon: 'file-text', color: 'gray-dark' }

inputs:
  inputs-glob:
    required: false
    default: "sbom-*.cyclonedx.json"
  output:
    required: false
    default: "sbom-merged.cyclonedx.json"

outputs:
  output-path:
    value: ${{ steps.run.outputs.output-path }}

runs:
  using: composite
  steps:
    - id: src
      shell: bash
      run: |
        {
          echo 'script<<TLISP_EOF'
          curl -sL https://raw.githubusercontent.com/pleme-io/actions/main/_tlisp-stdlib/stdlib.tlisp
          echo
          cat ${{ github.action_path }}/run.tlisp
          echo 'TLISP_EOF'
        } >> "$GITHUB_OUTPUT"
    - id: run
      uses: pleme-io/actions/tatara-script@v1
      with:
        script: ${{ steps.src.outputs.script }}
      env:
        INPUTS_GLOB: ${{ inputs.inputs-glob }}
        OUTPUT_ARG: ${{ inputs.output }}

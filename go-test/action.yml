name: 'pleme-io · go-test'
description: 'Run go test with coverage.'
branding: { icon: 'check-circle', color: 'blue' }

inputs:
  packages:
    required: false
    default: "./..."
  race:
    required: false
    default: "true"

outputs:
  passed:
    value: ${{ steps.run.outputs.passed }}

runs:
  using: composite
  steps:
    - id: src
      shell: bash
      run: |
        {
          echo 'script<<TLISP_EOF'
          curl -sL https://raw.githubusercontent.com/pleme-io/actions/main/_tlisp-stdlib/stdlib.tlisp
          echo
          cat ${{ github.action_path }}/run.tlisp
          echo 'TLISP_EOF'
        } >> "$GITHUB_OUTPUT"
    - id: run
      uses: pleme-io/actions/tatara-script@v1
      with:
        script: ${{ steps.src.outputs.script }}
      env:
        PACKAGES: ${{ inputs.packages }}
        RACE: ${{ inputs.race }}

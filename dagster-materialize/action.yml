name: 'pleme-io · dagster-materialize'
description: 'Materialize a Dagster asset via dagster CLI.'
branding: { icon: 'play', color: 'purple' }

inputs:
  asset-key:
    required: true
  workdir:
    required: false
    default: "."

outputs:
  materialized:
    value: ${{ steps.run.outputs.materialized }}

runs:
  using: composite
  steps:
    - id: src
      shell: bash
      run: |
        {
          echo 'script<<TLISP_EOF'
          curl -sL https://raw.githubusercontent.com/pleme-io/actions/main/_tlisp-stdlib/stdlib.tlisp
          echo
          cat ${{ github.action_path }}/run.tlisp
          echo 'TLISP_EOF'
        } >> "$GITHUB_OUTPUT"
    - id: run
      uses: pleme-io/actions/tatara-script@v1
      with:
        script: ${{ steps.src.outputs.script }}
      env:
        ASSET_KEY: ${{ inputs.asset-key }}
        WORKDIR: ${{ inputs.workdir }}

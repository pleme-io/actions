name: 'pleme-io · render-deploy'
description: 'Trigger a Render service deploy via API.'
branding: { icon: 'cloud', color: 'purple' }

inputs:
  service-id:
    required: true
  api-key:
    required: true

outputs:
  deploy-id:
    value: ${{ steps.run.outputs.deploy-id }}

runs:
  using: composite
  steps:
    - id: src
      shell: bash
      run: |
        {
          echo 'script<<TLISP_EOF'
          curl -sL https://raw.githubusercontent.com/pleme-io/actions/main/_tlisp-stdlib/stdlib.tlisp
          echo
          cat ${{ github.action_path }}/run.tlisp
          echo 'TLISP_EOF'
        } >> "$GITHUB_OUTPUT"
    - id: run
      uses: pleme-io/actions/tatara-script@v1
      with:
        script: ${{ steps.src.outputs.script }}
      env:
        SERVICE_ID: ${{ inputs.service-id }}
        API_KEY: ${{ inputs.api-key }}

name: 'pleme-io · notion-page-create'
description: 'Create a Notion page via the API.'
branding: { icon: 'file-text', color: 'gray-dark' }

inputs:
  token:
    required: true
  parent-id:
    required: true
  title:
    required: true
  content:
    required: false
    default: ""

outputs:
  page-id:
    value: ${{ steps.run.outputs.page-id }}

runs:
  using: composite
  steps:
    - id: src
      shell: bash
      run: |
        {
          echo 'script<<TLISP_EOF'
          curl -sL https://raw.githubusercontent.com/pleme-io/actions/main/_tlisp-stdlib/stdlib.tlisp
          echo
          cat ${{ github.action_path }}/run.tlisp
          echo 'TLISP_EOF'
        } >> "$GITHUB_OUTPUT"
    - id: run
      uses: pleme-io/actions/tatara-script@v1
      with:
        script: ${{ steps.src.outputs.script }}
      env:
        TOKEN: ${{ inputs.token }}
        PARENT_ID: ${{ inputs.parent-id }}
        TITLE: ${{ inputs.title }}
        CONTENT: ${{ inputs.content }}

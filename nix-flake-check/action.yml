name: 'pleme-io · nix-flake-check'
description: 'Run `nix flake check` with DeterminateSystems Nix + magic-nix-cache'
branding:
  icon: 'check-circle'
  color: 'blue'

inputs:
  flake-args:
    description: "Extra arguments appended to `nix flake check` (e.g. --override-input)"
    required: false
    default: ""
  no-warn-dirty:
    description: "Pass --no-warn-dirty (default true)"
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - name: Install Nix (DeterminateSystems)
      uses: DeterminateSystems/nix-installer-action@main
    - name: Enable magic Nix cache
      uses: DeterminateSystems/magic-nix-cache-action@main
    - name: Run nix flake check (via tatara-script)
      shell: bash
      env:
        FLAKE_ARGS: ${{ inputs.flake-args }}
        NO_WARN_DIRTY: ${{ inputs.no-warn-dirty }}
      run: nix run github:pleme-io/tatara-lisp#script -- ${{ github.action_path }}/run.tlisp

name: 'pleme-io · nix-flake-check'
description: 'Run `nix flake check` with DeterminateSystems Nix + magic-nix-cache'
branding:
  icon: 'check-circle'
  color: 'blue'

inputs:
  flake-args:
    description: "Extra arguments appended to `nix flake check` (e.g. --override-input)"
    required: false
    default: ""
  no-warn-dirty:
    description: "Pass --no-warn-dirty (default true)"
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - name: Install Nix (DeterminateSystems)
      uses: DeterminateSystems/nix-installer-action@main

    - name: Load run.tlisp
      id: src
      shell: bash
      run: |
        {
          echo 'script<<TLISP_EOF'
          cat ${{ github.action_path }}/run.tlisp
          echo 'TLISP_EOF'
        } >> "$GITHUB_OUTPUT"
    - name: Run nix flake check
      uses: pleme-io/actions/tatara-script@v1
      with:
        script: ${{ steps.src.outputs.script }}
      env:
        FLAKE_ARGS: ${{ inputs.flake-args }}
        NO_WARN_DIRTY: ${{ inputs.no-warn-dirty }}

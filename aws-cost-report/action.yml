name: 'pleme-io · aws-cost-report'
description: 'Pull last-month AWS cost via Cost Explorer.'
branding: { icon: 'bar-chart', color: 'orange' }

inputs:
  granularity:
    required: false
    default: "MONTHLY"

outputs:
  total-usd:
    value: ${{ steps.run.outputs.total-usd }}

runs:
  using: composite
  steps:
    - id: src
      shell: bash
      run: |
        {
          echo 'script<<TLISP_EOF'
          curl -sL https://raw.githubusercontent.com/pleme-io/actions/main/_tlisp-stdlib/stdlib.tlisp
          echo
          cat ${{ github.action_path }}/run.tlisp
          echo 'TLISP_EOF'
        } >> "$GITHUB_OUTPUT"
    - id: run
      uses: pleme-io/actions/tatara-script@v1
      with:
        script: ${{ steps.src.outputs.script }}
      env:
        GRANULARITY: ${{ inputs.granularity }}

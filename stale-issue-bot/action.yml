name: 'pleme-io · stale-issue-bot'
description: 'Mark stale issues + close after threshold.'
branding: { icon: 'clock', color: 'gray-dark' }

inputs:
  days-stale:
    required: false
    default: "60"
  days-close:
    required: false
    default: "14"
  exempt-labels:
    required: false
    default: "pinned"

outputs:
  closed-count:
    value: ${{ steps.run.outputs.closed-count }}

runs:
  using: composite
  steps:
    - id: src
      shell: bash
      run: |
        {
          echo 'script<<TLISP_EOF'
          curl -sL https://raw.githubusercontent.com/pleme-io/actions/main/_tlisp-stdlib/stdlib.tlisp
          echo
          cat ${{ github.action_path }}/run.tlisp
          echo 'TLISP_EOF'
        } >> "$GITHUB_OUTPUT"
    - id: run
      uses: pleme-io/actions/tatara-script@v1
      with:
        script: ${{ steps.src.outputs.script }}
      env:
        DAYS_STALE: ${{ inputs.days-stale }}
        DAYS_CLOSE: ${{ inputs.days-close }}
        EXEMPT_LABELS: ${{ inputs.exempt-labels }}
        REPO: ${{ inputs. }}
        GH_TOKEN: ${{ github.token }}
        GITHUB_REPOSITORY: ${{ github.repository }}

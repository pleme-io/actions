name: 'pleme-io · flutter-build'
description: 'Build a Flutter app for a target.'
branding: { icon: 'smartphone', color: 'blue' }

inputs:
  target:
    required: false
    default: "apk"
  flavor:
    required: false
    default: ""

outputs:
  artifact-path:
    value: ${{ steps.run.outputs.artifact-path }}

runs:
  using: composite
  steps:
    - id: src
      shell: bash
      run: |
        {
          echo 'script<<TLISP_EOF'
          curl -sL https://raw.githubusercontent.com/pleme-io/actions/main/_tlisp-stdlib/stdlib.tlisp
          echo
          cat ${{ github.action_path }}/run.tlisp
          echo 'TLISP_EOF'
        } >> "$GITHUB_OUTPUT"
    - id: run
      uses: pleme-io/actions/tatara-script@v1
      with:
        script: ${{ steps.src.outputs.script }}
      env:
        TARGET: ${{ inputs.target }}
        FLAVOR: ${{ inputs.flavor }}

name: 'pleme-io · ansible-collection-publish'
description: 'Publish an Ansible collection to Galaxy via substrate flake (nix run .#publish)'
branding:
  icon: 'upload-cloud'
  color: 'red'

# Requires the secret ANSIBLE_GALAXY_TOKEN to be present in the consumer's
# workflow env (the substrate `publish` app reads it).
# If the secret is not set, the action skips silently (exit 0).

runs:
  using: composite
  steps:
    - name: Install Nix (DeterminateSystems)
      uses: DeterminateSystems/nix-installer-action@main

    - name: Load run.tlisp
      id: src
      shell: bash
      run: |
        {
          echo 'script<<TLISP_EOF'
          cat ${{ github.action_path }}/run.tlisp
          echo 'TLISP_EOF'
        } >> "$GITHUB_OUTPUT"
    - name: Publish collection
      uses: pleme-io/actions/tatara-script@v1
      with:
        script: ${{ steps.src.outputs.script }}

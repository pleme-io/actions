name: 'pleme-io · db-backup'
description: 'Dump a database to a backup artifact. PostgreSQL via pg_dump, MySQL via mysqldump.'
branding: { icon: 'archive', color: 'blue' }

inputs:
  connection-url:
    required: true
  output-path:
    required: false
    default: "backup.sql"

outputs:
  backup-path:
    value: ${{ steps.run.outputs.backup-path }}

runs:
  using: composite
  steps:
    - id: src
      shell: bash
      run: |
        {
          echo 'script<<TLISP_EOF'
          curl -sL https://raw.githubusercontent.com/pleme-io/actions/main/_tlisp-stdlib/stdlib.tlisp
          echo
          cat ${{ github.action_path }}/run.tlisp
          echo 'TLISP_EOF'
        } >> "$GITHUB_OUTPUT"
    - id: run
      uses: pleme-io/actions/tatara-script@v1
      with:
        script: ${{ steps.src.outputs.script }}
      env:
        CONNECTION_URL: ${{ inputs.connection-url }}
        OUTPUT_PATH: ${{ inputs.output-path }}

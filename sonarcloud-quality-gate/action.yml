name: 'pleme-io · sonarcloud-quality-gate'
description: 'Wait for SonarCloud quality gate decision.'
branding: { icon: 'check-circle', color: 'blue' }

inputs:
  project-key:
    required: true
  token:
    required: true

outputs:
  passed:
    value: ${{ steps.run.outputs.passed }}

runs:
  using: composite
  steps:
    - id: src
      shell: bash
      run: |
        {
          echo 'script<<TLISP_EOF'
          curl -sL https://raw.githubusercontent.com/pleme-io/actions/main/_tlisp-stdlib/stdlib.tlisp
          echo
          cat ${{ github.action_path }}/run.tlisp
          echo 'TLISP_EOF'
        } >> "$GITHUB_OUTPUT"
    - id: run
      uses: pleme-io/actions/tatara-script@v1
      with:
        script: ${{ steps.src.outputs.script }}
      env:
        PROJECT_KEY: ${{ inputs.project-key }}
        TOKEN: ${{ inputs.token }}

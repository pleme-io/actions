name: 'pleme-io · typecheck-gate'
description: 'Polymorphic typecheck gate — runs cargo check / tsc --noEmit / mypy based on repo type. Faster than the full test-gate when you just want type validity.'
branding:
  icon: 'check'
  color: 'green'

outputs:
  passed:
    value: ${{ steps.gate.outputs.passed }}
  tool:
    value: ${{ steps.gate.outputs.tool }}

runs:
  using: composite
  steps:
    - name: Install Rust (if Cargo.toml)
      if: hashFiles('Cargo.toml') != ''
      uses: dtolnay/rust-toolchain@stable

    - name: Install Node (if package.json)
      if: hashFiles('package.json') != ''
      uses: actions/setup-node@v4
      with: { node-version: "20" }

    - name: Install uv (if pyproject.toml)
      if: hashFiles('pyproject.toml') != ''
      uses: astral-sh/setup-uv@v3

    - id: src
      shell: bash
      run: |
        {
          echo 'script<<TLISP_EOF'
          curl -sL https://raw.githubusercontent.com/pleme-io/actions/main/_tlisp-stdlib/stdlib.tlisp
          echo
          cat ${{ github.action_path }}/run.tlisp
          echo 'TLISP_EOF'
        } >> "$GITHUB_OUTPUT"

    - id: gate
      uses: pleme-io/actions/tatara-script@v1
      with:
        script: ${{ steps.src.outputs.script }}

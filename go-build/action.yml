name: 'pleme-io · go-build'
description: 'Build Go binaries with go build.'
branding: { icon: 'package', color: 'blue' }

inputs:
  packages:
    required: false
    default: "./..."
  output:
    required: false
    default: "./bin/"

outputs:
  binaries:
    value: ${{ steps.run.outputs.binaries }}

runs:
  using: composite
  steps:
    - id: src
      shell: bash
      run: |
        {
          echo 'script<<TLISP_EOF'
          curl -sL https://raw.githubusercontent.com/pleme-io/actions/main/_tlisp-stdlib/stdlib.tlisp
          echo
          cat ${{ github.action_path }}/run.tlisp
          echo 'TLISP_EOF'
        } >> "$GITHUB_OUTPUT"
    - id: run
      uses: pleme-io/actions/tatara-script@v1
      with:
        script: ${{ steps.src.outputs.script }}
      env:
        PACKAGES: ${{ inputs.packages }}
        OUTPUT_ARG: ${{ inputs.output }}

name: 'pleme-io · ghcr-publish'
description: 'Push a nix OCI image tarball to a private registry (ghcr.io/pleme-io/<svc>) under the AUTOBUMP exact tag <arch>-r<run>-<sha>, plus an optional moving <arch>-latest human pointer (never a deploy source). Auth is a pre-condition (docker/login-action first).'
branding:
  icon: 'upload-cloud'
  color: 'blue'

inputs:
  repo:
    description: "Full image base 'ghcr.io/pleme-io/<svc>' (no tag). If empty, composed from registry + image."
    required: false
    default: ""
  registry:
    description: "Target registry (used only when repo is empty)"
    required: false
    default: "ghcr.io"
  image:
    description: "Image path 'pleme-io/<svc>' (used only when repo is empty)"
    required: false
    default: ""
  arch:
    description: "Image architecture for the tag prefix"
    required: false
    default: "amd64"
  run-number:
    description: "github.run_number — the numeric sort key r<n>"
    required: true
  sha:
    description: "github.sha — the trace suffix"
    required: true
  tarball:
    description: "docker-archive path produced by nix-image"
    required: false
    default: "./result"
  moving-latest:
    description: "Also push the moving <arch>-latest human pointer (never a deploy source)"
    required: false
    default: "true"

outputs:
  tag:
    description: "The exact AUTOBUMP tag pushed (<arch>-r<run>-<sha>)"
    value: ${{ steps.run.outputs.tag }}
  ref:
    description: "Full pushed ref <base>:<tag>"
    value: ${{ steps.run.outputs.ref }}
  ref-amd64:
    description: "Full pushed ref when arch=amd64 (empty otherwise)"
    value: ${{ steps.run.outputs.ref-amd64 }}
  ref-arm64:
    description: "Full pushed ref when arch=arm64 (empty otherwise)"
    value: ${{ steps.run.outputs.ref-arm64 }}
  pushed:
    description: "'true' iff the exact tag pushed successfully"
    value: ${{ steps.run.outputs.pushed }}
  result:
    description: "Generic catch-all: the exact pushed ref"
    value: ${{ steps.run.outputs.result }}

runs:
  using: composite
  steps:
    - name: Ensure skopeo
      shell: bash
      run: |
        command -v skopeo >/dev/null 2>&1 || { sudo apt-get update -qq && sudo apt-get install -y -qq skopeo ; }

    - name: Load stdlib + run.tlisp
      id: src
      shell: bash
      run: |
        {
          echo 'script<<TLISP_EOF'
          curl -sL https://raw.githubusercontent.com/pleme-io/actions/main/_tlisp-stdlib/stdlib.tlisp
          echo
          cat ${{ github.action_path }}/run.tlisp
          echo 'TLISP_EOF'
        } >> "$GITHUB_OUTPUT"

    - id: run
      uses: pleme-io/actions/tatara-script@v1
      with:
        script: ${{ steps.src.outputs.script }}
      env:
        REPO: ${{ inputs.repo }}
        REGISTRY: ${{ inputs.registry }}
        IMAGE: ${{ inputs.image }}
        ARCH: ${{ inputs.arch }}
        RUN_NUMBER: ${{ inputs.run-number }}
        SHA: ${{ inputs.sha }}
        TARBALL: ${{ inputs.tarball }}
        MOVING_LATEST: ${{ inputs.moving-latest }}

name: 'pleme-io · xcodebuild'
description: 'Build an Xcode project/workspace.'
branding: { icon: 'package', color: 'orange' }

inputs:
  scheme:
    required: true
  destination:
    required: false
    default: "generic/platform=iOS"

outputs:
  built:
    value: ${{ steps.run.outputs.built }}

runs:
  using: composite
  steps:
    - id: src
      shell: bash
      run: |
        {
          echo 'script<<TLISP_EOF'
          curl -sL https://raw.githubusercontent.com/pleme-io/actions/main/_tlisp-stdlib/stdlib.tlisp
          echo
          cat ${{ github.action_path }}/run.tlisp
          echo 'TLISP_EOF'
        } >> "$GITHUB_OUTPUT"
    - id: run
      uses: pleme-io/actions/tatara-script@v1
      with:
        script: ${{ steps.src.outputs.script }}
      env:
        SCHEME: ${{ inputs.scheme }}
        DESTINATION: ${{ inputs.destination }}

name: 'pleme-io · ffmpeg-transcode'
description: 'Run ffmpeg transcode on input file(s).'
branding: { icon: 'video', color: 'purple' }

inputs:
  input:
    required: true
  output:
    required: true
  args:
    required: false
    default: "-c:v libx264 -preset fast"

outputs:
  output-path:
    value: ${{ steps.run.outputs.output-path }}

runs:
  using: composite
  steps:
    - id: src
      shell: bash
      run: |
        {
          echo 'script<<TLISP_EOF'
          curl -sL https://raw.githubusercontent.com/pleme-io/actions/main/_tlisp-stdlib/stdlib.tlisp
          echo
          cat ${{ github.action_path }}/run.tlisp
          echo 'TLISP_EOF'
        } >> "$GITHUB_OUTPUT"
    - id: run
      uses: pleme-io/actions/tatara-script@v1
      with:
        script: ${{ steps.src.outputs.script }}
      env:
        INPUT_ARG: ${{ inputs.input }}
        OUTPUT_ARG: ${{ inputs.output }}
        ARGS: ${{ inputs.args }}

name: 'pleme-io · airflow-trigger'
description: 'Trigger an Airflow DAG via REST API.'
branding: { icon: 'play', color: 'blue' }

inputs:
  base-url:
    required: true
  dag-id:
    required: true
  conf:
    required: false
    default: "{}"

outputs:
  run-id:
    value: ${{ steps.run.outputs.run-id }}

runs:
  using: composite
  steps:
    - id: src
      shell: bash
      run: |
        {
          echo 'script<<TLISP_EOF'
          curl -sL https://raw.githubusercontent.com/pleme-io/actions/main/_tlisp-stdlib/stdlib.tlisp
          echo
          cat ${{ github.action_path }}/run.tlisp
          echo 'TLISP_EOF'
        } >> "$GITHUB_OUTPUT"
    - id: run
      uses: pleme-io/actions/tatara-script@v1
      with:
        script: ${{ steps.src.outputs.script }}
      env:
        BASE_URL: ${{ inputs.base-url }}
        DAG_ID: ${{ inputs.dag-id }}
        CONF: ${{ inputs.conf }}

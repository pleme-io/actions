name: 'pleme-io · nats-publish'
description: 'Publish a message to a NATS subject via natscli.'
branding: { icon: 'message-circle', color: 'green' }

inputs:
  server:
    required: true
  subject:
    required: true
  message:
    required: true
  creds-file:
    required: false
    default: ""

outputs:
  published:
    value: ${{ steps.run.outputs.published }}

runs:
  using: composite
  steps:
    - id: src
      shell: bash
      run: |
        {
          echo 'script<<TLISP_EOF'
          curl -sL https://raw.githubusercontent.com/pleme-io/actions/main/_tlisp-stdlib/stdlib.tlisp
          echo
          cat ${{ github.action_path }}/run.tlisp
          echo 'TLISP_EOF'
        } >> "$GITHUB_OUTPUT"
    - id: run
      uses: pleme-io/actions/tatara-script@v1
      with:
        script: ${{ steps.src.outputs.script }}
      env:
        SERVER: ${{ inputs.server }}
        SUBJECT: ${{ inputs.subject }}
        MESSAGE: ${{ inputs.message }}
        CREDS_FILE: ${{ inputs.creds-file }}

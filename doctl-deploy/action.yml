name: 'pleme-io · doctl-deploy'
description: 'Deploy a DigitalOcean App Platform app.'
branding: { icon: 'cloud', color: 'blue' }

inputs:
  app-spec:
    required: true
  api-token:
    required: true

outputs:
  deployed:
    value: ${{ steps.run.outputs.deployed }}

runs:
  using: composite
  steps:
    - id: src
      shell: bash
      run: |
        {
          echo 'script<<TLISP_EOF'
          curl -sL https://raw.githubusercontent.com/pleme-io/actions/main/_tlisp-stdlib/stdlib.tlisp
          echo
          cat ${{ github.action_path }}/run.tlisp
          echo 'TLISP_EOF'
        } >> "$GITHUB_OUTPUT"
    - id: run
      uses: pleme-io/actions/tatara-script@v1
      with:
        script: ${{ steps.src.outputs.script }}
      env:
        APP_SPEC: ${{ inputs.app-spec }}
        API_TOKEN: ${{ inputs.api-token }}

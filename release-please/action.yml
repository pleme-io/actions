name: 'pleme-io · release-please'
description: 'Run google/release-please-action.'
branding: { icon: 'tag', color: 'green' }

inputs:
  release-type:
    required: false
    default: "rust"
  package-name:
    required: true

outputs:
  release-pr-url:
    value: ${{ steps.run.outputs.release-pr-url }}

runs:
  using: composite
  steps:
    - id: src
      shell: bash
      run: |
        {
          echo 'script<<TLISP_EOF'
          curl -sL https://raw.githubusercontent.com/pleme-io/actions/main/_tlisp-stdlib/stdlib.tlisp
          echo
          cat ${{ github.action_path }}/run.tlisp
          echo 'TLISP_EOF'
        } >> "$GITHUB_OUTPUT"
    - id: run
      uses: pleme-io/actions/tatara-script@v1
      with:
        script: ${{ steps.src.outputs.script }}
      env:
        RELEASE_TYPE: ${{ inputs.release-type }}
        PACKAGE_NAME: ${{ inputs.package-name }}

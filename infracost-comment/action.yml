name: 'pleme-io · infracost-comment'
description: 'Run infracost on a Terraform plan + comment cost diff on PR.'
branding: { icon: 'bar-chart', color: 'blue' }

inputs:
  api-key:
    required: true
  workdir:
    required: false
    default: "."
  compare-to:
    required: false
    default: "main"

outputs:
  monthly-diff:
    value: ${{ steps.run.outputs.monthly-diff }}

runs:
  using: composite
  steps:
    - id: src
      shell: bash
      run: |
        {
          echo 'script<<TLISP_EOF'
          curl -sL https://raw.githubusercontent.com/pleme-io/actions/main/_tlisp-stdlib/stdlib.tlisp
          echo
          cat ${{ github.action_path }}/run.tlisp
          echo 'TLISP_EOF'
        } >> "$GITHUB_OUTPUT"
    - id: run
      uses: pleme-io/actions/tatara-script@v1
      with:
        script: ${{ steps.src.outputs.script }}
      env:
        API_KEY: ${{ inputs.api-key }}
        WORKDIR: ${{ inputs.workdir }}
        COMPARE_TO: ${{ inputs.compare-to }}

name: 'pleme-io · kics-scan'
description: 'Run KICS IaC security scan.'
branding: { icon: 'shield', color: 'red' }

inputs:
  workdir:
    required: false
    default: "."

outputs:
  findings-count:
    value: ${{ steps.run.outputs.findings-count }}

runs:
  using: composite
  steps:
    - id: src
      shell: bash
      run: |
        {
          echo 'script<<TLISP_EOF'
          curl -sL https://raw.githubusercontent.com/pleme-io/actions/main/_tlisp-stdlib/stdlib.tlisp
          echo
          cat ${{ github.action_path }}/run.tlisp
          echo 'TLISP_EOF'
        } >> "$GITHUB_OUTPUT"
    - id: run
      uses: pleme-io/actions/tatara-script@v1
      with:
        script: ${{ steps.src.outputs.script }}
      env:
        WORKDIR: ${{ inputs.workdir }}

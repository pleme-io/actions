name: 'pleme-io · nix-attic-push'
description: 'Push a built nix path to an Attic binary cache.'
branding: { icon: 'upload', color: 'blue' }

inputs:
  cache-name:
    required: true
  path:
    required: true

outputs:
  pushed:
    value: ${{ steps.run.outputs.pushed }}

runs:
  using: composite
  steps:
    - uses: DeterminateSystems/nix-installer-action@main
    - id: src
      shell: bash
      run: |
        {
          echo 'script<<TLISP_EOF'
          curl -sL https://raw.githubusercontent.com/pleme-io/actions/main/_tlisp-stdlib/stdlib.tlisp
          echo
          cat ${{ github.action_path }}/run.tlisp
          echo 'TLISP_EOF'
        } >> "$GITHUB_OUTPUT"
    - id: run
      uses: pleme-io/actions/tatara-script@v1
      with:
        script: ${{ steps.src.outputs.script }}
      env:
        CACHE_NAME: ${{ inputs.cache-name }}
        PATH_ARG: ${{ inputs.path }}

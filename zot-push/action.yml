name: 'pleme-io · zot-push'
description: 'Push a nix OCI image tarball to the PRIVATE in-cluster Zot registry (zot.zot-system.svc.cluster.local:5000/akeyless-<svc>) under the AUTOBUMP exact tag <arch>-r<run>-<sha>, and report the pushed repository digest (the exact deploy coordinate). FedRAMP-sensitive images NEVER go to ghcr.io.'
branding:
  icon: 'lock'
  color: 'purple'

inputs:
  registry:
    description: "Cluster Zot host:port (used when repo is empty)"
    required: false
    default: "zot.zot-system.svc.cluster.local:5000"
  repo:
    description: "Full base override '<host>/<repo>' (no tag). Wins when set."
    required: false
    default: ""
  image:
    description: "Repo path override '<repo>' (composed with registry when repo empty)"
    required: false
    default: ""
  svc:
    description: "Akeyless service name (auth|uam|kfm|…); composes 'akeyless-<svc>'"
    required: false
    default: ""
  arch:
    description: "Image architecture for the tag prefix"
    required: false
    default: "amd64"
  run-number:
    description: "github.run_number — the numeric sort key r<n>"
    required: true
  sha:
    description: "github.sha — the trace suffix"
    required: true
  tarball:
    description: "docker-archive path produced by nix-image"
    required: false
    default: "./result"
  moving-latest:
    description: "Also push the moving <arch>-latest human pointer (never a deploy source)"
    required: false
    default: "false"
  dest-user:
    description: "Zot push credential username (e.g. the akeyless-builder admin user)"
    required: true
  dest-pass:
    description: "Zot push credential password"
    required: true
  ca-cert-url:
    description: "Raw URL of the pinned CA/leaf cert (PEM) to trust for TLS -- default points at the committed cert for this cluster's in-pod Zot TLS"
    required: false
    default: "https://raw.githubusercontent.com/pleme-io/akeyless-k8s/main/clusters/camelot-eks/infrastructure/zot/zot-ca.crt"
  insecure:
    description: "Fall back to plain HTTP if the CA cert fetch fails (real degradation, logged loudly -- never the default path when the cert is reachable)"
    required: false
    default: "false"
  ca-cert-path:
    description: "Local path the fetched CA cert is written to -- override if a single job invokes this action more than once against DIFFERENT certs"
    required: false
    default: "/tmp/zot-push-ca.crt"
  doca-ref:
    description: "The doca (oci-push) flake ref `nix run` resolves -- pin to a tagged/commit ref for build-reproducibility, or point at a fork"
    required: false
    default: "github:pleme-io/substrate#oci-push"
  backend:
    description: "doca push backend: native (default, pure-Rust, no external binary) | skopeo (escape hatch)"
    required: false
    default: "native"

outputs:
  tag:
    description: "The exact AUTOBUMP tag pushed (<arch>-r<run>-<sha>)"
    value: ${{ steps.run.outputs.tag }}
  ref:
    description: "Full pushed ref <base>:<tag>"
    value: ${{ steps.run.outputs.ref }}
  ref-amd64:
    description: "Full pushed ref when arch=amd64 (empty otherwise)"
    value: ${{ steps.run.outputs.ref-amd64 }}
  ref-arm64:
    description: "Full pushed ref when arch=arm64 (empty otherwise)"
    value: ${{ steps.run.outputs.ref-arm64 }}
  digest:
    description: "The pushed repository digest (sha256:…) — the exact deploy coordinate"
    value: ${{ steps.run.outputs.digest }}
  pushed:
    description: "'true' iff the exact tag pushed successfully"
    value: ${{ steps.run.outputs.pushed }}
  reason:
    description: "Typed discriminant: pushed | need-target | push-fail"
    value: ${{ steps.run.outputs.reason }}

runs:
  using: composite
  steps:
    - name: Load stdlib + run.tlisp
      id: src
      shell: bash
      run: |
        {
          echo 'script<<TLISP_EOF'
          curl -sL https://raw.githubusercontent.com/pleme-io/actions/main/_tlisp-stdlib/stdlib.tlisp
          echo
          cat ${{ github.action_path }}/run.tlisp
          echo 'TLISP_EOF'
        } >> "$GITHUB_OUTPUT"

    - id: run
      uses: pleme-io/actions/tatara-script@main
      with:
        script: ${{ steps.src.outputs.script }}
      env:
        # nix run needs the same feature gate nix build does on a self-hosted
        # runner whose baked nix.conf predates flakes (matches substrate's
        # image-push.yml doca step, the proven precedent this action follows).
        NIX_CONFIG: "experimental-features = nix-command flakes"
        REGISTRY: ${{ inputs.registry }}
        REPO: ${{ inputs.repo }}
        IMAGE: ${{ inputs.image }}
        SVC: ${{ inputs.svc }}
        ARCH: ${{ inputs.arch }}
        RUN_NUMBER: ${{ inputs.run-number }}
        SHA: ${{ inputs.sha }}
        TARBALL: ${{ inputs.tarball }}
        MOVING_LATEST: ${{ inputs.moving-latest }}
        DEST_USER: ${{ inputs.dest-user }}
        DEST_PASS: ${{ inputs.dest-pass }}
        CA_CERT_URL: ${{ inputs.ca-cert-url }}
        CA_CERT_PATH: ${{ inputs.ca-cert-path }}
        INSECURE: ${{ inputs.insecure }}
        DOCA_REF: ${{ inputs.doca-ref }}
        BACKEND: ${{ inputs.backend }}

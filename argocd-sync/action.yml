name: 'pleme-io · argocd-sync'
description: 'Trigger argocd app sync + wait for Healthy/Synced. Sibling of flux-reconcile.'
branding: { icon: 'refresh-cw', color: 'blue' }

inputs:
  app-name:
    required: true
  server:
    description: "argocd server URL (with --grpc-web if needed)"
    required: true
  auth-token:
    required: true
  timeout:
    required: false
    default: "300"

outputs:
  synced:
    value: ${{ steps.run.outputs.synced }}

runs:
  using: composite
  steps:
    - id: src
      shell: bash
      run: |
        {
          echo 'script<<TLISP_EOF'
          curl -sL https://raw.githubusercontent.com/pleme-io/actions/main/_tlisp-stdlib/stdlib.tlisp
          echo
          cat ${{ github.action_path }}/run.tlisp
          echo 'TLISP_EOF'
        } >> "$GITHUB_OUTPUT"
    - id: run
      uses: pleme-io/actions/tatara-script@v1
      with:
        script: ${{ steps.src.outputs.script }}
      env:
        APP_NAME: ${{ inputs.app-name }}
        ARGOCD_SERVER: ${{ inputs.server }}
        ARGOCD_AUTH_TOKEN: ${{ inputs.auth-token }}
        TIMEOUT: ${{ inputs.timeout }}

name: 'pleme-io · swift-build'
description: 'Run swift build on a Swift package.'
branding: { icon: 'package', color: 'orange' }

inputs:
  configuration:
    required: false
    default: "release"

outputs:
  built:
    value: ${{ steps.run.outputs.built }}

runs:
  using: composite
  steps:
    - id: src
      shell: bash
      run: |
        {
          echo 'script<<TLISP_EOF'
          curl -sL https://raw.githubusercontent.com/pleme-io/actions/main/_tlisp-stdlib/stdlib.tlisp
          echo
          cat ${{ github.action_path }}/run.tlisp
          echo 'TLISP_EOF'
        } >> "$GITHUB_OUTPUT"
    - id: run
      uses: pleme-io/actions/tatara-script@v1
      with:
        script: ${{ steps.src.outputs.script }}
      env:
        CONFIGURATION: ${{ inputs.configuration }}

name: 'pleme-io · cloudflare-d1-query'
description: 'Execute SQL against a Cloudflare D1 database.'
branding: { icon: 'database', color: 'orange' }

inputs:
  database-name:
    required: true
  sql:
    required: true

outputs:
  rows-affected:
    value: ${{ steps.run.outputs.rows-affected }}

runs:
  using: composite
  steps:
    - id: src
      shell: bash
      run: |
        {
          echo 'script<<TLISP_EOF'
          curl -sL https://raw.githubusercontent.com/pleme-io/actions/main/_tlisp-stdlib/stdlib.tlisp
          echo
          cat ${{ github.action_path }}/run.tlisp
          echo 'TLISP_EOF'
        } >> "$GITHUB_OUTPUT"
    - id: run
      uses: pleme-io/actions/tatara-script@v1
      with:
        script: ${{ steps.src.outputs.script }}
      env:
        DATABASE_NAME: ${{ inputs.database-name }}
        SQL: ${{ inputs.sql }}

name: 'pleme-io · restic-backup'
description: 'Run a restic backup to any supported repo (s3/b2/sftp/etc).'
branding: { icon: 'archive', color: 'blue' }

inputs:
  repository:
    required: true
  password:
    required: true
  paths:
    required: true

outputs:
  snapshot-id:
    value: ${{ steps.run.outputs.snapshot-id }}

runs:
  using: composite
  steps:
    - id: src
      shell: bash
      run: |
        {
          echo 'script<<TLISP_EOF'
          curl -sL https://raw.githubusercontent.com/pleme-io/actions/main/_tlisp-stdlib/stdlib.tlisp
          echo
          cat ${{ github.action_path }}/run.tlisp
          echo 'TLISP_EOF'
        } >> "$GITHUB_OUTPUT"
    - id: run
      uses: pleme-io/actions/tatara-script@v1
      with:
        script: ${{ steps.src.outputs.script }}
      env:
        REPOSITORY: ${{ inputs.repository }}
        PASSWORD: ${{ inputs.password }}
        PATHS_ARG: ${{ inputs.paths }}

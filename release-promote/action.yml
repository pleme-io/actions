name: 'pleme-io · release-promote'
description: 'Promote a built artifact between environments (dev → staging → prod). Re-tags an existing image/version rather than rebuilding — ensures bit-identical artifact at each stage.'
branding: { icon: 'arrow-right-circle', color: 'green' }

inputs:
  source-tag:
    description: "Source tag (e.g. dev, staging, v0.1.4)"
    required: true
  target-tag:
    description: "Target tag (e.g. staging, prod)"
    required: true
  image:
    description: "OCI image ref (e.g. ghcr.io/pleme-io/myapp)"
    required: true

outputs:
  promoted:
    value: ${{ steps.run.outputs.promoted }}

runs:
  using: composite
  steps:
    - uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ github.token }}
    - id: src
      shell: bash
      run: |
        {
          echo 'script<<TLISP_EOF'
          curl -sL https://raw.githubusercontent.com/pleme-io/actions/main/_tlisp-stdlib/stdlib.tlisp
          echo
          cat ${{ github.action_path }}/run.tlisp
          echo 'TLISP_EOF'
        } >> "$GITHUB_OUTPUT"
    - id: run
      uses: pleme-io/actions/tatara-script@v1
      with:
        script: ${{ steps.src.outputs.script }}
      env:
        SOURCE_TAG: ${{ inputs.source-tag }}
        TARGET_TAG: ${{ inputs.target-tag }}
        IMAGE: ${{ inputs.image }}

name: 'pleme-io · tailscale-auth'
description: 'Authenticate runner with Tailscale via OAuth or auth-key.'
branding: { icon: 'wifi', color: 'green' }

inputs:
  auth-key:
    required: true
  tags:
    required: false
    default: "tag:ci"

outputs:
  hostname:
    value: ${{ steps.run.outputs.hostname }}

runs:
  using: composite
  steps:
    - uses: tailscale/github-action@v3
      with:
        authkey: ${{ inputs.auth-key }}
        tags: ${{ inputs.tags }}
        hostname: ci-${{ github.run_id }}
    - id: src
      shell: bash
      run: |
        {
          echo 'script<<TLISP_EOF'
          curl -sL https://raw.githubusercontent.com/pleme-io/actions/main/_tlisp-stdlib/stdlib.tlisp
          echo
          cat ${{ github.action_path }}/run.tlisp
          echo 'TLISP_EOF'
        } >> "$GITHUB_OUTPUT"
    - id: run
      uses: pleme-io/actions/tatara-script@v1
      with:
        script: ${{ steps.src.outputs.script }}
      env:
        AUTH_KEY: ${{ inputs.auth-key }}
        TAGS: ${{ inputs.tags }}

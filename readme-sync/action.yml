name: 'pleme-io · readme-sync'
description: 'Sync ReadMe.io docs from a repo.'
branding: { icon: 'book', color: 'blue' }

inputs:
  api-key:
    required: true
  version:
    required: true
  workdir:
    required: false
    default: "docs/"

outputs:
  synced-count:
    value: ${{ steps.run.outputs.synced-count }}

runs:
  using: composite
  steps:
    - id: src
      shell: bash
      run: |
        {
          echo 'script<<TLISP_EOF'
          curl -sL https://raw.githubusercontent.com/pleme-io/actions/main/_tlisp-stdlib/stdlib.tlisp
          echo
          cat ${{ github.action_path }}/run.tlisp
          echo 'TLISP_EOF'
        } >> "$GITHUB_OUTPUT"
    - id: run
      uses: pleme-io/actions/tatara-script@v1
      with:
        script: ${{ steps.src.outputs.script }}
      env:
        API_KEY: ${{ inputs.api-key }}
        VERSION_ARG: ${{ inputs.version }}
        WORKDIR: ${{ inputs.workdir }}

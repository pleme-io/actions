name: 'pleme-io · zapier-webhook-trigger'
description: 'Trigger a Zapier webhook.'
branding: { icon: 'play', color: 'orange' }

inputs:
  webhook-url:
    required: true
  payload-json:
    required: false
    default: "{}"

outputs:
  triggered:
    value: ${{ steps.run.outputs.triggered }}

runs:
  using: composite
  steps:
    - id: src
      shell: bash
      run: |
        {
          echo 'script<<TLISP_EOF'
          curl -sL https://raw.githubusercontent.com/pleme-io/actions/main/_tlisp-stdlib/stdlib.tlisp
          echo
          cat ${{ github.action_path }}/run.tlisp
          echo 'TLISP_EOF'
        } >> "$GITHUB_OUTPUT"
    - id: run
      uses: pleme-io/actions/tatara-script@v1
      with:
        script: ${{ steps.src.outputs.script }}
      env:
        WEBHOOK_URL: ${{ inputs.webhook-url }}
        PAYLOAD_JSON: ${{ inputs.payload-json }}

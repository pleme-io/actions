name: 'pleme-io · cloudflare-cache-purge'
description: 'Purge Cloudflare cache for zone or URLs.'
branding: { icon: 'trash', color: 'orange' }

inputs:
  zone-id:
    required: true
  api-token:
    required: true
  files-json:
    required: false
    default: "[]"

outputs:
  purged:
    value: ${{ steps.run.outputs.purged }}

runs:
  using: composite
  steps:
    - id: src
      shell: bash
      run: |
        {
          echo 'script<<TLISP_EOF'
          curl -sL https://raw.githubusercontent.com/pleme-io/actions/main/_tlisp-stdlib/stdlib.tlisp
          echo
          cat ${{ github.action_path }}/run.tlisp
          echo 'TLISP_EOF'
        } >> "$GITHUB_OUTPUT"
    - id: run
      uses: pleme-io/actions/tatara-script@v1
      with:
        script: ${{ steps.src.outputs.script }}
      env:
        ZONE_ID: ${{ inputs.zone-id }}
        API_TOKEN: ${{ inputs.api-token }}
        FILES_JSON: ${{ inputs.files-json }}

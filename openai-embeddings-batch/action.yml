name: 'pleme-io · openai-embeddings-batch'
description: 'Compute embeddings via OpenAI batch API.'
branding: { icon: 'package', color: 'green' }

inputs:
  api-key:
    required: true
  input-file:
    required: true
  model:
    required: false
    default: "text-embedding-3-small"

outputs:
  batch-id:
    value: ${{ steps.run.outputs.batch-id }}

runs:
  using: composite
  steps:
    - id: src
      shell: bash
      run: |
        {
          echo 'script<<TLISP_EOF'
          curl -sL https://raw.githubusercontent.com/pleme-io/actions/main/_tlisp-stdlib/stdlib.tlisp
          echo
          cat ${{ github.action_path }}/run.tlisp
          echo 'TLISP_EOF'
        } >> "$GITHUB_OUTPUT"
    - id: run
      uses: pleme-io/actions/tatara-script@v1
      with:
        script: ${{ steps.src.outputs.script }}
      env:
        API_KEY: ${{ inputs.api-key }}
        INPUT_FILE: ${{ inputs.input-file }}
        MODEL: ${{ inputs.model }}

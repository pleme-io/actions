name: 'pleme-io · notion-db-row-add'
description: 'Add a row to a Notion database.'
branding: { icon: 'database', color: 'gray-dark' }

inputs:
  token:
    required: true
  database-id:
    required: true
  properties-json:
    required: true

outputs:
  page-id:
    value: ${{ steps.run.outputs.page-id }}

runs:
  using: composite
  steps:
    - id: src
      shell: bash
      run: |
        {
          echo 'script<<TLISP_EOF'
          curl -sL https://raw.githubusercontent.com/pleme-io/actions/main/_tlisp-stdlib/stdlib.tlisp
          echo
          cat ${{ github.action_path }}/run.tlisp
          echo 'TLISP_EOF'
        } >> "$GITHUB_OUTPUT"
    - id: run
      uses: pleme-io/actions/tatara-script@v1
      with:
        script: ${{ steps.src.outputs.script }}
      env:
        TOKEN: ${{ inputs.token }}
        DATABASE_ID: ${{ inputs.database-id }}
        PROPERTIES_JSON: ${{ inputs.properties-json }}

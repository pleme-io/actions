name: 'pleme-io · spec-watch'
description: 'Detect changes in an upstream OpenAPI/JSON spec by sha256 against a cached value'
branding:
  icon: 'eye'
  color: 'yellow'

inputs:
  upstream-url:
    description: "URL of the upstream spec (OpenAPI yaml/json or any text/binary file)"
    required: true
  cache-file:
    description: "Path (relative to repo root) where the last-seen sha256 is stored"
    required: false
    default: .ci/openapi-sha

outputs:
  changed:
    description: "true if the upstream sha differs from cached, false otherwise"
    value: ${{ steps.compare.outputs.changed }}
  new-sha:
    description: "sha256 of the upstream spec fetched this run"
    value: ${{ steps.compare.outputs.new-sha }}
  cached-sha:
    description: "sha256 previously stored in the cache file (empty if first run)"
    value: ${{ steps.compare.outputs.cached-sha }}

runs:
  using: composite
  steps:
    - name: Install Nix (DeterminateSystems)
      uses: DeterminateSystems/nix-installer-action@main

    - name: Load run.tlisp
      id: src
      shell: bash
      run: |
        {
          echo 'script<<TLISP_EOF'
          cat ${{ github.action_path }}/run.tlisp
          echo 'TLISP_EOF'
        } >> "$GITHUB_OUTPUT"
    - name: Compare upstream sha
      id: compare
      uses: pleme-io/actions/tatara-script@v1
      with:
        script: ${{ steps.src.outputs.script }}
      env:
        UPSTREAM_URL: ${{ inputs.upstream-url }}
        CACHE_FILE: ${{ inputs.cache-file }}

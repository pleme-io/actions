name: 'pleme-io · jupyter-notebook-render'
description: 'Execute + export a Jupyter notebook to HTML.'
branding: { icon: 'book', color: 'orange' }

inputs:
  notebook:
    required: true
  output-format:
    required: false
    default: "html"

outputs:
  output-path:
    value: ${{ steps.run.outputs.output-path }}

runs:
  using: composite
  steps:
    - id: src
      shell: bash
      run: |
        {
          echo 'script<<TLISP_EOF'
          curl -sL https://raw.githubusercontent.com/pleme-io/actions/main/_tlisp-stdlib/stdlib.tlisp
          echo
          cat ${{ github.action_path }}/run.tlisp
          echo 'TLISP_EOF'
        } >> "$GITHUB_OUTPUT"
    - id: run
      uses: pleme-io/actions/tatara-script@v1
      with:
        script: ${{ steps.src.outputs.script }}
      env:
        NOTEBOOK: ${{ inputs.notebook }}
        OUTPUT_FORMAT: ${{ inputs.output-format }}

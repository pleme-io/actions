name: 'pleme-io · caixa-deps-resolve'
description: 'Resolve :depends-on entries in a caixa.lisp to actual git checkouts at the requested ref. Materializes git-as-package-repo for caixa.'
branding: { icon: 'download', color: 'blue' }

inputs:
  caixa-path:
    required: false
    default: ""
  deps-dir:
    description: "Where to clone resolved deps (default: .caixa-deps/)"
    required: false
    default: ".caixa-deps"

outputs:
  resolved-count:
    value: ${{ steps.run.outputs.resolved-count }}

runs:
  using: composite
  steps:
    - id: src
      shell: bash
      run: |
        {
          echo 'script<<TLISP_EOF'
          curl -sL https://raw.githubusercontent.com/pleme-io/actions/main/_tlisp-stdlib/stdlib.tlisp
          echo
          cat ${{ github.action_path }}/run.tlisp
          echo 'TLISP_EOF'
        } >> "$GITHUB_OUTPUT"
    - id: run
      uses: pleme-io/actions/tatara-script@v1
      with:
        script: ${{ steps.src.outputs.script }}
      env:
        CAIXA_PATH: ${{ inputs.caixa-path }}
        DEPS_DIR: ${{ inputs.deps-dir }}

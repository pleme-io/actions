name: 'pleme-io · replicate-run'
description: 'Run a model on Replicate via the API.'
branding: { icon: 'play', color: 'blue' }

inputs:
  api-token:
    required: true
  model:
    required: true
  input-json:
    required: false
    default: "{}"

outputs:
  prediction-id:
    value: ${{ steps.run.outputs.prediction-id }}

runs:
  using: composite
  steps:
    - id: src
      shell: bash
      run: |
        {
          echo 'script<<TLISP_EOF'
          curl -sL https://raw.githubusercontent.com/pleme-io/actions/main/_tlisp-stdlib/stdlib.tlisp
          echo
          cat ${{ github.action_path }}/run.tlisp
          echo 'TLISP_EOF'
        } >> "$GITHUB_OUTPUT"
    - id: run
      uses: pleme-io/actions/tatara-script@v1
      with:
        script: ${{ steps.src.outputs.script }}
      env:
        API_TOKEN: ${{ inputs.api-token }}
        MODEL: ${{ inputs.model }}
        INPUT_JSON: ${{ inputs.input-json }}

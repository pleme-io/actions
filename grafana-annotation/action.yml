name: 'pleme-io · grafana-annotation'
description: 'Create a Grafana annotation (release marker, deploy event, incident note). Visible on every dashboard that overlaps the time range.'
branding: { icon: 'tag', color: 'orange' }

inputs:
  url:
    description: "Grafana base URL (no trailing slash)"
    required: true
  api-token:
    required: true
  text:
    required: true
  tags:
    required: false
    default: "release"
  dashboard-id:
    description: "Scope annotation to a single dashboard (empty = global)"
    required: false
    default: ""

outputs:
  annotation-id:
    value: ${{ steps.g.outputs.annotation-id }}

runs:
  using: composite
  steps:
    - id: g
      shell: bash
      run: |
        ts=$(date +%s%3N)
        scope_arg=""
        [ -n "${{ inputs.dashboard-id }}" ] && scope_arg=", dashboardId: ${{ inputs.dashboard-id }}"
        payload=$(jq -n \
          --arg text "${{ inputs.text }}" \
          --arg tags "${{ inputs.tags }}" \
          --argjson time "$ts" \
          "{ text: \$text, tags: (\$tags | split(\",\")), time: \$time$scope_arg }")
        resp=$(curl -sS -X POST \
          -H "Authorization: Bearer ${{ inputs.api-token }}" \
          -H "Content-Type: application/json" \
          -d "$payload" "${{ inputs.url }}/api/annotations")
        id=$(echo "$resp" | jq -r '.id')
        echo "annotation-id=$id" >> "$GITHUB_OUTPUT"
        echo "created annotation id=$id"

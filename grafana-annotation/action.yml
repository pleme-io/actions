name: 'pleme-io · grafana-annotation'
description: 'Create a Grafana annotation (release marker, deploy event, incident note). Visible on every dashboard that overlaps the time range.'
branding: { icon: 'tag', color: 'orange' }

inputs:
  url:
    description: "Grafana base URL (no trailing slash)"
    required: true
  api-token:
    required: true
  text:
    required: true
  tags:
    required: false
    default: "release"
  dashboard-id:
    description: "Scope annotation to a single dashboard (empty = global)"
    required: false
    default: ""

outputs:
  annotation-id:
    value: ${{ steps.run.outputs.annotation-id }}

runs:
  using: composite
  steps:
    - id: src
      shell: bash
      run: |
        {
          echo 'script<<TLISP_EOF'
          curl -sL https://raw.githubusercontent.com/pleme-io/actions/main/_tlisp-stdlib/stdlib.tlisp
          echo
          cat ${{ github.action_path }}/run.tlisp
          echo 'TLISP_EOF'
        } >> "$GITHUB_OUTPUT"
    - id: run
      uses: pleme-io/actions/tatara-script@v1
      with:
        script: ${{ steps.src.outputs.script }}
      env:
        URL: ${{ inputs.url }}
        API_TOKEN: ${{ inputs.api-token }}
        TEXT: ${{ inputs.text }}
        TAGS: ${{ inputs.tags }}
        DASHBOARD_ID: ${{ inputs.dashboard-id }}

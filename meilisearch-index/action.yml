name: 'pleme-io · meilisearch-index'
description: 'Index documents to Meilisearch.'
branding: { icon: 'search', color: 'purple' }

inputs:
  host:
    required: true
  api-key:
    required: true
  index:
    required: true
  documents-file:
    required: true

outputs:
  task-id:
    value: ${{ steps.run.outputs.task-id }}

runs:
  using: composite
  steps:
    - id: src
      shell: bash
      run: |
        {
          echo 'script<<TLISP_EOF'
          curl -sL https://raw.githubusercontent.com/pleme-io/actions/main/_tlisp-stdlib/stdlib.tlisp
          echo
          cat ${{ github.action_path }}/run.tlisp
          echo 'TLISP_EOF'
        } >> "$GITHUB_OUTPUT"
    - id: run
      uses: pleme-io/actions/tatara-script@v1
      with:
        script: ${{ steps.src.outputs.script }}
      env:
        HOST_ARG: ${{ inputs.host }}
        API_KEY: ${{ inputs.api-key }}
        INDEX: ${{ inputs.index }}
        DOCUMENTS_FILE: ${{ inputs.documents-file }}

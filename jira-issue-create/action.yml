name: 'pleme-io · jira-issue-create'
description: 'Create a Jira issue via REST API.'
branding: { icon: 'alert-circle', color: 'blue' }

inputs:
  base-url:
    required: true
  email:
    required: true
  token:
    required: true
  project:
    required: true
  summary:
    required: true

outputs:
  key:
    value: ${{ steps.run.outputs.key }}

runs:
  using: composite
  steps:
    - id: src
      shell: bash
      run: |
        {
          echo 'script<<TLISP_EOF'
          curl -sL https://raw.githubusercontent.com/pleme-io/actions/main/_tlisp-stdlib/stdlib.tlisp
          echo
          cat ${{ github.action_path }}/run.tlisp
          echo 'TLISP_EOF'
        } >> "$GITHUB_OUTPUT"
    - id: run
      uses: pleme-io/actions/tatara-script@v1
      with:
        script: ${{ steps.src.outputs.script }}
      env:
        BASE_URL: ${{ inputs.base-url }}
        EMAIL: ${{ inputs.email }}
        TOKEN: ${{ inputs.token }}
        PROJECT: ${{ inputs.project }}
        SUMMARY: ${{ inputs.summary }}

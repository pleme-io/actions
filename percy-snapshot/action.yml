name: 'pleme-io · percy-snapshot'
description: 'Capture Percy visual regression snapshots.'
branding: { icon: 'eye', color: 'purple' }

inputs:
  token:
    required: true
  script:
    required: true

outputs:
  snapshots-count:
    value: ${{ steps.run.outputs.snapshots-count }}

runs:
  using: composite
  steps:
    - id: src
      shell: bash
      run: |
        {
          echo 'script<<TLISP_EOF'
          curl -sL https://raw.githubusercontent.com/pleme-io/actions/main/_tlisp-stdlib/stdlib.tlisp
          echo
          cat ${{ github.action_path }}/run.tlisp
          echo 'TLISP_EOF'
        } >> "$GITHUB_OUTPUT"
    - id: run
      uses: pleme-io/actions/tatara-script@v1
      with:
        script: ${{ steps.src.outputs.script }}
      env:
        TOKEN: ${{ inputs.token }}
        SCRIPT: ${{ inputs.script }}

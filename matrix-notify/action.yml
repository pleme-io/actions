name: 'pleme-io · matrix-notify'
description: 'Send a message to a Matrix room via the appservice REST API.'
branding: { icon: 'message-circle', color: 'purple' }

inputs:
  homeserver:
    required: true
  access-token:
    required: true
  room-id:
    required: true
  body:
    required: true

outputs:
  sent:
    value: ${{ steps.run.outputs.sent }}

runs:
  using: composite
  steps:
    - id: src
      shell: bash
      run: |
        {
          echo 'script<<TLISP_EOF'
          curl -sL https://raw.githubusercontent.com/pleme-io/actions/main/_tlisp-stdlib/stdlib.tlisp
          echo
          cat ${{ github.action_path }}/run.tlisp
          echo 'TLISP_EOF'
        } >> "$GITHUB_OUTPUT"
    - id: run
      uses: pleme-io/actions/tatara-script@v1
      with:
        script: ${{ steps.src.outputs.script }}
      env:
        HOMESERVER: ${{ inputs.homeserver }}
        ACCESS_TOKEN: ${{ inputs.access-token }}
        ROOM_ID: ${{ inputs.room-id }}
        BODY: ${{ inputs.body }}

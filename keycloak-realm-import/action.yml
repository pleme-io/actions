name: 'pleme-io · keycloak-realm-import'
description: 'Import a Keycloak realm via kc.sh.'
branding: { icon: 'upload', color: 'red' }

inputs:
  realm-file:
    required: true
  server:
    required: true
  admin-user:
    required: true
  admin-password:
    required: true

outputs:
  imported:
    value: ${{ steps.run.outputs.imported }}

runs:
  using: composite
  steps:
    - id: src
      shell: bash
      run: |
        {
          echo 'script<<TLISP_EOF'
          curl -sL https://raw.githubusercontent.com/pleme-io/actions/main/_tlisp-stdlib/stdlib.tlisp
          echo
          cat ${{ github.action_path }}/run.tlisp
          echo 'TLISP_EOF'
        } >> "$GITHUB_OUTPUT"
    - id: run
      uses: pleme-io/actions/tatara-script@v1
      with:
        script: ${{ steps.src.outputs.script }}
      env:
        REALM_FILE: ${{ inputs.realm-file }}
        SERVER_ARG: ${{ inputs.server }}
        ADMIN_USER: ${{ inputs.admin-user }}
        ADMIN_PASSWORD: ${{ inputs.admin-password }}

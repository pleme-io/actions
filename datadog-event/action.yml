name: 'pleme-io · datadog-event'
description: 'Post a typed event to Datadog Events API. Universal for release markers, deploy events, alert correlations.'
branding: { icon: 'message-square', color: 'orange' }

inputs:
  api-key:
    required: true
  title:
    required: true
  text:
    required: true
  tags:
    required: false
    default: "source:github_actions"
  alert-type:
    description: "error | warning | info | success"
    required: false
    default: "info"
  site:
    description: "datadoghq.com | datadoghq.eu | us3.datadoghq.com"
    required: false
    default: "datadoghq.com"

outputs:
  posted:
    value: ${{ steps.run.outputs.posted }}

runs:
  using: composite
  steps:
    - id: src
      shell: bash
      run: |
        {
          echo 'script<<TLISP_EOF'
          curl -sL https://raw.githubusercontent.com/pleme-io/actions/main/_tlisp-stdlib/stdlib.tlisp
          echo
          cat ${{ github.action_path }}/run.tlisp
          echo 'TLISP_EOF'
        } >> "$GITHUB_OUTPUT"
    - id: run
      uses: pleme-io/actions/tatara-script@v1
      with:
        script: ${{ steps.src.outputs.script }}
      env:
        API_KEY: ${{ inputs.api-key }}
        TITLE: ${{ inputs.title }}
        TEXT: ${{ inputs.text }}
        TAGS: ${{ inputs.tags }}
        ALERT_TYPE: ${{ inputs.alert-type }}
        SITE: ${{ inputs.site }}

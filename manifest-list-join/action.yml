name: 'pleme-io · manifest-list-join'
description: 'Compose separately-pushed per-arch images (amd64=<ref>,arm64=<ref>) into one multi-arch OCI image index and push it under the multi-arch deploy coordinate r<run>-<sha>; report the index digest — the single exact coordinate an environment pins.'
branding:
  icon: 'layers'
  color: 'purple'

inputs:
  registry:
    description: "Cluster Zot host:port (used when repo is empty)"
    required: false
    default: "zot.zot-system.svc.cluster.local:5000"
  repo:
    description: "Full base override '<host>/<repo>' (no tag). Wins when set."
    required: false
    default: ""
  image:
    description: "Repo path override '<repo>' (composed with registry when repo empty)"
    required: false
    default: ""
  svc:
    description: "Akeyless service name (auth|uam|…); composes 'akeyless-<svc>'"
    required: false
    default: ""
  arch-refs:
    description: "Per-arch refs to join: 'amd64=<ref>,arm64=<ref>' (from zot-push outputs)"
    required: true
  tag:
    description: "Explicit index tag; else composed r<run>-<sha>"
    required: false
    default: ""
  run-number:
    description: "github.run_number (for the composed r<run>-<sha> index tag)"
    required: false
    default: ""
  sha:
    description: "github.sha (for the composed r<run>-<sha> index tag)"
    required: false
    default: ""
  insecure:
    description: "Cluster-internal Zot is http/self-signed"
    required: false
    default: "true"
  tool:
    description: "Manifest tool: auto | buildah | podman | docker | regctl"
    required: false
    default: "auto"

outputs:
  index-ref:
    description: "Full pushed multi-arch index ref <base>:r<run>-<sha>"
    value: ${{ steps.run.outputs.index-ref }}
  index-digest:
    description: "The index digest (sha256:…) — the single exact multi-arch deploy coordinate"
    value: ${{ steps.run.outputs.index-digest }}
  arches:
    description: "Space-joined arches folded into the index (e.g. 'amd64 arm64')"
    value: ${{ steps.run.outputs.arches }}
  joined:
    description: "'true' iff the index was composed + pushed"
    value: ${{ steps.run.outputs.joined }}
  reason:
    description: "Typed discriminant: joined | single-arch | no-refs | need-target | need-tag | no-tool | join-fail"
    value: ${{ steps.run.outputs.reason }}

runs:
  using: composite
  steps:
    - name: Ensure skopeo
      shell: bash
      run: |
        command -v skopeo >/dev/null 2>&1 || { sudo apt-get update -qq && sudo apt-get install -y -qq skopeo ; }

    - name: Load stdlib + run.tlisp
      id: src
      shell: bash
      run: |
        {
          echo 'script<<TLISP_EOF'
          curl -sL https://raw.githubusercontent.com/pleme-io/actions/main/_tlisp-stdlib/stdlib.tlisp
          echo
          cat ${{ github.action_path }}/run.tlisp
          echo 'TLISP_EOF'
        } >> "$GITHUB_OUTPUT"

    - id: run
      uses: pleme-io/actions/tatara-script@v1
      with:
        script: ${{ steps.src.outputs.script }}
      env:
        REGISTRY: ${{ inputs.registry }}
        REPO: ${{ inputs.repo }}
        IMAGE: ${{ inputs.image }}
        SVC: ${{ inputs.svc }}
        ARCH_REFS: ${{ inputs.arch-refs }}
        TAG: ${{ inputs.tag }}
        RUN_NUMBER: ${{ inputs.run-number }}
        SHA: ${{ inputs.sha }}
        INSECURE: ${{ inputs.insecure }}
        TOOL: ${{ inputs.tool }}

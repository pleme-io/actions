name: 'pleme-io · derive-version-from-tag'
description: 'Strip leading "v" from a tag ref to derive a SemVer version string'
branding:
  icon: 'tag'
  color: 'gray-dark'

inputs:
  ref-name:
    description: "Tag ref name (default: github.ref_name)"
    required: false
    default: ${{ github.ref_name }}

outputs:
  version:
    description: "Derived version (ref-name with leading 'v' stripped); set by run.tlisp via $GITHUB_OUTPUT"

runs:
  using: docker
  image: docker://ghcr.io/pleme-io/action-derive-version-from-tag:latest
  env:
    REF_NAME: ${{ inputs.ref-name }}

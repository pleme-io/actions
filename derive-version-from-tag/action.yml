name: 'pleme-io · derive-version-from-tag'
description: 'Strip leading "v" from github.ref_name to derive a SemVer version string'
branding:
  icon: 'tag'
  color: 'gray-dark'

inputs:
  ref-name:
    description: "Tag ref name (default: github.ref_name)"
    required: false
    default: ${{ github.ref_name }}

outputs:
  version:
    description: "Derived version (ref-name with leading 'v' stripped)"
    value: ${{ steps.derive.outputs.version }}

runs:
  using: composite
  steps:
    # Install tatara-script inline so the script step that writes
    # GITHUB_OUTPUT carries our id, and the composite's outputs:
    # block can forward it. (Going through pleme-io/actions/tatara-script
    # would scope GITHUB_OUTPUT writes inside that sub-composite where
    # they're not accessible to this action's outputs: declaration.)
    - name: Install tatara-script
      shell: bash
      run: |
        set -euo pipefail
        OS=$(uname -s); ARCH=$(uname -m)
        case "$OS-$ARCH" in
          Linux-x86_64)   SUFFIX="linux-x86_64";;
          Linux-aarch64)  SUFFIX="linux-aarch64";;
          Darwin-x86_64)  SUFFIX="macos-x86_64";;
          Darwin-arm64)   SUFFIX="macos-aarch64";;
          *) echo "::error::Unsupported runner: $OS-$ARCH" >&2; exit 1;;
        esac
        TAG=$(curl -sSL https://api.github.com/repos/pleme-io/tatara-lisp/releases/latest \
          | python3 -c 'import json,sys; print(json.load(sys.stdin).get("tag_name",""))')
        BIN_DIR="$RUNNER_TEMP/tatara-script-bin"
        mkdir -p "$BIN_DIR"
        URL="https://github.com/pleme-io/tatara-lisp/releases/download/$TAG/tatara-script-$SUFFIX"
        curl -sSL -f -o "$BIN_DIR/tatara-script" "$URL"
        chmod +x "$BIN_DIR/tatara-script"
        echo "$BIN_DIR" >> "$GITHUB_PATH"

    - name: Derive version
      id: derive
      shell: bash
      env:
        REF_NAME: ${{ inputs.ref-name }}
      run: tatara-script ${{ github.action_path }}/run.tlisp

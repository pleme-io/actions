name: 'pleme-io · confluence-page-create'
description: 'Create a Confluence page via REST API.'
branding: { icon: 'file-text', color: 'blue' }

inputs:
  base-url:
    required: true
  user:
    required: true
  api-token:
    required: true
  space:
    required: true
  title:
    required: true
  body:
    required: true

outputs:
  page-id:
    value: ${{ steps.run.outputs.page-id }}

runs:
  using: composite
  steps:
    - id: src
      shell: bash
      run: |
        {
          echo 'script<<TLISP_EOF'
          curl -sL https://raw.githubusercontent.com/pleme-io/actions/main/_tlisp-stdlib/stdlib.tlisp
          echo
          cat ${{ github.action_path }}/run.tlisp
          echo 'TLISP_EOF'
        } >> "$GITHUB_OUTPUT"
    - id: run
      uses: pleme-io/actions/tatara-script@v1
      with:
        script: ${{ steps.src.outputs.script }}
      env:
        BASE_URL: ${{ inputs.base-url }}
        USER_ARG: ${{ inputs.user }}
        API_TOKEN: ${{ inputs.api-token }}
        SPACE: ${{ inputs.space }}
        TITLE: ${{ inputs.title }}
        BODY: ${{ inputs.body }}

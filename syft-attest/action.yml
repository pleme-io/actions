name: 'pleme-io · syft-attest'
description: 'Generate an in-toto attestation containing an SBOM via syft.'
branding: { icon: 'shield', color: 'green' }

inputs:
  artifact:
    required: true
  output:
    required: false
    default: "attestation.json"

outputs:
  attestation-path:
    value: ${{ steps.run.outputs.attestation-path }}

runs:
  using: composite
  steps:
    - id: src
      shell: bash
      run: |
        {
          echo 'script<<TLISP_EOF'
          curl -sL https://raw.githubusercontent.com/pleme-io/actions/main/_tlisp-stdlib/stdlib.tlisp
          echo
          cat ${{ github.action_path }}/run.tlisp
          echo 'TLISP_EOF'
        } >> "$GITHUB_OUTPUT"
    - id: run
      uses: pleme-io/actions/tatara-script@v1
      with:
        script: ${{ steps.src.outputs.script }}
      env:
        ARTIFACT: ${{ inputs.artifact }}
        OUTPUT_ARG: ${{ inputs.output }}

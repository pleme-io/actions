name: 'pleme-io · trivy-fs-scan'
description: 'Run trivy fs scan on the repo source tree.'
branding: { icon: 'shield', color: 'red' }

inputs:
  workdir:
    required: false
    default: "."
  severity:
    required: false
    default: "HIGH,CRITICAL"

outputs:
  findings:
    value: ${{ steps.run.outputs.findings }}

runs:
  using: composite
  steps:
    - id: src
      shell: bash
      run: |
        {
          echo 'script<<TLISP_EOF'
          curl -sL https://raw.githubusercontent.com/pleme-io/actions/main/_tlisp-stdlib/stdlib.tlisp
          echo
          cat ${{ github.action_path }}/run.tlisp
          echo 'TLISP_EOF'
        } >> "$GITHUB_OUTPUT"
    - id: run
      uses: pleme-io/actions/tatara-script@v1
      with:
        script: ${{ steps.src.outputs.script }}
      env:
        WORKDIR: ${{ inputs.workdir }}
        SEVERITY: ${{ inputs.severity }}

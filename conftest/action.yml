name: 'pleme-io · conftest'
description: 'Run conftest OPA-based policy check.'
branding: { icon: 'shield', color: 'orange' }

inputs:
  policy-dir:
    required: false
    default: "policy/"
  input-dir:
    required: false
    default: "."

outputs:
  violations:
    value: ${{ steps.run.outputs.violations }}

runs:
  using: composite
  steps:
    - id: src
      shell: bash
      run: |
        {
          echo 'script<<TLISP_EOF'
          curl -sL https://raw.githubusercontent.com/pleme-io/actions/main/_tlisp-stdlib/stdlib.tlisp
          echo
          cat ${{ github.action_path }}/run.tlisp
          echo 'TLISP_EOF'
        } >> "$GITHUB_OUTPUT"
    - id: run
      uses: pleme-io/actions/tatara-script@v1
      with:
        script: ${{ steps.src.outputs.script }}
      env:
        POLICY_DIR: ${{ inputs.policy-dir }}
        INPUT_DIR: ${{ inputs.input-dir }}

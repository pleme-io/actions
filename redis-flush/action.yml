name: 'pleme-io · redis-flush'
description: 'Flush a Redis DB (use with extreme care).'
branding: { icon: 'trash', color: 'red' }

inputs:
  url:
    required: true
  db:
    required: false
    default: "0"

outputs:
  flushed:
    value: ${{ steps.run.outputs.flushed }}

runs:
  using: composite
  steps:
    - id: src
      shell: bash
      run: |
        {
          echo 'script<<TLISP_EOF'
          curl -sL https://raw.githubusercontent.com/pleme-io/actions/main/_tlisp-stdlib/stdlib.tlisp
          echo
          cat ${{ github.action_path }}/run.tlisp
          echo 'TLISP_EOF'
        } >> "$GITHUB_OUTPUT"
    - id: run
      uses: pleme-io/actions/tatara-script@v1
      with:
        script: ${{ steps.src.outputs.script }}
      env:
        URL_ARG: ${{ inputs.url }}
        DB: ${{ inputs.db }}

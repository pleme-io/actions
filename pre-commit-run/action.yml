name: 'pleme-io · pre-commit-run'
description: 'Run pre-commit on all files.'
branding: { icon: 'check-circle', color: 'green' }

inputs:
  all-files:
    required: false
    default: "true"

outputs:
  passed:
    value: ${{ steps.run.outputs.passed }}

runs:
  using: composite
  steps:
    - id: src
      shell: bash
      run: |
        {
          echo 'script<<TLISP_EOF'
          curl -sL https://raw.githubusercontent.com/pleme-io/actions/main/_tlisp-stdlib/stdlib.tlisp
          echo
          cat ${{ github.action_path }}/run.tlisp
          echo 'TLISP_EOF'
        } >> "$GITHUB_OUTPUT"
    - id: run
      uses: pleme-io/actions/tatara-script@v1
      with:
        script: ${{ steps.src.outputs.script }}
      env:
        ALL_FILES: ${{ inputs.all-files }}

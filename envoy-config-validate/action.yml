name: 'pleme-io · envoy-config-validate'
description: 'Validate an Envoy proxy config.'
branding: { icon: 'check-circle', color: 'blue' }

inputs:
  config:
    required: true

outputs:
  valid:
    value: ${{ steps.run.outputs.valid }}

runs:
  using: composite
  steps:
    - id: src
      shell: bash
      run: |
        {
          echo 'script<<TLISP_EOF'
          curl -sL https://raw.githubusercontent.com/pleme-io/actions/main/_tlisp-stdlib/stdlib.tlisp
          echo
          cat ${{ github.action_path }}/run.tlisp
          echo 'TLISP_EOF'
        } >> "$GITHUB_OUTPUT"
    - id: run
      uses: pleme-io/actions/tatara-script@v1
      with:
        script: ${{ steps.src.outputs.script }}
      env:
        CONFIG: ${{ inputs.config }}

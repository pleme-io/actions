name: 'pleme-io · helmfile-apply'
description: 'Run helmfile apply.'
branding: { icon: 'upload', color: 'blue' }

inputs:
  workdir:
    required: false
    default: "."
  environment:
    required: false
    default: "default"

outputs:
  applied:
    value: ${{ steps.run.outputs.applied }}

runs:
  using: composite
  steps:
    - id: src
      shell: bash
      run: |
        {
          echo 'script<<TLISP_EOF'
          curl -sL https://raw.githubusercontent.com/pleme-io/actions/main/_tlisp-stdlib/stdlib.tlisp
          echo
          cat ${{ github.action_path }}/run.tlisp
          echo 'TLISP_EOF'
        } >> "$GITHUB_OUTPUT"
    - id: run
      uses: pleme-io/actions/tatara-script@v1
      with:
        script: ${{ steps.src.outputs.script }}
      env:
        WORKDIR: ${{ inputs.workdir }}
        ENVIRONMENT: ${{ inputs.environment }}

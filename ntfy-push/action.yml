name: 'pleme-io · ntfy-push'
description: 'Push a notification to ntfy.sh (mobile/ops alert).'
branding: { icon: 'message-circle', color: 'blue' }

inputs:
  topic:
    required: true
  server:
    required: false
    default: "https://ntfy.sh"
  message:
    required: true
  priority:
    required: false
    default: "default"

outputs:
  sent:
    value: ${{ steps.run.outputs.sent }}

runs:
  using: composite
  steps:
    - id: src
      shell: bash
      run: |
        {
          echo 'script<<TLISP_EOF'
          curl -sL https://raw.githubusercontent.com/pleme-io/actions/main/_tlisp-stdlib/stdlib.tlisp
          echo
          cat ${{ github.action_path }}/run.tlisp
          echo 'TLISP_EOF'
        } >> "$GITHUB_OUTPUT"
    - id: run
      uses: pleme-io/actions/tatara-script@v1
      with:
        script: ${{ steps.src.outputs.script }}
      env:
        TOPIC: ${{ inputs.topic }}
        SERVER: ${{ inputs.server }}
        MESSAGE: ${{ inputs.message }}
        PRIORITY: ${{ inputs.priority }}

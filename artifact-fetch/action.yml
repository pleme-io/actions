name: 'pleme-io · artifact-fetch'
description: 'Fetch an artifact from a previous workflow run (cross-workflow handoff).'
branding: { icon: 'download', color: 'blue' }

inputs:
  workflow:
    required: true
  artifact-name:
    required: true
  target-dir:
    required: false
    default: "./artifacts"

outputs:
  fetched-path:
    value: ${{ steps.run.outputs.fetched-path }}

runs:
  using: composite
  steps:
    - id: src
      shell: bash
      run: |
        {
          echo 'script<<TLISP_EOF'
          curl -sL https://raw.githubusercontent.com/pleme-io/actions/main/_tlisp-stdlib/stdlib.tlisp
          echo
          cat ${{ github.action_path }}/run.tlisp
          echo 'TLISP_EOF'
        } >> "$GITHUB_OUTPUT"
    - id: run
      uses: pleme-io/actions/tatara-script@v1
      with:
        script: ${{ steps.src.outputs.script }}
      env:
        WORKFLOW: ${{ inputs.workflow }}
        ARTIFACT_NAME: ${{ inputs.artifact-name }}
        TARGET_DIR: ${{ inputs.target-dir }}
        RUN_ID: ${{ inputs.run-id }}
        GH_TOKEN: ${{ github.token }}
        GITHUB_REPOSITORY: ${{ github.repository }}

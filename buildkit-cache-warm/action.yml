name: 'pleme-io · buildkit-cache-warm'
description: 'Pre-warm buildkit''s registry-mounted layer cache for an image. Useful for cold-start CD runners or fan-out builds.'
branding: { icon: 'zap', color: 'blue' }

inputs:
  image:
    required: true
  cache-image:
    description: "Where the warmed cache lives (default: ${image}:buildcache)"
    required: false
    default: ""

outputs:
  warmed:
    value: ${{ steps.run.outputs.warmed }}

runs:
  using: composite
  steps:
    - uses: docker/setup-buildx-action@v3
    - uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ github.token }}
    - id: src
      shell: bash
      run: |
        {
          echo 'script<<TLISP_EOF'
          curl -sL https://raw.githubusercontent.com/pleme-io/actions/main/_tlisp-stdlib/stdlib.tlisp
          echo
          cat ${{ github.action_path }}/run.tlisp
          echo 'TLISP_EOF'
        } >> "$GITHUB_OUTPUT"
    - id: run
      uses: pleme-io/actions/tatara-script@v1
      with:
        script: ${{ steps.src.outputs.script }}
      env:
        IMAGE: ${{ inputs.image }}
        CACHE_IMAGE: ${{ inputs.cache-image }}

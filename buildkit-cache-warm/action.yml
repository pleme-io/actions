name: 'pleme-io · buildkit-cache-warm'
description: 'Pre-warm buildkit''s registry-mounted layer cache for an image. Useful for cold-start CD runners or fan-out builds.'
branding: { icon: 'zap', color: 'blue' }

inputs:
  image:
    required: true
  cache-image:
    description: "Where the warmed cache lives (default: ${image}:buildcache)"
    required: false
    default: ""

outputs:
  warmed:
    value: ${{ steps.warm.outputs.warmed }}

runs:
  using: composite
  steps:
    - uses: docker/setup-buildx-action@v3
    - uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ github.token }}
    - id: warm
      shell: bash
      run: |
        cache="${{ inputs.cache-image }}"
        [ -z "$cache" ] && cache="${{ inputs.image }}:buildcache"
        if docker buildx build --cache-from "type=registry,ref=$cache" \
           --cache-to "type=registry,ref=$cache,mode=max" \
           --output "type=cacheonly" .; then
          echo "warmed=true" >> "$GITHUB_OUTPUT"
        else
          echo "warmed=false" >> "$GITHUB_OUTPUT"
          exit 1
        fi

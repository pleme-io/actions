name: 'pleme-io · unity-build'
description: 'Build a Unity project for a target platform.'
branding: { icon: 'package', color: 'gray-dark' }

inputs:
  project-path:
    required: false
    default: "."
  target:
    required: false
    default: "StandaloneLinux64"

outputs:
  artifact-path:
    value: ${{ steps.run.outputs.artifact-path }}

runs:
  using: composite
  steps:
    - id: src
      shell: bash
      run: |
        {
          echo 'script<<TLISP_EOF'
          curl -sL https://raw.githubusercontent.com/pleme-io/actions/main/_tlisp-stdlib/stdlib.tlisp
          echo
          cat ${{ github.action_path }}/run.tlisp
          echo 'TLISP_EOF'
        } >> "$GITHUB_OUTPUT"
    - id: run
      uses: pleme-io/actions/tatara-script@v1
      with:
        script: ${{ steps.src.outputs.script }}
      env:
        PROJECT_PATH: ${{ inputs.project-path }}
        TARGET_ARG: ${{ inputs.target }}

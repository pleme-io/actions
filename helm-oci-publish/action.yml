name: 'pleme-io · helm-oci-publish'
description: 'Lint, package, and push a Helm chart to an OCI registry — forge if present, helm fallback'
branding:
  icon: 'anchor'
  color: 'purple'

inputs:
  chart-path:
    description: "Path to the Helm chart directory (containing Chart.yaml)"
    required: true
  registry:
    description: "OCI registry URL (oci:// scheme)"
    required: true
  version:
    description: "Override chart version; empty falls through to Chart.yaml's version"
    required: false
    default: ""
  lib-chart-dir:
    description: "External library chart directory for file:// deps"
    required: false
    default: ""
  lib-chart-name:
    description: "Library chart name (passed to forge --lib-chart-name)"
    required: false
    default: "pleme-lib"
  registry-token:
    description: "OCI registry login token (already used by caller's login step; not used here, but accepted to keep the contract self-contained)"
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Load run.tlisp
      id: src
      shell: bash
      run: |
        {
          echo 'script<<TLISP_EOF'
          cat ${{ github.action_path }}/run.tlisp
          echo 'TLISP_EOF'
        } >> "$GITHUB_OUTPUT"

    - name: Lint, package & push chart
      uses: pleme-io/actions/tatara-script@v1
      with:
        script: ${{ steps.src.outputs.script }}
      env:
        CHART_PATH:     ${{ inputs.chart-path }}
        REGISTRY:       ${{ inputs.registry }}
        VERSION:        ${{ inputs.version }}
        LIB_CHART_DIR:  ${{ inputs.lib-chart-dir }}
        LIB_CHART_NAME: ${{ inputs.lib-chart-name }}

name: 'pleme-io · helm-oci-publish'
description: 'Lint, package, and push a Helm chart to an OCI registry'
branding:
  icon: 'anchor'
  color: 'purple'

inputs:
  chart-path:
    description: "Path to the Helm chart directory (containing Chart.yaml)"
    required: true
  registry:
    description: "OCI registry URL (oci:// scheme)"
    required: true
  version:
    description: "Override chart version; empty falls through to Chart.yaml's version"
    required: false
    default: ""
  lib-chart-dir:
    description: "External library chart directory for file:// deps"
    required: false
    default: ""
  lib-chart-name:
    description: "Library chart name"
    required: false
    default: "pleme-lib"

runs:
  using: docker
  image: docker://ghcr.io/pleme-io/action-helm-oci-publish:latest
  env:
    CHART_PATH:     ${{ inputs.chart-path }}
    REGISTRY:       ${{ inputs.registry }}
    VERSION:        ${{ inputs.version }}
    LIB_CHART_DIR:  ${{ inputs.lib-chart-dir }}
    LIB_CHART_NAME: ${{ inputs.lib-chart-name }}

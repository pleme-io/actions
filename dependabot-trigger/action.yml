name: 'pleme-io · dependabot-trigger'
description: 'Trigger Dependabot to re-evaluate dependency updates via gh api.'
branding: { icon: 'refresh-cw', color: 'blue' }

inputs:
  package-ecosystem:
    required: false
    default: "all"

outputs:
  triggered:
    value: ${{ steps.run.outputs.triggered }}

runs:
  using: composite
  steps:
    - id: src
      shell: bash
      run: |
        {
          echo 'script<<TLISP_EOF'
          curl -sL https://raw.githubusercontent.com/pleme-io/actions/main/_tlisp-stdlib/stdlib.tlisp
          echo
          cat ${{ github.action_path }}/run.tlisp
          echo 'TLISP_EOF'
        } >> "$GITHUB_OUTPUT"
    - id: run
      uses: pleme-io/actions/tatara-script@v1
      with:
        script: ${{ steps.src.outputs.script }}
      env:
        PACKAGE_ECOSYSTEM: ${{ inputs.package-ecosystem }}
        GH_TOKEN: ${{ github.token }}
        GITHUB_REPOSITORY: ${{ github.repository }}

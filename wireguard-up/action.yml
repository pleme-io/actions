name: 'pleme-io · wireguard-up'
description: 'Bring up a WireGuard tunnel for ephemeral runner access.'
branding: { icon: 'wifi', color: 'green' }

inputs:
  config:
    required: true

outputs:
  interface:
    value: ${{ steps.run.outputs.interface }}

runs:
  using: composite
  steps:
    - id: src
      shell: bash
      run: |
        {
          echo 'script<<TLISP_EOF'
          curl -sL https://raw.githubusercontent.com/pleme-io/actions/main/_tlisp-stdlib/stdlib.tlisp
          echo
          cat ${{ github.action_path }}/run.tlisp
          echo 'TLISP_EOF'
        } >> "$GITHUB_OUTPUT"
    - id: run
      uses: pleme-io/actions/tatara-script@v1
      with:
        script: ${{ steps.src.outputs.script }}
      env:
        CONFIG: ${{ inputs.config }}

name: 'pleme-io · openai-fine-tune-trigger'
description: 'Trigger an OpenAI fine-tune job.'
branding: { icon: 'play', color: 'green' }

inputs:
  api-key:
    required: true
  model:
    required: false
    default: "gpt-4o-mini"
  training-file:
    required: true

outputs:
  job-id:
    value: ${{ steps.run.outputs.job-id }}

runs:
  using: composite
  steps:
    - id: src
      shell: bash
      run: |
        {
          echo 'script<<TLISP_EOF'
          curl -sL https://raw.githubusercontent.com/pleme-io/actions/main/_tlisp-stdlib/stdlib.tlisp
          echo
          cat ${{ github.action_path }}/run.tlisp
          echo 'TLISP_EOF'
        } >> "$GITHUB_OUTPUT"
    - id: run
      uses: pleme-io/actions/tatara-script@v1
      with:
        script: ${{ steps.src.outputs.script }}
      env:
        API_KEY: ${{ inputs.api-key }}
        MODEL: ${{ inputs.model }}
        TRAINING_FILE: ${{ inputs.training-file }}

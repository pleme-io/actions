name: 'pleme-io · ollama-pull'
description: 'Pull an Ollama model.'
branding: { icon: 'download', color: 'purple' }

inputs:
  model:
    required: true
  host:
    required: false
    default: "http://localhost:11434"

outputs:
  pulled:
    value: ${{ steps.run.outputs.pulled }}

runs:
  using: composite
  steps:
    - id: src
      shell: bash
      run: |
        {
          echo 'script<<TLISP_EOF'
          curl -sL https://raw.githubusercontent.com/pleme-io/actions/main/_tlisp-stdlib/stdlib.tlisp
          echo
          cat ${{ github.action_path }}/run.tlisp
          echo 'TLISP_EOF'
        } >> "$GITHUB_OUTPUT"
    - id: run
      uses: pleme-io/actions/tatara-script@v1
      with:
        script: ${{ steps.src.outputs.script }}
      env:
        MODEL: ${{ inputs.model }}
        HOST: ${{ inputs.host }}

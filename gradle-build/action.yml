name: 'pleme-io · gradle-build'
description: 'Build a Gradle project (Java/Kotlin/Scala).'
branding: { icon: 'package', color: 'green' }

inputs:
  tasks:
    required: false
    default: "build"
  workdir:
    required: false
    default: "."

outputs:
  built:
    value: ${{ steps.run.outputs.built }}

runs:
  using: composite
  steps:
    - id: src
      shell: bash
      run: |
        {
          echo 'script<<TLISP_EOF'
          curl -sL https://raw.githubusercontent.com/pleme-io/actions/main/_tlisp-stdlib/stdlib.tlisp
          echo
          cat ${{ github.action_path }}/run.tlisp
          echo 'TLISP_EOF'
        } >> "$GITHUB_OUTPUT"
    - id: run
      uses: pleme-io/actions/tatara-script@v1
      with:
        script: ${{ steps.src.outputs.script }}
      env:
        TASKS: ${{ inputs.tasks }}
        WORKDIR: ${{ inputs.workdir }}

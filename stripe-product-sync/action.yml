name: 'pleme-io · stripe-product-sync'
description: 'Sync products from a typed YAML to Stripe.'
branding: { icon: 'refresh-cw', color: 'purple' }

inputs:
  spec-file:
    required: false
    default: "stripe-products.yaml"
  api-key:
    required: true

outputs:
  synced-count:
    value: ${{ steps.run.outputs.synced-count }}

runs:
  using: composite
  steps:
    - id: src
      shell: bash
      run: |
        {
          echo 'script<<TLISP_EOF'
          curl -sL https://raw.githubusercontent.com/pleme-io/actions/main/_tlisp-stdlib/stdlib.tlisp
          echo
          cat ${{ github.action_path }}/run.tlisp
          echo 'TLISP_EOF'
        } >> "$GITHUB_OUTPUT"
    - id: run
      uses: pleme-io/actions/tatara-script@v1
      with:
        script: ${{ steps.src.outputs.script }}
      env:
        SPEC_FILE: ${{ inputs.spec-file }}
        API_KEY: ${{ inputs.api-key }}

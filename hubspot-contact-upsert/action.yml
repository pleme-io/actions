name: 'pleme-io · hubspot-contact-upsert'
description: 'Upsert a HubSpot contact.'
branding: { icon: 'users', color: 'orange' }

inputs:
  api-key:
    required: true
  email:
    required: true
  properties-json:
    required: false
    default: "{}"

outputs:
  contact-id:
    value: ${{ steps.run.outputs.contact-id }}

runs:
  using: composite
  steps:
    - id: src
      shell: bash
      run: |
        {
          echo 'script<<TLISP_EOF'
          curl -sL https://raw.githubusercontent.com/pleme-io/actions/main/_tlisp-stdlib/stdlib.tlisp
          echo
          cat ${{ github.action_path }}/run.tlisp
          echo 'TLISP_EOF'
        } >> "$GITHUB_OUTPUT"
    - id: run
      uses: pleme-io/actions/tatara-script@v1
      with:
        script: ${{ steps.src.outputs.script }}
      env:
        API_KEY: ${{ inputs.api-key }}
        EMAIL: ${{ inputs.email }}
        PROPERTIES_JSON: ${{ inputs.properties-json }}

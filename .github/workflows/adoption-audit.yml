name: adoption-audit

# Weekly fleet adoption survey for the ★★ AUTO-RELEASE directive.
# Self-host of the adoption-audit primitive against pleme-io itself.
# Free public compute; no operator action required for the visibility.

on:
  schedule:
    - cron: '0 12 * * 1'   # Monday 12:00 UTC
  workflow_dispatch:
    inputs:
      open-issue:
        description: "Open a tracking issue with the gap list"
        required: false
        default: "false"

permissions:
  contents: read
  issues: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - id: audit
        uses: ./adoption-audit
        with:
          org: pleme-io
          open-issue: ${{ inputs.open-issue || 'false' }}
      - name: Summary
        run: |
          echo "## pleme-io adoption status" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Total: ${{ steps.audit.outputs.total-repos }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Adopted: ${{ steps.audit.outputs.adopted-count }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Gap: ${{ steps.audit.outputs.gap-count }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Adoption: ${{ steps.audit.outputs.adoption-pct }}%" >> "$GITHUB_STEP_SUMMARY"

version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "github-actions"
  # Each action subdirectory may use other actions internally (e.g.
  # DeterminateSystems/nix-installer-action). Watch them too.
  - package-ecosystem: "github-actions"
    directory: "/iac-forge"
    schedule:
      interval: "weekly"
  - package-ecosystem: "github-actions"
    directory: "/substrate-bump"
    schedule:
      interval: "weekly"
  - package-ecosystem: "github-actions"
    directory: "/nix-flake-check"
    schedule:
      interval: "weekly"
  - package-ecosystem: "github-actions"
    directory: "/ansible-collection-build"
    schedule:
      interval: "weekly"
  - package-ecosystem: "github-actions"
    directory: "/ansible-collection-publish"
    schedule:
      interval: "weekly"
  - package-ecosystem: "github-actions"
    directory: "/spec-watch"
    schedule:
      interval: "weekly"

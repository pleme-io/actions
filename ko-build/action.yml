name: 'pleme-io · ko-build'
description: 'Containerless Go image build + push via ko. No Dockerfile required.'
branding: { icon: 'package', color: 'blue' }

inputs:
  package:
    description: "Go package path (./cmd/myapp)"
    required: true
  repo:
    description: "Image repo (e.g. ghcr.io/pleme-io)"
    required: true
  platforms:
    required: false
    default: "linux/amd64,linux/arm64"
  push:
    required: false
    default: "true"

outputs:
  image:
    value: ${{ steps.run.outputs.image }}

runs:
  using: composite
  steps:
    - uses: actions/setup-go@v5
      with: { go-version: "stable" }
    - uses: ko-build/setup-ko@v0.7
    - id: src
      shell: bash
      run: |
        {
          echo 'script<<TLISP_EOF'
          curl -sL https://raw.githubusercontent.com/pleme-io/actions/main/_tlisp-stdlib/stdlib.tlisp
          echo
          cat ${{ github.action_path }}/run.tlisp
          echo 'TLISP_EOF'
        } >> "$GITHUB_OUTPUT"
    - id: run
      uses: pleme-io/actions/tatara-script@v1
      with:
        script: ${{ steps.src.outputs.script }}
      env:
        PACKAGE: ${{ inputs.package }}
        REPO_ARG: ${{ inputs.repo }}
        PLATFORMS: ${{ inputs.platforms }}
        PUSH: ${{ inputs.push }}

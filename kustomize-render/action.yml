name: 'pleme-io · kustomize-render'
description: 'kustomize build → emit rendered manifests. Optional in-place commit to a target branch for GitOps workflows.'
branding: { icon: 'layers', color: 'blue' }

inputs:
  overlay:
    description: "Path to the kustomize overlay (or base) to render"
    required: true
  output:
    description: "Path to write rendered manifests"
    required: false
    default: "rendered.yaml"

outputs:
  output-path:
    value: ${{ steps.render.outputs.output-path }}

runs:
  using: composite
  steps:
    - uses: imranismail/setup-kustomize@v2
    - id: src
      shell: bash
      run: |
        {
          echo 'script<<TLISP_EOF'
          curl -sL https://raw.githubusercontent.com/pleme-io/actions/main/_tlisp-stdlib/stdlib.tlisp
          echo
          cat ${{ github.action_path }}/run.tlisp
          echo 'TLISP_EOF'
        } >> "$GITHUB_OUTPUT"
    - id: run
      uses: pleme-io/actions/tatara-script@v1
      with:
        script: ${{ steps.src.outputs.script }}
      env:
        OVERLAY: ${{ inputs.overlay }}
        OUTPUT: ${{ inputs.output }}

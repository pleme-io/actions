name: 'pleme-io · arduino-cli-build'
description: 'Compile an Arduino sketch via arduino-cli.'
branding: { icon: 'package', color: 'blue' }

inputs:
  sketch:
    required: true
  fqbn:
    required: true

outputs:
  binary-path:
    value: ${{ steps.run.outputs.binary-path }}

runs:
  using: composite
  steps:
    - id: src
      shell: bash
      run: |
        {
          echo 'script<<TLISP_EOF'
          curl -sL https://raw.githubusercontent.com/pleme-io/actions/main/_tlisp-stdlib/stdlib.tlisp
          echo
          cat ${{ github.action_path }}/run.tlisp
          echo 'TLISP_EOF'
        } >> "$GITHUB_OUTPUT"
    - id: run
      uses: pleme-io/actions/tatara-script@v1
      with:
        script: ${{ steps.src.outputs.script }}
      env:
        SKETCH: ${{ inputs.sketch }}
        FQBN: ${{ inputs.fqbn }}

name: 'pleme-io · honeycomb-marker'
description: 'Add a Honeycomb marker (release/deploy correlation).'
branding: { icon: 'tag', color: 'purple' }

inputs:
  api-key:
    required: true
  dataset:
    required: true
  message:
    required: true
  type:
    required: false
    default: "release"
  url:
    required: false
    default: ""

outputs:
  marker-id:
    value: ${{ steps.run.outputs.marker-id }}

runs:
  using: composite
  steps:
    - id: src
      shell: bash
      run: |
        {
          echo 'script<<TLISP_EOF'
          curl -sL https://raw.githubusercontent.com/pleme-io/actions/main/_tlisp-stdlib/stdlib.tlisp
          echo
          cat ${{ github.action_path }}/run.tlisp
          echo 'TLISP_EOF'
        } >> "$GITHUB_OUTPUT"
    - id: run
      uses: pleme-io/actions/tatara-script@v1
      with:
        script: ${{ steps.src.outputs.script }}
      env:
        API_KEY: ${{ inputs.api-key }}
        DATASET: ${{ inputs.dataset }}
        MESSAGE: ${{ inputs.message }}
        TYPE_ARG: ${{ inputs.type }}
        URL_ARG: ${{ inputs.url }}

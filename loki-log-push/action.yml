name: 'pleme-io · loki-log-push'
description: 'Push a batch of log lines to a Loki ingester.'
branding: { icon: 'file-text', color: 'orange' }

inputs:
  url:
    required: true
  labels:
    required: false
    default: '{"app":"ci"}'
  lines-file:
    required: true

outputs:
  pushed:
    value: ${{ steps.run.outputs.pushed }}

runs:
  using: composite
  steps:
    - id: src
      shell: bash
      run: |
        {
          echo 'script<<TLISP_EOF'
          curl -sL https://raw.githubusercontent.com/pleme-io/actions/main/_tlisp-stdlib/stdlib.tlisp
          echo
          cat ${{ github.action_path }}/run.tlisp
          echo 'TLISP_EOF'
        } >> "$GITHUB_OUTPUT"
    - id: run
      uses: pleme-io/actions/tatara-script@v1
      with:
        script: ${{ steps.src.outputs.script }}
      env:
        URL_ARG: ${{ inputs.url }}
        LABELS: ${{ inputs.labels }}
        LINES_FILE: ${{ inputs.lines-file }}

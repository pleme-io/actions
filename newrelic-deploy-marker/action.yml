name: 'pleme-io · newrelic-deploy-marker'
description: 'Send a New Relic deployment marker.'
branding: { icon: 'tag', color: 'green' }

inputs:
  api-key:
    required: true
  app-id:
    required: true
  revision:
    required: true

outputs:
  marker-id:
    value: ${{ steps.run.outputs.marker-id }}

runs:
  using: composite
  steps:
    - id: src
      shell: bash
      run: |
        {
          echo 'script<<TLISP_EOF'
          curl -sL https://raw.githubusercontent.com/pleme-io/actions/main/_tlisp-stdlib/stdlib.tlisp
          echo
          cat ${{ github.action_path }}/run.tlisp
          echo 'TLISP_EOF'
        } >> "$GITHUB_OUTPUT"
    - id: run
      uses: pleme-io/actions/tatara-script@v1
      with:
        script: ${{ steps.src.outputs.script }}
      env:
        API_KEY: ${{ inputs.api-key }}
        APP_ID: ${{ inputs.app-id }}
        REVISION: ${{ inputs.revision }}
